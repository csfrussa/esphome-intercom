purge_devices:
  name: Purge Stale Devices
  description: >-
    Remove intercom devices that are no longer reachable from the device
    registry. The HA phonebook sensor rebuilds from live intercom_endpoint
    entities, so purged devices disappear from ESP contact lists on the next
    sensor update. Without a target, every intercom device whose state is
    'unavailable' for at least min_unavailable_hours is removed. With a target,
    the selected device is removed unconditionally. Devices that come back
    online will re-register themselves automatically.
  fields:
    device_id:
      name: Device
      description: Optional specific intercom ESPHome device to purge immediately.
      required: false
      selector:
        device:
          integration: esphome
    min_unavailable_hours:
      name: Minimum Hours Unavailable
      description: >-
        Only purge devices that have been unavailable for at least this many
        hours. Default 0 = purge immediately. Use a higher value (e.g. 1) to
        avoid wiping devices that are only briefly offline (OTA updates,
        reboots).
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 168
          step: 0.5
          unit_of_measurement: h
          mode: box

sip_answer:
  name: Answer SIP Call
  description: Send 200 OK for a pending SIP call addressed to Home Assistant.
  fields:
    call_id:
      name: Call ID
      description: Pending SIP Call-ID. If omitted and only one call is pending, that call is answered.
      required: false
      selector:
        text:

sip_decline:
  name: Decline SIP Call
  description: Send a final SIP rejection for a pending SIP call.
  fields:
    call_id:
      name: Call ID
      description: Pending SIP Call-ID. If omitted and only one call is pending, that call is declined.
      required: false
      selector:
        text:
    status:
      name: SIP Status
      description: Final SIP status code to send.
      required: false
      default: 603
      selector:
        number:
          min: 400
          max: 699
          step: 1
          mode: box
    reason:
      name: Reason
      description: SIP reason phrase.
      required: false
      default: Decline
      selector:
        text:
    decline_reason:
      name: Decline reason
      description: Application terminal reason propagated in SIP Reason and X-Intercom-Decline-Reason headers.
      required: false
      default: declined
      selector:
        text:

sip_call:
  name: SIP Call
  description: Originate a standards-SIP call from Home Assistant to a roster target or SIP URI.
  fields:
    destination:
      name: Destination
      description: Contact ID/name, number, user@host, or sip:user@host URI.
      required: false
      selector:
        text:
    target:
      name: Target
      description: Contact ID/name, number, user@host, or sip:user@host URI.
      required: false
      selector:
        text:
    call:
      name: Call
      description: Alias for target, useful in scripts and automations.
      required: false
      selector:
        text:
    ha_bridge:
      name: Bridge Via HA
      description: Force HA as the SIP destination even if the contact has a direct endpoint.
      required: false
      default: false
      selector:
        boolean:

sip_forward:
  name: SIP Forward
  description: Route a standards-SIP call through Home Assistant's SIP dial plan and bridge. With Call ID, forwards a pending inbound SIP route.
  fields:
    call_id:
      name: Call ID
      description: Pending SIP Call-ID from intercom_native.sip_route_request. If omitted, Home Assistant originates a new bridged call.
      required: false
      selector:
        text:
    destination:
      name: Destination
      description: Contact ID/name, number, user@host, or sip:user@host URI.
      required: false
      selector:
        text:
    target:
      name: Target
      description: Contact ID/name, number, user@host, or sip:user@host URI.
      required: false
      selector:
        text:
    call:
      name: Call
      description: Alias for target, useful in scripts and automations.
      required: false
      selector:
        text:

sip_route:
  name: SIP Route Decision
  description: Apply an automation dial-plan decision to a pending inbound SIP route.
  fields:
    call_id:
      name: Call ID
      description: Pending SIP Call-ID from intercom_native.sip_route_request.
      required: true
      selector:
        text:
    action:
      name: Action
      required: false
      default: default
      selector:
        select:
          options:
            - answer_ha
            - decline
            - busy
            - forward
            - bridge
            - default
            - cancel
    destination:
      name: Destination
      description: Contact ID/name, number, user@host, or sip:user@host URI for forward/bridge.
      required: false
      selector:
        text:
    target:
      name: Target
      description: Alias for destination.
      required: false
      selector:
        text:
    call:
      name: Call
      description: Alias for destination.
      required: false
      selector:
        text:
    status:
      name: SIP Status
      description: Optional final SIP status for decline/cancel decisions.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 699
          step: 1
          mode: box
    reason:
      name: Reason
      description: SIP reason phrase.
      required: false
      selector:
        text:
    decline_reason:
      name: Decline reason
      description: Application terminal reason propagated in SIP Reason and X-Intercom-Decline-Reason headers.
      required: false
      selector:
        text:

sip_hangup:
  name: SIP Hang Up
  description: Send BYE and stop any SIP RTP relay for an active SIP call.
  fields:
    call_id:
      name: Call ID
      description: Active SIP Call-ID. If omitted and only one call is active, that call is ended.
      required: false
      selector:
        text:

phonebook_add_contact:
  name: Add Phonebook Contact
  description: Add or replace one manual contact in the central JSON phonebook.
  fields:
    name:
      name: Name
      description: Contact name. If ID is omitted, this is also used as the contact ID.
      required: true
      selector:
        text:
    id:
      name: ID
      description: Optional stable ID. Defaults to Name.
      required: false
      selector:
        text:
    kind:
      name: Kind
      required: false
      default: esp
      selector:
        select:
          options:
            - ha
            - esp
            - phone
            - sip
            - group
    address:
      name: Address
      description: IP or host for HA/ESP/SIP contacts.
      required: false
      selector:
        text:
    sip_uri:
      name: SIP URI
      required: false
      selector:
        text:
    number:
      name: Number
      required: false
      selector:
        text:
    ha_bridge:
      name: Bridge Via HA
      required: false
      default: false
      selector:
        boolean:
    sip_transport:
      name: SIP Signaling Transport
      description: Optional SIP signaling transport for PCM SIP endpoints. RTP remains UDP.
      required: false
      selector:
        select:
          options:
            - tcp
            - udp
    sip_port:
      name: SIP Port
      required: false
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box
    rtp_port:
      name: RTP Port
      required: false
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box
    tx_rate:
      name: TX Rate
      description: Optional manual TX sample-rate metadata. Use auto when omitted.
      required: false
      selector:
        text:
    rx_rate:
      name: RX Rate
      description: Optional manual RX sample-rate metadata. Use auto when omitted.
      required: false
      selector:
        text:
    tx_formats:
      name: TX Formats
      description: Optional TX RTP PCM format tokens, for example 16000:s16le:1:20.
      required: false
      selector:
        text:
    rx_formats:
      name: RX Formats
      description: Optional RX RTP PCM format tokens, for example 48000:s16le:1:10.
      required: false
      selector:
        text:
    max_payload_bytes:
      name: Max RTP Payload Bytes
      description: Optional RTP PCM payload limit. Default is 1200 when omitted.
      required: false
      selector:
        number:
          min: 256
          max: 1400
          step: 1
          mode: box

phonebook_remove_contact:
  name: Remove Phonebook Contact
  description: Remove one manual contact from the central JSON phonebook by name.
  fields:
    name:
      name: Name
      required: true
      selector:
        text:

phonebook_set_contacts:
  name: Set Phonebook Contacts
  description: Replace manual contacts with a JSON roster document.
  fields:
    roster_json:
      name: Roster JSON
      required: true
      selector:
        text:
          multiline: true

phonebook_clear:
  name: Clear Phonebook Contacts
  description: Clear manual contacts from the central JSON phonebook.

phonebook_export:
  name: Export Phonebook
  description: Emit the current central JSON phonebook as an intercom_native call event.

phonebook_push:
  name: Push Phonebook
  description: Push the current central JSON phonebook to all online ESP endpoints.

sip_set_dnd:
  name: Set SIP DND
  description: Enable or disable Do Not Disturb on the Home Assistant softphone.
  fields:
    dnd:
      name: DND
      required: true
      selector:
        boolean:
