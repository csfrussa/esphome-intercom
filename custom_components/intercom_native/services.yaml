answer:
  name: Answer Call
  description: Answer an incoming intercom call on the selected device.
  fields:
    device_id:
      name: Device
      description: Intercom ESPHome device to answer.
      required: true
      selector:
        device:
          integration: esphome

decline:
  name: Decline Call
  description: Decline an incoming intercom call on the selected device.
  fields:
    device_id:
      name: Device
      description: Intercom ESPHome device to decline.
      required: true
      selector:
        device:
          integration: esphome
    reason:
      name: Reason
      description: >-
        Optional free-form decline reason propagated to the caller (shown
        on its card and LVGL ended-screen). Leave empty for a plain
        decline.
      required: false
      example: "Do not disturb"
      selector:
        text:

hangup:
  name: Hangup
  description: End the active intercom call on the selected device.
  fields:
    device_id:
      name: Device
      description: Intercom ESPHome device to hang up.
      required: true
      selector:
        device:
          integration: esphome

call:
  name: Call
  description: Start an intercom call to the selected device (ESP-to-ESP bridge via HA).
  fields:
    device_id:
      name: Destination Device
      description: Intercom ESPHome device to call.
      required: true
      selector:
        device:
          integration: esphome
    source:
      name: Source Device
      description: The device that initiates the call. If omitted, calls from HA (browser P2P).
      required: false
      selector:
        device:
          integration: esphome

forward:
  name: Forward Call
  description: Forward an active or ringing call to another device. Target is the caller device.
  fields:
    device_id:
      name: Source Device
      description: Intercom ESPHome device whose active call should be forwarded.
      required: true
      selector:
        device:
          integration: esphome
    forward_to:
      name: Forward To
      description: The device to forward the call to.
      required: true
      selector:
        device:
          integration: esphome

purge_devices:
  name: Purge Stale Devices
  description: >-
    Remove intercom devices that are no longer reachable from the device
    registry. The HA phonebook sensor rebuilds from live intercom_endpoint
    entities, so purged devices disappear from ESP contact lists on the next
    sensor update. Without a target, every intercom device whose state is
    'unavailable' for at least min_unavailable_hours is removed. With a target,
    the selected device is removed unconditionally. Devices that come back
    online will re-register themselves automatically.
  fields:
    device_id:
      name: Device
      description: Optional specific intercom ESPHome device to purge immediately.
      required: false
      selector:
        device:
          integration: esphome
    min_unavailable_hours:
      name: Minimum Hours Unavailable
      description: >-
        Only purge devices that have been unavailable for at least this many
        hours. Default 0 = purge immediately. Use a higher value (e.g. 1) to
        avoid wiping devices that are only briefly offline (OTA updates,
        reboots).
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 168
          step: 0.5
          unit_of_measurement: h
          mode: box
