purge_devices:
  name: Purge Stale Devices
  description: >-
    Remove VoIP devices that are no longer reachable from the device
    registry. The HA phonebook sensor rebuilds from live voip_endpoint
    entities, so purged devices disappear from ESP contact lists on the next
    sensor update. Without a target, every VoIP device whose state is
    'unavailable' for at least min_unavailable_hours is removed. With a target,
    the selected device is removed unconditionally. Devices that come back
    online will re-register themselves automatically.
  fields:
    device_id:
      name: Device
      description: Optional specific VoIP ESPHome device to purge immediately.
      required: false
      selector:
        device:
          filter:
            - integration: esphome
    min_unavailable_hours:
      name: Minimum Hours Unavailable
      description: >-
        Only purge devices that have been unavailable for at least this many
        hours. Default 0 = purge immediately. Use a higher value (e.g. 1) to
        avoid wiping devices that are only briefly offline (OTA updates,
        reboots).
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 168
          step: 0.5
          unit_of_measurement: h
          mode: box

answer:
  name: Answer call
  description: Answer the ringing call on the selected phone. Omit the phone to use the default Home Assistant softphone.
  fields:
    device_id:
      name: Phone
      description: Optional Home Assistant or ESPHome phone device.
      required: false
      selector:
        device:
          filter:
            - integration: voip_stack
            - integration: esphome
    send_video:
      name: Send video
      description: Send the browser camera when video is enabled for this phone.
      required: false
      default: false
      selector:
        boolean:
    advanced:
      name: Advanced options
      description: Select a specific concurrent call.
      collapsed: true
      fields:
        call_id:
          name: Call ID
          description: Select a specific call when more than one call is ringing.
          required: false
          selector:
            text:

decline:
  name: Decline call
  description: Decline the ringing call on the selected phone. Omit the phone to use the default Home Assistant softphone.
  fields:
    device_id:
      name: Phone
      description: Optional Home Assistant or ESPHome phone device.
      required: false
      selector:
        device:
          filter:
            - integration: voip_stack
            - integration: esphome
    advanced:
      name: Advanced options
      description: Select a specific call or customize its SIP rejection.
      collapsed: true
      fields:
        call_id:
          name: Call ID
          required: false
          selector:
            text:
        status:
          name: SIP status
          required: false
          default: 603
          selector:
            number:
              min: 400
              max: 699
              step: 1
              mode: box
        reason:
          name: SIP reason
          required: false
          default: Decline
          selector:
            text:
        decline_reason:
          name: Automation reason
          required: false
          default: declined
          selector:
            text:

call:
  name: Call
  description: Call a phonebook contact, extension, group, number or SIP address.
  fields:
    device_id:
      name: Calling phone
      description: Optional phone that starts the call. Omit it to use the default Home Assistant softphone.
      required: false
      selector:
        device:
          filter:
            - integration: voip_stack
            - integration: esphome
    destination:
      name: Destination
      description: Phonebook name, extension, group, number or SIP address.
      required: true
      selector:
        text:
    send_video:
      name: Send video
      description: Offer the browser camera when video is enabled for this phone.
      required: false
      default: false
      selector:
        boolean:
    advanced:
      name: Advanced options
      description: Explicit routing controls.
      collapsed: true
      fields:
        ha_bridge:
          name: Force routing through HA
          required: false
          default: false
          selector:
            boolean:

forward:
  name: Forward call
  description: Forward the current ringing or active call to another destination.
  fields:
    device_id:
      name: Phone
      description: Optional Home Assistant phone that owns the call.
      required: false
      selector:
        device:
          filter:
            - integration: voip_stack
    destination:
      name: Destination
      description: Phonebook name, extension, group, number or SIP address.
      required: true
      selector:
        text:
    on_failure:
      name: On failure
      description: Resume the original HA ringing call, terminate it, or return busy if the new destination fails.
      required: false
      default: resume
      selector:
        select:
          options:
            - resume
            - terminate
            - busy
    advanced:
      name: Advanced options
      description: Select a specific concurrent call or reject stale automation decisions.
      collapsed: true
      fields:
        call_id:
          name: Call ID
          required: false
          selector:
            text:
        expected_state:
          name: Expected state
          required: false
          selector:
            text:
        expected_sequence:
          name: Expected sequence
          required: false
          default: 0
          selector:
            number:
              min: 0
              step: 1
              mode: box

set_deadline:
  name: "Advanced: Set call deadline"
  description: Arm an explicit calling or ringing deadline. Expiry emits an automation event but never changes routing by itself.
  fields:
    call_id:
      name: Call ID
      required: true
      selector:
        text:
    phase:
      name: Phase
      required: true
      selector:
        select:
          options:
            - calling
            - ringing
    timeout:
      name: Timeout
      description: Seconds before the timeout-requested event is emitted if the call has not changed state.
      required: true
      selector:
        number:
          min: 0.1
          max: 3600
          step: 0.1
          unit_of_measurement: s
          mode: box
    expected_state:
      name: Expected state
      description: Optional stale-automation guard copied from the call event.
      required: false
      selector:
        text:
    expected_sequence:
      name: Expected sequence
      description: Optional stale-automation guard copied from the call event.
      required: false
      default: 0
      selector:
        number:
          min: 0
          step: 1
          mode: box

cancel_deadline:
  name: "Advanced: Cancel call deadline"
  description: Cancel a previously armed deadline without changing the call.
  fields:
    call_id:
      name: Call ID
      required: true
      selector:
        text:

route:
  name: "Advanced: Apply route decision"
  description: Apply an automation dial-plan decision to a pending inbound SIP route.
  fields:
    call_id:
      name: Call ID
      description: Pending SIP Call-ID from voip_stack.route_request.
      required: true
      selector:
        text:
    action:
      name: Action
      required: false
      default: default
      selector:
        select:
          options:
            - answer_ha
            - decline
            - busy
            - forward
            - bridge
            - default
            - cancel
    destination:
      name: Destination
      description: Contact ID/name, number, user@host, or sip:user@host URI for forward/bridge.
      required: false
      selector:
        text:
    status:
      name: SIP Status
      description: Optional final SIP status for decline/cancel decisions.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 699
          step: 1
          mode: box
    reason:
      name: Reason
      description: SIP reason phrase.
      required: false
      selector:
        text:
    decline_reason:
      name: Decline reason
      description: Application terminal reason propagated in SIP Reason and X-Voip-Stack-Decline-Reason headers.
      required: false
      selector:
        text:

select_inbound_destination:
  name: Select inbound call destination
  description: Send a new inbound call to a phone, group, extension or Assist. Normally only Destination is needed.
  fields:
    destination:
      name: Destination
      description: Phonebook name, group, extension, registered phone, Assist extension, SIP URI or routable number.
      required: true
      selector:
        text:
    advanced:
      name: Advanced options
      description: Select one of several simultaneous route requests or reject stale decisions.
      collapsed: true
      fields:
        call_id:
          name: Call ID
          required: false
          selector:
            text:
        expected_state:
          name: Expected state
          required: false
          selector:
            text:
        expected_sequence:
          name: Expected sequence
          required: false
          default: 0
          selector:
            number:
              min: 0
              step: 1
              mode: box

hangup:
  name: Hang up
  description: End the call on the selected phone. Omit the phone to use the default Home Assistant softphone.
  fields:
    device_id:
      name: Phone
      description: Optional Home Assistant or ESPHome phone device.
      required: false
      selector:
        device:
          filter:
            - integration: voip_stack
            - integration: esphome
    advanced:
      name: Advanced options
      description: Select a specific concurrent call.
      collapsed: true
      fields:
        call_id:
          name: Call ID
          required: false
          selector:
            text:

add_contact:
  name: Add Phonebook Contact
  description: Add or replace one manual contact in the central JSON phonebook.
  fields:
    name:
      name: Name
      description: Contact name. If ID is omitted, this is also used as the contact ID.
      required: true
      selector:
        text:
    id:
      name: Optional ID
      description: Optional stable ID. Defaults to Name.
      required: false
      selector:
        text:
    address:
      name: Optional Address
      description: Optional IP or host for a direct local SIP endpoint. Use with SIP Port and Transport when the contact is directly reachable.
      required: false
      selector:
        text:
    sip_uri:
      name: Optional SIP URI
      description: Optional complete SIP URI, for example sip:kitchen@192.168.1.50:5060;transport=udp. When omitted, HA resolves the contact by name, extension, registration or trunk number.
      required: false
      selector:
        text:
    extension:
      name: Optional Extension
      description: Optional local/internal dial-plan alias such as 101. Inbound DTMF and internal callers resolve this field before external numbers.
      required: false
      selector:
        text:
    number:
      name: Optional Number
      description: Optional external/public number used for trunk calls.
      required: false
      selector:
        text:
    ha_bridge:
      name: Optional Bridge Via HA
      description: Force HA routing even when the contact has a direct SIP endpoint.
      required: false
      default: false
      selector:
        boolean:
    transport:
      name: Optional SIP Transport
      description: Optional signaling transport for a direct SIP endpoint. RTP remains UDP.
      required: false
      selector:
        select:
          options:
            - tcp
            - udp
    port:
      name: Optional SIP Port
      description: Optional SIP signaling port for address-based contacts. Defaults to 5060.
      required: false
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box
    rtp_port:
      name: Optional RTP Port
      description: Optional RTP media port for direct local SIP endpoints. Defaults to 40000 when omitted.
      required: false
      selector:
        number:
          min: 1
          max: 65535
          step: 1
          mode: box
    tx_rate:
      name: Optional TX Rate
      description: Optional manual TX sample-rate metadata. Use auto when omitted.
      required: false
      selector:
        text:
    rx_rate:
      name: Optional RX Rate
      description: Optional manual RX sample-rate metadata. Use auto when omitted.
      required: false
      selector:
        text:
    tx_formats:
      name: Optional TX Formats
      description: Optional TX RTP PCM format tokens, for example 16000:s16le:1:20.
      required: false
      selector:
        text:
    rx_formats:
      name: Optional RX Formats
      description: Optional RX RTP PCM format tokens, for example 48000:s16le:1:10.
      required: false
      selector:
        text:
    max_payload_bytes:
      name: Optional Max RTP Payload Bytes
      description: Optional RTP PCM payload limit. Default is 1200 when omitted.
      required: false
      selector:
        number:
          min: 256
          max: 1400
          step: 1
          mode: box
    conference_group:
      name: Optional Conference Group
      description: Adds this contact as a member of one or more VoIP conference groups. Use a comma-separated list for multiple groups.
      required: false
      selector:
        text:
    conference_ring:
      name: Ring On Conference Start
      description: Rings this contact when another participant starts its conference group. The contact can still join manually when this is off.
      required: false
      default: false
      selector:
        boolean:
    ring_group:
      name: Optional Ring Group
      description: Adds this contact as a member of one or more VoIP ring groups. Use a comma-separated list for multiple groups.
      required: false
      selector:
        text:

remove_contact:
  name: Remove Phonebook Contact
  description: Remove one manual contact from the central JSON phonebook by name.
  fields:
    name:
      name: Name
      required: true
      selector:
        text:

set_contacts:
  name: Set Phonebook Contacts
  description: Replace manual contacts with a JSON roster document.
  fields:
    roster_json:
      name: Roster JSON
      required: true
      selector:
        text:
          multiline: true

clear_contacts:
  name: Clear Phonebook Contacts
  description: Clear manual contacts from the central JSON phonebook.

export_phonebook:
  name: Export Phonebook
  description: Return the current central JSON phonebook privately to the administrator.

push_phonebook:
  name: Push Phonebook
  description: >-
    Push the current central JSON phonebook to all online ESP endpoints. The
    normal path is automatic: phonebook changes trigger a push, and HA refreshes
    again when an ESPHome *_set_roster_json service registers after reboot.
    Use this for diagnostics or manual recovery.

set_dnd:
  name: Set do not disturb
  description: Enable or disable do not disturb on a Home Assistant phone.
  fields:
    device_id:
      name: Phone
      description: Optional Home Assistant phone. Omit it to use the default phone.
      required: false
      selector:
        device:
          filter:
            - integration: voip_stack
    dnd:
      name: Do not disturb
      required: true
      selector:
        boolean:

set_auto_answer:
  name: Set auto answer
  description: Enable or disable automatic answering on a Home Assistant phone.
  fields:
    device_id:
      name: Phone
      description: Optional Home Assistant phone. Omit it to use the default phone.
      required: false
      selector:
        device:
          filter:
            - integration: voip_stack
    auto_answer:
      name: Auto answer
      required: true
      selector:
        boolean:

set_send_video:
  name: Set send video
  description: Enable or disable camera transmission by default on a Home Assistant phone.
  fields:
    device_id:
      name: Phone
      description: Optional Home Assistant phone. Omit it to use the default phone.
      required: false
      selector:
        device:
          filter:
            - integration: voip_stack
    send_video:
      name: Send video
      required: true
      selector:
        boolean:

set_ha_softphone_settings:
  name: Configure Home Assistant phone
  description: >-
    Set the Home Assistant softphone extension, ring group, conference group
    ring-on-conference behavior, auto answer and default camera transmission.
    A manually entered group name is a valid declaration: the HA softphone
    endpoint publishes it to the central phonebook, which creates or updates
    the dynamic group like it does for ESP endpoints.
  fields:
    device_id:
      name: Phone
      description: Optional Home Assistant phone. Omit it to use the default phone.
      required: false
      selector:
        device:
          filter:
            - integration: voip_stack
    extension:
      name: Extension
      description: Optional extension number published by the Home Assistant softphone endpoint.
      required: false
      selector:
        text:
    ring_group:
      name: Ring Group
      description: Optional PBX-style ring group membership for the Home Assistant softphone. Use a comma-separated list for multiple groups.
      required: false
      selector:
        text:
    conference_group:
      name: Conference Group
      description: Optional conference room membership for the Home Assistant softphone. Use a comma-separated list for multiple groups.
      required: false
      selector:
        text:
    conference_ring:
      name: Ring On Conference
      description: Ring the Home Assistant softphone when another participant starts or joins the selected conference group.
      required: false
      selector:
        boolean:
    auto_answer:
      name: Auto answer
      description: Automatically answer incoming calls on this logical phone when an attached browser has microphone permission.
      required: false
      selector:
        boolean:
    send_video:
      name: Send video
      description: Send an attached browser camera by default when video is negotiated and browser permission is available.
      required: false
      selector:
        boolean:

create_account:
  name: Create SIP Account
  description: Create or replace a local SIP account for a standard SIP endpoint registering to Home Assistant.
  fields:
    username:
      name: Username
      description: SIP username and central phonebook ID, for example MobileOffice.
      required: true
      selector:
        text:
    display_name:
      name: Optional Display Name
      description: Optional friendly name shown in the central phonebook.
      required: false
      selector:
        text:
    password:
      name: Optional Password
      description: Optional password, preserved exactly as entered and never echoed. If omitted, Home Assistant generates one and returns it only in this administrator service response.
      required: false
      selector:
        text:
          type: password
    enabled:
      name: Optional Enabled
      required: false
      default: true
      selector:
        boolean:
    replace:
      name: Optional Replace Existing
      required: false
      default: false
      selector:
        boolean:
    extension:
      name: Optional Extension
      description: Optional internal extension published in the central phonebook. When set, this SIP endpoint can be called by name or by extension.
      required: false
      selector:
        text:
    conference_group:
      name: Optional Conference Group
      description: Adds this registered SIP endpoint account to one or more conference groups. Use a comma-separated list for multiple groups.
      required: false
      selector:
        text:
    conference_ring:
      name: Ring On Conference Start
      description: Rings this registered SIP endpoint when another participant starts its conference group. The endpoint can still join manually when this is off.
      required: false
      default: false
      selector:
        boolean:
    ring_group:
      name: Optional Ring Group
      description: Adds this registered SIP endpoint account to one or more ring groups. Use a comma-separated list for multiple groups.
      required: false
      selector:
        text:

remove_account:
  name: Remove SIP Endpoint Account
  description: Remove one local SIP account and its active registration.
  fields:
    username:
      name: Username
      required: true
      selector:
        text:

rotate_account_password:
  name: Rotate SIP Endpoint Password
  description: Generate a new password for a local SIP account, clear its active registration and return the replacement only in this administrator service response.
  fields:
    username:
      name: Username
      required: true
      selector:
        text:

enable_account:
  name: Enable SIP Endpoint Account
  description: Enable a local SIP account.
  fields:
    username:
      name: Username
      required: true
      selector:
        text:

disable_account:
  name: Disable SIP Endpoint Account
  description: Disable a local SIP account and clear its active registration.
  fields:
    username:
      name: Username
      required: true
      selector:
        text:

list_accounts:
  name: List SIP Endpoint Accounts
  description: Return configured local SIP endpoint accounts without passwords to the administrator who called this service.
