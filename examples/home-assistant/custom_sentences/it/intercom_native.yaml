language: it

intents:
  IntercomCall:
    data:
      - sentences:
          - "chiama {target}"
  IntercomHangup:
    data:
      - sentences:
          - "riaggancia"
          - "termina la chiamata"
  IntercomAnswer:
    data:
      - sentences:
          - "rispondi"
          - "rispondi alla chiamata"
  IntercomDecline:
    data:
      - sentences:
          - "rifiuta"
          - "rifiuta la chiamata"

lists:
  target:
    wildcard: true
