# Doorbell Notification Automation
#
# When an ESP device calls your Home Assistant location name, it fires an
# esphome.voip_call event. This automation sends a push notification with
# action buttons.
#
# Event data available:
#   trigger.event.data.caller      - Device name (e.g., "Intercom Spotpear Ball v2")
#   trigger.event.data.destination - Your HA location name
#   trigger.event.data.type        - "doorbell"
#
# Replace notify.mobile_app_your_phone with your mobile app service.
# Replace every /lovelace/intercom value with the dashboard view that contains
# your voip-stack-card, for example /your-dashboard/your-view. If Home Assistant
# generated a URL ending in /0, that simply means the first Lovelace view has no
# custom path.

alias: Doorbell Notification
description: Send push notification when doorbell rings - tap to open intercom
triggers:
  - trigger: event
    event_type: esphome.voip_call
conditions: []
actions:
  - action: notify.mobile_app_your_phone
    data:
      title: "Incoming Call"
      message: "{{ trigger.event.data.caller }} is calling..."
      data:
        tag: voip_call
        url: /lovelace/intercom
        clickAction: /lovelace/intercom
        channel: doorbell
        importance: high
        ttl: 0
        priority: high
        actions:
          - action: URI
            title: "Answer"
            uri: /lovelace/intercom?voip_answer=1
          - action: DECLINE_INTERCOM
            title: "Decline"
  - action: persistent_notification.create
    data:
      title: "Incoming Call"
      message: "{{ trigger.event.data.caller }} is calling..."
      notification_id: voip_call
  - wait_for_trigger:
      - trigger: event
        event_type: mobile_app_notification_action
        event_data:
          action: DECLINE_INTERCOM
    timeout: "00:00:30"
  - if:
      - condition: template
        value_template: "{{ wait.trigger is not none }}"
    then:
      - action: homeassistant_voip_stack.decline
        target:
          device_id: "{{ trigger.event.data.device_id }}"
        data:
          reason: declined
      - action: notify.mobile_app_your_phone
        data:
          message: clear_notification
          data:
            tag: voip_call
    else:
      - action: notify.mobile_app_your_phone
        data:
          message: clear_notification
          data:
            tag: voip_call
mode: single
