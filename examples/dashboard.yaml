# Example Lovelace Dashboard for VoIP Stack
#
# Each device section includes the VoIP Stack card plus common device controls:
# volume, mic gain, AEC on/off, AEC mode select, auto answer, wake word,
# mic mute, and speaker mute.

title: VoIP Stack
views:
  - title: VoIP Stack
    icon: mdi:phone-voip
    cards: []
    type: sections
    max_columns: 2
    sections:
      # --- Home Assistant softphone ---
      - type: grid
        cards:
          - type: custom:voip-stack-card
            mode: ha_softphone
            name: Home Assistant Phone
          - type: markdown
            title: Rubrica VoIP
            content: |-
              {% set raw = state_attr('sensor.voip_phonebook', 'roster_json') %}
              {% set roster = raw | from_json if raw else {'contacts': []} %}
              {% set contacts = roster.get('contacts', []) %}
              {% if contacts | count == 0 %}
              _Nessun contatto disponibile._
              {% else %}
              {% for contact in contacts if contact.get('enabled', true) %}
              {% set name = contact.get('name') or contact.get('id') or 'Senza nome' %}
              {% set extension = contact.get('extension', '') %}
              {% set number = contact.get('number', '') %}
              <ha-icon icon="{{ 'mdi:phone-classic' if number else 'mdi:account-voice' }}"></ha-icon> **{{ name }}**

              {% if extension %}&nbsp;&nbsp;&nbsp;&nbsp;↳ Interno: `{{ extension }}`<br>
              {% endif %}{% if number %}&nbsp;&nbsp;&nbsp;&nbsp;↳ Numero: [{{ number }}](tel:{{ number | replace(' ', '') }})<br>
              {% endif %}
              {% endfor %}
              {% endif %}
      # --- VA + VoIP device (with AEC mode select) ---
      - type: grid
        cards:
          - type: custom:voip-stack-card
            entity_id: <your_device_id>
            name: My ESP Phone
          - type: entities
            entities:
              - entity: number.<your_device>_master_volume
                name: Volume
              - entity: number.<your_device>_mic_gain
                name: Mic gain
              - entity: switch.<your_device>_echo_cancellation
              - entity: select.<your_device>_aec_mode
              - entity: switch.<your_device>_auto_answer
              - entity: button.<your_device>_restart
              - entity: sensor.<your_device>_contacts
              - entity: select.<your_device>_wake_word
              - entity: switch.<your_device>_wake_word
              - entity: switch.<your_device>_mic_mute
              - entity: switch.<your_device>_speaker_mute
      # --- VoIP-only device (no VA, no wake word) ---
      - type: grid
        cards:
          - type: custom:voip-stack-card
            entity_id: <your_device_id>
            name: Room Phone
          - type: entities
            entities:
              - entity: number.<your_device>_master_volume
                name: Volume
              - entity: number.<your_device>_mic_gain
                name: Mic gain
              - entity: switch.<your_device>_echo_cancellation
              - entity: switch.<your_device>_auto_answer
              - entity: button.<your_device>_restart
              - entity: switch.<your_device>_mic_mute
              - entity: switch.<your_device>_speaker_mute
