# Example Lovelace Dashboard for VoIP Stack
#
# Each device section includes the VoIP Stack card plus common device controls:
# volume, mic gain, AEC on/off, AEC mode select, auto answer, wake word,
# mic mute, and speaker mute.

title: VoIP Stack
views:
  - title: VoIP Stack
    icon: mdi:phone-voip
    cards: []
    type: sections
    max_columns: 2
    sections:
      # --- Home Assistant softphone ---
      - type: grid
        cards:
          - type: custom:voip-stack-card
            mode: ha_softphone
            name: Home Assistant Phone
      # --- VA + VoIP device (with AEC mode select) ---
      - type: grid
        cards:
          - type: custom:voip-stack-card
            entity_id: <your_device_id>
            name: My ESP Phone
          - type: entities
            entities:
              - entity: number.<your_device>_master_volume
                name: Volume
              - entity: number.<your_device>_mic_gain
                name: Mic gain
              - entity: switch.<your_device>_echo_cancellation
              - entity: select.<your_device>_aec_mode
              - entity: switch.<your_device>_auto_answer
              - entity: button.<your_device>_restart
              - entity: sensor.<your_device>_contacts
              - entity: select.<your_device>_wake_word
              - entity: switch.<your_device>_wake_word
              - entity: switch.<your_device>_mic_mute
              - entity: switch.<your_device>_speaker_mute
      # --- VoIP-only device (no VA, no wake word) ---
      - type: grid
        cards:
          - type: custom:voip-stack-card
            entity_id: <your_device_id>
            name: Room Phone
          - type: entities
            entities:
              - entity: number.<your_device>_master_volume
                name: Volume
              - entity: number.<your_device>_mic_gain
                name: Mic gain
              - entity: switch.<your_device>_echo_cancellation
              - entity: switch.<your_device>_auto_answer
              - entity: button.<your_device>_restart
              - entity: switch.<your_device>_mic_mute
              - entity: switch.<your_device>_speaker_mute
