# =============================================================================
# GENERIC ESP32-S3 VOIP SPEAKER-ONLY - native ESPHome audio
# =============================================================================
# Standalone speaker-only VoIP profile for native ESPHome audio.
#
# Purpose:
#   - No esp_audio_stack.
#   - No esp_aec / esp_afe software processing.
#   - esphome_voip_stack talks directly to standard ESPHome microphone/speaker.
#   - Useful for hardware that already outputs processed audio, e.g. XMOS AEC
#     boards, and for testing mic-only / speaker-only / full-duplex code paths.
#
# Endpoint mode: speaker_only. This profile publishes a speaker and no
# microphone source, so it can play remote audio but cannot send mic audio.
#
# Tested hardware example:
#   - Generic ESP32-S3 with PSRAM.
#   - MAX98357A amplifier on one I2S controller.
# This is only the tested wiring example; native ESPHome audio can also be
# adapted to hardware that exposes a speaker through another ESPHome speaker
# platform.
#
# Tested wiring target: Freenove ESP32-S3-WROOM CAM / FNK0085, camera removed.
# Change pins for your board.
#
# MAX98357A:
#   BCLK     -> GPIO12
#   LRC/WS   -> GPIO13
#   DIN      -> GPIO14
#   SD/EN    -> GPIO18 (optional; tie high instead if your module prefers)
#   VIN      -> 5V or 3V3 according to your MAX98357A module
#   GND      -> GND
# =============================================================================

substitutions:
  name: generic-native-int-spk
  friendly_name: Generic S3 Native VoIP Speaker Only

  ext_components_source: "../../../esphome/components"

  speaker_enable_pin: GPIO18
  status_led_pin: GPIO48
  status_led_chipset: WS2812
  status_led_rgb_order: GRB

packages:
  voip_transport: !include ../../../packages/voip/transport.yaml
  phonebook_subscribe: !include ../../../packages/voip/phonebook_subscribe.yaml
  ha_api: !include ../../../packages/voip/ha_api.yaml
  voip_auto_entities: !include ../../../packages/voip/auto_entities.yaml
  voip_buttons: !include ../../../packages/voip/buttons_base.yaml
  s3_base: !include ../../../packages/platform/esp32s3_base.yaml
  native_diagnostics: !include ../../../packages/diagnostics/native.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: freenove_esp32_s3_wroom
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    esphome_voip_stack: INFO
    esphome_voip_stack.fsm: INFO
    esphome_voip_stack.tcp: INFO
    esphome_voip_stack.udp: INFO
    esphome_voip_stack.audio: INFO
    esphome_voip_stack.settings: INFO
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN
    i2s_audio: INFO
    speaker: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [esphome_voip_stack, audio_processor]

output:
  - platform: gpio
    id: speaker_enable
    pin: ${speaker_enable_pin}

switch:
  - platform: output
    id: speaker_power
    name: Speaker Power
    output: speaker_enable
    restore_mode: RESTORE_DEFAULT_ON

i2s_audio:
  - id: tx_i2s
    i2s_bclk_pin: GPIO12
    i2s_lrclk_pin: GPIO13

# Native ESPHome speaker. Keep it at VoIP wire format to avoid a
# resampler in this regression profile.
speaker:
  - platform: i2s_audio
    id: voip_speaker_input
    dac_type: external
    i2s_audio_id: tx_i2s
    i2s_dout_pin: GPIO14
    channel: mono
    sample_rate: 48000
    bits_per_sample: 16bit
    buffer_duration: 128ms
    timeout: 500ms

esphome_voip_stack:
  id: phone
  task_stacks_in_psram: true
  buffers_in_psram: true
  audio:
    rx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
  speaker: voip_speaker_input
  dc_offset_removal: false
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1
