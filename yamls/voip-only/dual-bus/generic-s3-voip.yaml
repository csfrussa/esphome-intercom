# =============================================================================
# GENERIC ESP32-S3 VOIP - Dual I2S bus, no hardware codec
# =============================================================================
# Generic SIP phone profile. It keeps the AEC-only audio pipeline small and
# exposes standard SIP signaling plus RTP media through esphome_voip_stack.
#
# ESP-to-ESP calls use the unified phonebook from HA.
#
# Audio pipeline:
#   MEMS mic -> RX I2S bus -> esp_audio_stack (48kHz) -> esp_ae_rate_cvt -> esp_aec -> VoIP TX
#   VoIP RX (16kHz) -> resampler -> esp_audio_stack -> TX I2S bus -> class-D amp
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Freenove ESP32-S3 WROOM N8R8, or equivalent S3 with octal PSRAM
#   - Microphone: Any I2S MEMS mic on DIN pin
#   - Speaker: Any I2S class-D amp on DOUT pin
#   - Mic and speaker use separate I2S controllers. ESP32-S3 is master on both.
#   - LED: SK6812/WS2812 RGB (optional)
#
# GPIO PINOUT (Freenove ESP32-S3 WROOM N8R8 example):
#   RX I2S:  BCLK=GPIO9,  LRCLK=GPIO10, DIN=GPIO11 (mic)
#   TX I2S:  BCLK=GPIO12, LRCLK=GPIO13, DOUT=GPIO14 (speaker)
#   LED:         DATA=GPIO48
#
# =============================================================================

substitutions:
  # Hardware identity stays stable across YAML updates so HA entities and
  # ESPHome build cache are reused.
  name: generic-s3-dual-bus
  friendly_name: Generic S3 Dual Bus

  ext_components_source: "../../../esphome/components"
  speaker_enable_pin: GPIO18
  status_led_pin: GPIO48
  status_led_chipset: WS2812
  status_led_rgb_order: GRB

# =============================================================================
# Package: shared VoIP state machine
# =============================================================================
packages:
  core: !include ../../../packages/voip_only.yaml
  buttons_switches: !include ../../../packages/voip/buttons_switches.yaml
  call_settings: !include ../../../packages/voip/call_settings.yaml
  ha_api: !include ../../../packages/voip/ha_api.yaml
  phonebook_subscribe: !include ../../../packages/voip/phonebook_subscribe.yaml
  voip_transport: !include ../../../packages/voip/transport.yaml
  speaker_mute: !include ../../../packages/voip/speaker_mute.yaml
  s3_base: !include ../../../packages/platform/esp32s3_base.yaml
  native_diagnostics: !include ../../../packages/diagnostics/native.yaml
  status_led: !include ../../../packages/led/status_ws2812_single.yaml
  audio_stack_controls: !include ../../../packages/esp_audio_stack/controls.yaml
  audio_stack_aec_controls: !include ../../../packages/esp_audio_stack/aec_controls.yaml
  speaker_power: !include ../../../packages/esp_audio_stack/speaker_power_output.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: freenove_esp32_s3_wroom
  variant: esp32s3
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      # Allow mbedtls to allocate its working buffers in PSRAM.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Route ESP-IDF stdout (and ESPHome logger when hardware_uart=USB_SERIAL_JTAG)
      # to the built-in USB-Serial-JTAG peripheral. Required on boards where the
      # USB-C connector is wired to the S3's native USB-Serial-JTAG (e.g. Freenove,
      # bare ESP32-S3-DevKitC-1) rather than to an external USB-UART chip.
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  # DEBUG keeps SIP signaling + AEC/AFE/i2s lifecycle visible.
  # Mute chatty ESPHome built-ins below; project components stay at DEBUG.
  level: INFO
  logs:
    esphome_voip_stack: INFO
    esphome_voip_stack.fsm: INFO
    esphome_voip_stack.tcp: INFO
    esphome_voip_stack.udp: INFO
    esphome_voip_stack.audio: INFO
    esphome_voip_stack.settings: INFO
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [esphome_voip_stack, esp_audio_stack, esp_aec, audio_processor]

output:
  - platform: gpio
    id: speaker_enable
    pin: ${speaker_enable_pin}

# =============================================================================
# SIP signaling is owned by esphome_voip_stack. `transport: udp` selects SIP/UDP;
# audio remains RTP/UDP in the current profile. C++ side:
#  - esphome_voip_stack.start() sends SIP INVITE
#  - peer receives INVITE and enters ringing/in_call from SIP status
#  - esphome_voip_stack.stop() sends CANCEL or BYE depending on dialog state
# No YAML signaling lambdas and no external helper component.
# =============================================================================

# =============================================================================
# AEC
# =============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 8
  mode: voip_high_perf

# =============================================================================
# ESP Audio Stack
# =============================================================================
esp_audio_stack:
  id: audio_stack
  rx_bus:
    i2s_num: 0
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO9
    i2s_din_pin: GPIO11
  tx_bus:
    i2s_num: 1
    i2s_lrclk_pin: GPIO13
    i2s_bclk_pin: GPIO12
    i2s_dout_pin: GPIO14
  sample_rate: 48000
  output_sample_rate: 16000
  bits_per_sample: 32
  slot_bit_width: 32
  correct_dc_offset: true
  mic_channel: right
  rx_slot_mode: stereo
  processor_id: aec_processor
  # VoIP-only no-codec reference: keep the lighter previous-frame path.
  # The full-experience Freenove profile uses ring_buffer for VA/media AEC
  # tuning, but this preset only needs the hardware pin/channel fixes above.
  aec_reference: previous_frame
  buffers_in_psram: true
  audio_task_stack_in_psram: true

# =============================================================================
# Microphone
# =============================================================================
microphone:
  - platform: esp_audio_stack
    id: mic_main
    esp_audio_stack_id: audio_stack

# =============================================================================
# Speaker
# =============================================================================
speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: voip_speaker_input
    output_speaker: hw_speaker
    bits_per_sample: 16

# =============================================================================
# ESPHome VoIP Stack: Device part (merged with package callbacks)
# =============================================================================
# SIP: the HA phonebook subscription provides SIP contacts in the unified
# roster. esphome_voip_stack.start auto-binds signaling and RTP to the selected
# endpoint.
esphome_voip_stack:
  id: phone
  buffers_in_psram: true
  # SIP signaling transport only. Use `tcp` when this endpoint must signal over
  # SIP TCP; audio remains RTP/UDP after SDP negotiation.
  transport: udp
  audio:
    # Primary/preferred RTP profile: 48 kHz/10 ms toward the speaker, and a
    # matching 10 ms TX reframe of the 16 kHz mic for peers that negotiate
    # ptime 10. 32 kHz/16 ms remains an alternate advertised format.
    tx_formats:
      - sample_rate: 16000
        pcm_format: s16le
        channels: 1
        frame_ms: 10
    rx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
    # Additional accepted RX formats for direct ESP-to-ESP calls. These are valid
    # only because speaker: voip_speaker_input points at the resampler; do
    # not advertise additional formats when wiring esphome_voip_stack directly to a
    # fixed-rate mixer input.
    rx_formats:
      - sample_rate: 32000
        pcm_format: s16le
        channels: 1
        frame_ms: 16
      - sample_rate: 16000
        pcm_format: s16le
        channels: 1
        frame_ms: 16
      - sample_rate: 16000
        pcm_format: s16le
        channels: 1
        frame_ms: 32
  microphone: mic_main
  speaker: voip_speaker_input
  dc_offset_removal: false
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1

# =============================================================================
# Switches (device-specific)
# =============================================================================
switch:

# =============================================================================
# AEC Mode Select
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    # VoIP-only standard: stay inside the dios_ssp_aec engine. The two
    # VOIP modes share the same engine, so a runtime switch never triggers
    # an esp_aec3 FFT alloc and avoids the silent calloc-fail bug observed
    # at filter_length>4 on cross-engine transitions. SR modes are not
    # offered here because no MWW is present in this configuration.
    options:
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "voip_high_perf"
    optimistic: false
    restore_value: true
    set_action:
      - if:
          condition:
            not:
              esphome_voip_stack.is_idle:
          then:
            - logger.log:
                level: WARN
                format: "Cannot switch AEC mode during active VoIP call"
          else:
            - logger.log:
                format: "Switching AEC mode to %s"
                args: ['x.c_str()']
            - esp_audio_stack.stop: audio_stack
            - esp_aec.set_mode:
                id: aec_processor
                mode: !lambda 'return x;'
            - esp_audio_stack.start: audio_stack
      # Reflect actual live mode (covers rejection and silent hardware mode).
      - lambda: |-
          id(aec_mode_select).publish_state(id(aec_processor).get_mode_name());
