# =============================================================================
# GENERIC ESP32-S3 INTERCOM FULL-DUPLEX UDP - native ESPHome audio
# =============================================================================
# Standalone intercom-only profile for native ESPHome audio.
#
# Purpose:
#   - No esp_audio_stack.
#   - No esp_aec / esp_afe software processing.
#   - intercom_api talks directly to standard ESPHome microphone/speaker.
#   - Useful for hardware that already outputs processed audio, e.g. XMOS AEC
#     boards, and for testing mic-only / speaker-only / full-duplex code paths.
#
# Endpoint mode: full_duplex. Mic-only and speaker-only variants live in this
# same folder and remove the unrelated compile-time pieces.
#
# Tested hardware example:
#   - Generic ESP32-S3 with PSRAM.
#   - INMP441 microphone on one I2S controller.
#   - MAX98357A amplifier on a second I2S controller.
# This is only the tested wiring example; native ESPHome audio can also be
# adapted to hardware that exposes mic/speaker on a different bus layout.
#
# Tested wiring target: Freenove ESP32-S3-WROOM CAM / FNK0085, camera removed.
# Change pins for your board.
#
# INMP441:
#   SCK/BCLK -> GPIO9
#   WS/LRCLK -> GPIO10
#   SD/DOUT  -> GPIO11
#   L/R      -> 3V3, tied locally with VDD so the mic outputs right channel
#   VDD      -> 3V3
#   GND      -> GND
#
# MAX98357A:
#   BCLK     -> GPIO12
#   LRC/WS   -> GPIO13
#   DIN      -> GPIO14
#   SD/EN    -> GPIO18 (optional; tie high instead if your module prefers)
#   VIN      -> 5V or 3V3 according to your MAX98357A module
#   GND      -> GND
# =============================================================================

substitutions:
  name: generic-native-int-fd-udp
  friendly_name: Generic S3 Native Intercom Full Duplex UDP

  ext_components_source: "github://n-IA-hane/esphome-intercom@dev"
  intercom_udp_audio_port: "6254"
  intercom_udp_control_port: "6255"

  speaker_enable_pin: GPIO18
  status_led_pin: GPIO48
  status_led_chipset: WS2812
  status_led_rgb_order: GRB

packages:
  intercom_transport: github://n-IA-hane/esphome-intercom/packages/intercom/transport_udp.yaml@dev
  phonebook_subscribe: github://n-IA-hane/esphome-intercom/packages/intercom/phonebook_subscribe.yaml@dev
  ha_api: github://n-IA-hane/esphome-intercom/packages/intercom/ha_api.yaml@dev
  intercom_auto_entities: github://n-IA-hane/esphome-intercom/packages/intercom/auto_entities.yaml@dev
  intercom_buttons: github://n-IA-hane/esphome-intercom/packages/intercom/buttons_base.yaml@dev
  s3_base: github://n-IA-hane/esphome-intercom/packages/platform/esp32s3_base.yaml@dev
  native_diagnostics: github://n-IA-hane/esphome-intercom/packages/diagnostics/native.yaml@dev

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: freenove_esp32_s3_wroom
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN
    i2s_audio: INFO
    microphone: INFO
    speaker: INFO
    intercom_api: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, audio_processor]

output:
  - platform: gpio
    id: speaker_enable
    pin: ${speaker_enable_pin}

switch:
  - platform: output
    id: speaker_power
    name: Speaker Power
    output: speaker_enable
    restore_mode: RESTORE_DEFAULT_ON

i2s_audio:
  - id: rx_i2s
    i2s_bclk_pin: GPIO9
    i2s_lrclk_pin: GPIO10

  - id: tx_i2s
    i2s_bclk_pin: GPIO12
    i2s_lrclk_pin: GPIO13

# Native ESPHome microphone. INMP441 is strapped to the right slot. Keep the
# wire as stereo and let MicrophoneSource select channel 1; this matches the
# stable esp_audio_stack path and avoids mono-slot silence on some IDF/board
# combinations.
microphone:
  - platform: i2s_audio
    id: native_mic_raw
    adc_type: external
    i2s_audio_id: rx_i2s
    i2s_din_pin: GPIO11
    channel: stereo
    sample_rate: 48000
    bits_per_sample: 32bit
    correct_dc_offset: true

# Native ESPHome speaker. Keep it at intercom's wire format to avoid a
# resampler in this regression profile.
speaker:
  - platform: i2s_audio
    id: intercom_speaker_input
    dac_type: external
    i2s_audio_id: tx_i2s
    i2s_dout_pin: GPIO14
    channel: mono
    sample_rate: 48000
    bits_per_sample: 16bit
    buffer_duration: 128ms
    timeout: 500ms

intercom_api:
  id: intercom
  task_stacks_in_psram: true
  buffers_in_psram: true
  audio:
    tx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
    rx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
  microphone_source:
    microphone: native_mic_raw
    bits_per_sample: 16
    channels: [1]
    gain_factor: 1
  speaker: intercom_speaker_input
  dc_offset_removal: false
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1
