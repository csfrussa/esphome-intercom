# =============================================================================
# GENERIC ESP32-S3 INTERCOM (PBX-lite UDP) - Dual I2S bus, no hardware codec
# =============================================================================
# Drop-in UDP variant of generic-s3-intercom-tcp.yaml. It keeps the same AEC-only
# audio pipeline as the TCP file, but uses intercom_api's UDP transport:
# raw L16 audio on udp_audio_port plus MessageHeader signaling on control_port.
#
# ESP-to-ESP calls use the unified phonebook from HA when available. The
# `peer_intercom_ip` fallback remains only for manual two-node testing.
#
# Audio pipeline:
#   MEMS mic -> RX I2S bus -> esp_audio_stack (48kHz) -> esp_ae_rate_cvt -> esp_aec -> intercom TX
#   Intercom RX (16kHz) -> resampler -> esp_audio_stack -> TX I2S bus -> class-D amp
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM
#   - Microphone: Any I2S MEMS mic on DIN pin
#   - Speaker: Any I2S class-D amp on DOUT pin
#   - Mic and speaker use separate I2S controllers. ESP32-S3 is master on both.
#   - LED: SK6812/WS2812 RGB (optional)
#
# GPIO PINOUT (example, change to match your wiring):
#   RX I2S:  BCLK=GPIO36, LRCLK=GPIO37, DIN=GPIO35 (mic)
#   TX I2S:  BCLK=GPIO5,  LRCLK=GPIO6,  DOUT=GPIO7 (speaker)
#   LED:         DATA=GPIO33
#
# =============================================================================

substitutions:
  # Hardware identity is shared with the TCP variant. The selected transport is
  # exposed by the intercom transport sensor and the unified phonebook row.
  name: generic-s3-dual-bus
  friendly_name: Generic S3 Dual Bus

  ext_components_source: "github://n-IA-hane/esphome-intercom@main"

# =============================================================================
# Package: shared intercom state machine
# =============================================================================
packages:
  core: github://n-IA-hane/esphome-intercom/packages/intercom_only.yaml@main
  phonebook_subscribe: github://n-IA-hane/esphome-intercom/packages/intercom/phonebook_subscribe.yaml@main
  intercom_transport: github://n-IA-hane/esphome-intercom/packages/intercom/transport_udp.yaml@main
  speaker_mute: github://n-IA-hane/esphome-intercom/packages/intercom/speaker_mute.yaml@main
  s3_base: github://n-IA-hane/esphome-intercom/packages/platform/esp32s3_base.yaml@main
  native_diagnostics: github://n-IA-hane/esphome-intercom/packages/diagnostics/native.yaml@main
  status_led: github://n-IA-hane/esphome-intercom/packages/led/status_ws2812_single.yaml@main
  audio_stack_controls: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/controls.yaml@main
  audio_stack_aec_controls: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/aec_controls.yaml@main

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      # Allow mbedtls to allocate its working buffers in PSRAM.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Route ESP-IDF stdout (and ESPHome logger when hardware_uart=USB_SERIAL_JTAG)
      # to the built-in USB-Serial-JTAG peripheral. Required on boards where the
      # USB-C connector is wired to the S3's native USB-Serial-JTAG (e.g. Freenove,
      # bare ESP32-S3-DevKitC-1) rather than to an external USB-UART chip.
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: quad
  speed: 80MHz

preferences:
  flash_write_interval: 5min

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  # DEBUG keeps PBX-lite signaling + AEC/AFE/i2s lifecycle visible.
  # Mute chatty ESPHome built-ins below; project components stay at DEBUG.
  level: INFO
  logs:
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, esp_audio_stack, esp_aec, audio_processor]

# =============================================================================
# UDP signaling is owned by intercom_api. START/HANGUP/RING/ANSWER/DECLINE
# flow through the UDP control socket (control_port 6055), with the same
# MessageHeader as the TCP path. C++ side:
#  - intercom_api.start() -> udp_transport.send_control(MSG_START, caller_name)
#  - peer receives START -> FSM goes to RINGING/STREAMING as on TCP
#  - intercom_api.stop() -> send_control(MSG_HANGUP) or DECLINE during setup
# No YAML signaling lambdas, no external UDP helper component.
# =============================================================================

# =============================================================================
# AEC
# =============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 8
  mode: voip_high_perf

# =============================================================================
# ESP Audio Stack
# =============================================================================
esp_audio_stack:
  id: audio_stack
  rx_bus:
    i2s_num: 0
    i2s_lrclk_pin: GPIO37
    i2s_bclk_pin: GPIO36
    i2s_din_pin: GPIO35
  tx_bus:
    i2s_num: 1
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO5
    i2s_dout_pin: GPIO7
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 32
  correct_dc_offset: true
  processor_id: aec_processor
  # Lightweight intercom-only no-codec reference. The component default is
  # ring_buffer (Espressif/ADF TYPE2), but this preset keeps the previous-frame
  # path to avoid the extra reference ring and delay tuning.
  aec_reference: previous_frame
  buffers_in_psram: true

# =============================================================================
# Microphone
# =============================================================================
microphone:
  - platform: esp_audio_stack
    id: mic_main
    esp_audio_stack_id: audio_stack

# =============================================================================
# Speaker
# =============================================================================
speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000

  - platform: resampler
    id: intercom_speaker
    output_speaker: hw_speaker
    bits_per_sample: 16

# =============================================================================
# Intercom API: Device part (merged with package callbacks)
# =============================================================================
# PBX-lite UDP: the HA phonebook subscription provides target-shaped UDP
# contacts in the unified roster. intercom_api.start auto-binds the transport
# to the selected contact endpoint. With an empty phonebook, start() falls back
# to remote_ip/remote_port below.
intercom_api:
  id: intercom
  buffers_in_psram: true
  protocol: udp
  remote_ip: !secret peer_intercom_ip
  microphone: mic_main
  speaker: intercom_speaker
  dc_offset_removal: false
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1

# =============================================================================
# Switches (device-specific)
# =============================================================================
switch:

# =============================================================================
# AEC Mode Select
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    # Intercom-only standard: stay inside the dios_ssp_aec engine. The two
    # VOIP modes share the same engine, so a runtime switch never triggers
    # an esp_aec3 FFT alloc and avoids the silent calloc-fail bug observed
    # at filter_length>4 on cross-engine transitions. SR modes are not
    # offered here because no MWW is present in this configuration.
    options:
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "voip_high_perf"
    optimistic: false
    restore_value: true
    set_action:
      - if:
          condition:
            not:
              intercom_api.is_idle: intercom
          then:
            - logger.log:
                level: WARN
                format: "Cannot switch AEC mode during active intercom call"
          else:
            - logger.log:
                format: "Switching AEC mode to %s"
                args: ['x.c_str()']
            - esp_audio_stack.stop: audio_stack
            - esp_aec.set_mode:
                id: aec_processor
                mode: !lambda 'return x;'
            - esp_audio_stack.start: audio_stack
      # Reflect actual live mode (covers rejection and silent fallback).
      - lambda: |-
          id(aec_mode_select).publish_state(id(aec_processor).get_mode_name());
