# =============================================================================
# GENERIC ESP32-S3 INTERCOM (PBX-lite TCP) - Dual I2S bus, no hardware codec
# =============================================================================
# TCP variant of the dual-bus esp_audio_stack profile. It keeps one audio owner
# for both I2S controllers, so intercom_api stays transport/FSM glue and does
# not compile its standalone AEC speaker/reference path.
#
# Audio pipeline:
#   MEMS mic -> RX I2S bus -> esp_audio_stack (48kHz) -> esp_ae_rate_cvt -> esp_aec -> intercom TX
#   Intercom RX (16kHz) -> resampler -> esp_audio_stack -> TX I2S bus -> class-D amp
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Freenove ESP32-S3 WROOM N8R8, or equivalent S3 with octal PSRAM
#   - Microphone: Any I2S MEMS mic on DIN pin
#   - Speaker: Any I2S class-D amp on DOUT pin
#   - Mic and speaker use separate I2S controllers. ESP32-S3 is master on both.
#   - LED: SK6812/WS2812 RGB (optional)
#
# GPIO PINOUT (Freenove ESP32-S3 WROOM N8R8 example):
#   RX I2S:  BCLK=GPIO9,  LRCLK=GPIO10, DIN=GPIO11 (mic)
#   TX I2S:  BCLK=GPIO12, LRCLK=GPIO13, DOUT=GPIO14 (speaker)
#   LED:         DATA=GPIO48
#
# =============================================================================

substitutions:
  # Hardware identity is shared with the UDP variant. The selected transport is
  # exposed by the intercom transport sensor and the unified phonebook row.
  name: generic-s3-dual-bus
  friendly_name: Generic S3 Dual Bus

  ext_components_source: "github://n-IA-hane/esphome-intercom@dev"
  speaker_enable_pin: GPIO18
  status_led_pin: GPIO48
  status_led_chipset: WS2812
  status_led_rgb_order: GRB

packages:
  core: github://n-IA-hane/esphome-intercom/packages/intercom_only.yaml@dev
  phonebook_subscribe: github://n-IA-hane/esphome-intercom/packages/intercom/phonebook_subscribe.yaml@dev
  intercom_transport: github://n-IA-hane/esphome-intercom/packages/intercom/transport_tcp.yaml@dev
  speaker_mute: github://n-IA-hane/esphome-intercom/packages/intercom/speaker_mute.yaml@dev
  s3_base: github://n-IA-hane/esphome-intercom/packages/platform/esp32s3_base.yaml@dev
  native_diagnostics: github://n-IA-hane/esphome-intercom/packages/diagnostics/native.yaml@dev
  status_led: github://n-IA-hane/esphome-intercom/packages/led/status_ws2812_single.yaml@dev
  audio_stack_controls: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/controls.yaml@dev
  audio_stack_aec_controls: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/aec_controls.yaml@dev
  speaker_power: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/speaker_power_output.yaml@dev

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: freenove_esp32_s3_wroom
  variant: esp32s3
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, esp_audio_stack, esp_aec, audio_processor]

output:
  - platform: gpio
    id: speaker_enable
    pin: ${speaker_enable_pin}

esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 8
  mode: voip_high_perf

esp_audio_stack:
  id: audio_stack
  rx_bus:
    i2s_num: 0
    i2s_lrclk_pin: GPIO10
    i2s_bclk_pin: GPIO9
    i2s_din_pin: GPIO11
  tx_bus:
    i2s_num: 1
    i2s_lrclk_pin: GPIO13
    i2s_bclk_pin: GPIO12
    i2s_dout_pin: GPIO14
  sample_rate: 48000
  output_sample_rate: 16000
  bits_per_sample: 32
  slot_bit_width: 32
  correct_dc_offset: true
  mic_channel: right
  rx_slot_mode: stereo
  processor_id: aec_processor
  # Intercom-only no-codec reference: keep the lighter previous-frame path.
  # The full-experience Freenove profile uses ring_buffer for VA/media AEC
  # tuning, but this preset only needs the hardware pin/channel fixes above.
  aec_reference: previous_frame
  buffers_in_psram: true
  audio_task_stack_in_psram: true

microphone:
  - platform: esp_audio_stack
    id: mic_main
    esp_audio_stack_id: audio_stack

speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000

  - platform: resampler
    id: intercom_speaker
    output_speaker: hw_speaker
    bits_per_sample: 16

intercom_api:
  id: intercom
  buffers_in_psram: true
  microphone: mic_main
  speaker: intercom_speaker
  dc_offset_removal: false
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1

switch:

select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    # Intercom-only standard: stay inside the dios_ssp_aec engine. The two
    # VOIP modes share the same engine, so a runtime switch never triggers
    # an esp_aec3 FFT alloc and avoids the silent calloc-fail bug observed
    # at filter_length>4 on cross-engine transitions.
    options:
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "voip_high_perf"
    optimistic: false
    restore_value: true
    set_action:
      - if:
          condition:
            not:
              intercom_api.is_idle: intercom
          then:
            - logger.log:
                level: WARN
                format: "Cannot switch AEC mode during active intercom call"
          else:
            - logger.log:
                format: "Switching AEC mode to %s"
                args: ['x.c_str()']
            - esp_audio_stack.stop: audio_stack
            - esp_aec.set_mode:
                id: aec_processor
                mode: !lambda 'return x;'
            - esp_audio_stack.start: audio_stack
      - lambda: |-
          id(aec_mode_select).publish_state(id(aec_processor).get_mode_name());
