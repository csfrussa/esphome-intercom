# =============================================================================
# GENERIC ESP32-S3 INTERCOM (PBX-lite TCP) - Dual I2S bus, no hardware codec
# =============================================================================
# TCP variant of the dual-bus esp_audio_stack profile. It keeps one audio owner
# for both I2S controllers, so intercom_api stays transport/FSM glue and does
# not compile its standalone AEC speaker/reference path.
#
# Audio pipeline:
#   MEMS mic -> RX I2S bus -> esp_audio_stack (48kHz) -> esp_ae_rate_cvt -> esp_aec -> intercom TX
#   Intercom RX (16kHz) -> resampler -> esp_audio_stack -> TX I2S bus -> class-D amp
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM
#   - Microphone: Any I2S MEMS mic on DIN pin
#   - Speaker: Any I2S class-D amp on DOUT pin
#   - Mic and speaker use separate I2S controllers. ESP32-S3 is master on both.
#   - LED: SK6812/WS2812 RGB (optional)
#
# GPIO PINOUT (example, change to match your wiring):
#   RX I2S:  BCLK=GPIO36, LRCLK=GPIO37, DIN=GPIO35 (mic)
#   TX I2S:  BCLK=GPIO5,  LRCLK=GPIO6,  DOUT=GPIO7 (speaker)
#   LED:         DATA=GPIO33
#
# =============================================================================

substitutions:
  # Hardware identity is shared with the UDP variant. The selected transport is
  # exposed by the intercom transport sensor and the unified phonebook row.
  name: generic-s3-dual-bus
  friendly_name: Generic S3 Dual Bus

  ext_components_source: "../../../esphome/components"

packages:
  core: !include ../../../packages/intercom_only.yaml
  phonebook_subscribe: !include ../../../packages/intercom/phonebook_subscribe.yaml
  intercom_transport: !include ../../../packages/intercom/transport_tcp.yaml
  speaker_mute: !include ../../../packages/intercom/speaker_mute.yaml
  s3_base: !include ../../../packages/platform/esp32s3_base.yaml
  native_diagnostics: !include ../../../packages/diagnostics/native.yaml
  status_led: !include ../../../packages/led/status_ws2812_single.yaml
  audio_stack_controls: !include ../../../packages/esp_audio_stack/controls.yaml
  audio_stack_aec_controls: !include ../../../packages/esp_audio_stack/aec_controls.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: quad
  speed: 80MHz

preferences:
  flash_write_interval: 5min

api:
  on_client_connected:
    - lambda: |-
        static bool published = false;
        if (!published) {
          published = true;
          id(intercom).publish_entity_states();
        }

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, esp_audio_stack, esp_aec, audio_processor]

esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 8
  mode: voip_high_perf

esp_audio_stack:
  id: audio_stack
  rx_bus:
    i2s_num: 0
    i2s_lrclk_pin: GPIO37
    i2s_bclk_pin: GPIO36
    i2s_din_pin: GPIO35
  tx_bus:
    i2s_num: 1
    i2s_lrclk_pin: GPIO6
    i2s_bclk_pin: GPIO5
    i2s_dout_pin: GPIO7
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 32
  correct_dc_offset: true
  processor_id: aec_processor
  # Lightweight intercom-only no-codec reference. The component default is
  # ring_buffer (Espressif/ADF TYPE2), but this preset keeps the previous-frame
  # path to avoid the extra reference ring and delay tuning.
  aec_reference: previous_frame
  buffers_in_psram: true

microphone:
  - platform: esp_audio_stack
    id: mic_main
    esp_audio_stack_id: audio_stack

speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000

  - platform: resampler
    id: intercom_speaker
    output_speaker: hw_speaker
    bits_per_sample: 16

intercom_api:
  id: intercom
  buffers_in_psram: true
  microphone: mic_main
  speaker: intercom_speaker
  dc_offset_removal: false
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1

switch:

select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    # Intercom-only standard: stay inside the dios_ssp_aec engine. The two
    # VOIP modes share the same engine, so a runtime switch never triggers
    # an esp_aec3 FFT alloc and avoids the silent calloc-fail bug observed
    # at filter_length>4 on cross-engine transitions.
    options:
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "voip_high_perf"
    optimistic: false
    restore_value: true
    set_action:
      - if:
          condition:
            not:
              intercom_api.is_idle: intercom
          then:
            - logger.log:
                level: WARN
                format: "Cannot switch AEC mode during active intercom call"
          else:
            - logger.log:
                format: "Switching AEC mode to %s"
                args: ['x.c_str()']
            - esp_audio_stack.stop: audio_stack
            - esp_aec.set_mode:
                id: aec_processor
                mode: !lambda 'return x;'
            - esp_audio_stack.start: audio_stack
      - lambda: |-
          id(aec_mode_select).publish_state(id(aec_processor).get_mode_name());
