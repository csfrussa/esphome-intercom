# =============================================================================
# GENERIC ESP32-S3 INTERCOM (SIP) - Single I2S bus, no hardware codec
# =============================================================================
# Generic SIP phone profile. It keeps the AEC-only audio pipeline small and
# exposes standard SIP signaling plus RTP media through intercom_api.
#
# ESP-to-ESP calls use the unified phonebook from HA.
#
# Audio pipeline:
#   MEMS mic -> esp_audio_stack (48kHz) -> esp_ae_rate_cvt x3 -> esp_aec -> intercom TX
#   Intercom RX (16kHz) -> resampler -> hw_speaker (48kHz) -> class-D amp
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM
#   - Microphone: Any I2S MEMS mic on DIN pin
#   - Speaker: Any I2S class-D amp on DOUT pin
#   - Mic and speaker SHARE BCLK + LRCLK (same I2S bus, full-duplex)
#   - LED: SK6812/WS2812 RGB (optional)
#
# GPIO PINOUT (example, change to match your wiring):
#   Shared I2S:  BCLK=GPIO36, LRCLK=GPIO37, DIN=GPIO35 (mic), DOUT=GPIO7 (speaker)
#   LED:         DATA=GPIO33
#
# =============================================================================

substitutions:
  # Hardware identity stays stable across YAML updates so HA entities and
  # ESPHome build cache are reused.
  name: generic-s3
  friendly_name: Generic S3

  ext_components_source: "../../../esphome/components"

# =============================================================================
# Package: shared intercom state machine
# =============================================================================
packages:
  core: !include ../../../packages/intercom_only.yaml
  buttons_switches: !include ../../../packages/intercom/buttons_switches.yaml
  call_settings: !include ../../../packages/intercom/call_settings.yaml
  ha_api: !include ../../../packages/intercom/ha_api.yaml
  phonebook_subscribe: !include ../../../packages/intercom/phonebook_subscribe.yaml
  intercom_transport: !include ../../../packages/intercom/transport.yaml
  speaker_mute: !include ../../../packages/intercom/speaker_mute.yaml
  s3_base: !include ../../../packages/platform/esp32s3_base.yaml
  native_diagnostics: !include ../../../packages/diagnostics/native.yaml
  status_led: !include ../../../packages/led/status_ws2812_single.yaml
  audio_stack_controls: !include ../../../packages/esp_audio_stack/controls.yaml
  audio_stack_aec_controls: !include ../../../packages/esp_audio_stack/aec_controls.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      # Allow mbedtls to allocate its working buffers in PSRAM.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Route ESP-IDF stdout (and ESPHome logger when hardware_uart=USB_SERIAL_JTAG)
      # to the built-in USB-Serial-JTAG peripheral. Required on boards where the
      # USB-C connector is wired to the S3's native USB-Serial-JTAG (e.g. Freenove,
      # bare ESP32-S3-DevKitC-1) rather than to an external USB-UART chip.
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: quad
  speed: 80MHz

preferences:
  flash_write_interval: 5min

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  # DEBUG keeps SIP signaling + AEC/AFE/i2s lifecycle visible.
  # Mute chatty ESPHome built-ins below; project components stay at DEBUG.
  level: INFO
  logs:
    intercom_api: INFO
    intercom_api.fsm: INFO
    intercom_api.tcp: INFO
    intercom_api.udp: INFO
    intercom_api.audio: INFO
    intercom_api.settings: INFO
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, esp_audio_stack, esp_aec, audio_processor]

# =============================================================================
# SIP signaling is owned by intercom_api. `protocol: udp` means SIP over UDP;
# RTP media remains UDP. C++ side:
#  - intercom_api.start() sends SIP INVITE
#  - peer receives INVITE and enters ringing/in_call from SIP status
#  - intercom_api.stop() sends CANCEL or BYE depending on dialog state
# No YAML signaling lambdas and no external helper component.
# =============================================================================

# =============================================================================
# AEC
# =============================================================================
esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 8
  mode: voip_high_perf

# =============================================================================
# ESP Audio Stack
# =============================================================================
esp_audio_stack:
  id: audio_stack
  i2s_lrclk_pin: GPIO37
  i2s_bclk_pin: GPIO36
  i2s_din_pin: GPIO35
  i2s_dout_pin: GPIO7
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 32
  correct_dc_offset: true
  processor_id: aec_processor
  # Lightweight intercom-only no-codec reference. The component default is
  # ring_buffer (Espressif/ADF TYPE2), but this preset keeps the previous-frame
  # path to avoid the extra reference ring and delay tuning.
  aec_reference: previous_frame
  buffers_in_psram: true

# =============================================================================
# Microphone
# =============================================================================
microphone:
  - platform: esp_audio_stack
    id: mic_main
    esp_audio_stack_id: audio_stack

# =============================================================================
# Speaker
# =============================================================================
speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: intercom_speaker_input
    output_speaker: hw_speaker
    bits_per_sample: 16

# =============================================================================
# Intercom API: Device part (merged with package callbacks)
# =============================================================================
# SIP: the HA phonebook subscription provides SIP contacts in the unified
# roster. intercom_api.start auto-binds signaling and RTP to the selected
# endpoint.
intercom_api:
  id: intercom
  buffers_in_psram: true
  # SIP signaling transport only. Use `tcp` when this endpoint must signal over
  # SIP TCP; RTP media remains UDP after SDP negotiation.
  protocol: udp
  audio:
    # Primary/preferred RX format: 48 kHz improves HA/browser audio and 10 ms
    # keeps each mono s16 RTP packet compact. TX remains the microphone/AEC
    # format unless audio.tx is overridden.
    rx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
    # Additional accepted RX formats for direct ESP-to-ESP calls. These are valid
    # only because speaker: intercom_speaker_input points at the resampler; do
    # not advertise additional formats when wiring intercom_api directly to a
    # fixed-rate mixer input.
    rx_formats:
      - sample_rate: 16000
        pcm_format: s16le
        channels: 1
        frame_ms: 32
  microphone: mic_main
  speaker: intercom_speaker_input
  dc_offset_removal: false
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1

# =============================================================================
# Switches (device-specific)
# =============================================================================
switch:

# =============================================================================
# AEC Mode Select
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    # Intercom-only standard: stay inside the dios_ssp_aec engine. The two
    # VOIP modes share the same engine, so a runtime switch never triggers
    # an esp_aec3 FFT alloc and avoids the silent calloc-fail bug observed
    # at filter_length>4 on cross-engine transitions. SR modes are not
    # offered here because no MWW is present in this configuration.
    options:
      - "voip_low_cost"
      - "voip_high_perf"
    initial_option: "voip_high_perf"
    optimistic: false
    restore_value: true
    set_action:
      - if:
          condition:
            not:
              intercom_api.is_idle: intercom
          then:
            - logger.log:
                level: WARN
                format: "Cannot switch AEC mode during active intercom call"
          else:
            - logger.log:
                format: "Switching AEC mode to %s"
                args: ['x.c_str()']
            - esp_audio_stack.stop: audio_stack
            - esp_aec.set_mode:
                id: aec_processor
                mode: !lambda 'return x;'
            - esp_audio_stack.start: audio_stack
      # Reflect actual live mode (covers rejection and silent hardware mode).
      - lambda: |-
          id(aec_mode_select).publish_state(id(aec_processor).get_mode_name());
