    # ========================================================================
    # SETTINGS - single scrollable page, all sections divider-separated.
    # 800x1280 portrait fits everything; carousel pattern (round Spotpear)
    # is intentionally not used here. Entered via MOVE_TOP from main_page,
    # exited via MOVE_BOTTOM on swipe-down. See package header for details.
    # ========================================================================
    # =============================================================================
    # Single-page settings layout for the Waveshare P4 Touch (800x1280 portrait).
    #
    # Replaces the carousel pattern used on the round Spotpear panel: on a tall
    # touchscreen all controls fit in one scrollable page, organised by section
    # with horizontal divider lines. Eliminates the per-page swipe navigation
    # that conflicts with the main_page tileview.
    #
    # Bound entities (must exist in the device YAML):
    #   numbers : master_volume, mic_gain (-20..30 dB post-AFE gain)
    #   switches: speaker_mute, mute (mic), auto_answer_switch
    #             dnd_switch, aec_switch, vad_switch
    #             wake_word_switch
    #   selects : aec_mode_select  (options published by esp_afe FD pipeline)
    #
    # Substitutions used (already defined in the device YAML):
    #   settings_row_width      e.g. "600"
    #   settings_slider_height  e.g. "20"
    #   settings_switch_width   e.g. "70"
    #   settings_switch_height  e.g. "36"
    #   settings_label_font     e.g. font_body
    #
    # Animation contract (driven by the device's main_page):
    #   - swipe-up on main_page -> lvgl.page.show: settings_p4_page, MOVE_TOP
    #   - swipe-down on this page -> lvgl.page.show: main_page, MOVE_BOTTOM
    # =============================================================================
    - id: settings_p4_page
      bg_color: 0x202020
      on_swipe_down:
        - lvgl.page.show:
            id: main_page
            animation: MOVE_BOTTOM
            time: 250ms
      widgets:
        # Full-screen wrapper: explicit pixel dimensions ensure the flex layout
        # has a deterministic content area to stretch children into. Pages
        # (top-level LVGL screens) in ESPHome have proven unreliable when used as
        # flex containers directly; nesting one level fixes it.
        - obj:
            x: 0
            y: 0
            width: 800
            height: 1280
            bg_color: 0x202020
            border_width: 0
            pad_top: 18
            pad_bottom: 20
            pad_left: 20
            pad_right: 20
            scrollable: false
            on_swipe_down:
              - lvgl.page.show:
                  id: main_page
                  animation: MOVE_BOTTOM
                  time: 250ms
            layout:
              type: flex
              flex_flow: COLUMN
              flex_align_main: START
              flex_align_cross: CENTER
              pad_row: 8
            widgets:
              # ------------------------------------------------------------------
              # Header
              # ------------------------------------------------------------------
              - label:
                  width: ${settings_row_width}
                  text: "Settings"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}

              # ==================================================================
              # SECTION: AUDIO  (2 sliders)
              # ==================================================================
              - obj:
                  width: ${settings_row_width}
                  height: 2
                  bg_color: 0x444444
                  border_width: 0
                  pad_all: 0
              - label:
                  width: ${settings_row_width}
                  text: "Audio"
                  text_align: CENTER
                  text_color: 0x88AAFF
                  text_font: ${settings_label_font}
              - label:
                  width: ${settings_row_width}
                  text: "Master volume"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - slider:
                  width: ${settings_row_width}
                  id: ui_speaker_vol_slider
                  height: ${settings_slider_height}
                  adv_hittest: true
                  gesture_bubble: true
                  min_value: 0
                  max_value: 100
                  value: !lambda 'return id(master_volume).state;'
                  on_release:
                    - number.set:
                        id: master_volume
                        value: !lambda 'return x;'
              - label:
                  width: ${settings_row_width}
                  text: "Mic gain"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - slider:
                  width: ${settings_row_width}
                  id: ui_mic_vol_slider
                  height: ${settings_slider_height}
                  adv_hittest: true
                  gesture_bubble: true
                  min_value: ${mic_gain_min}
                  max_value: ${mic_gain_max}
                  value: !lambda 'return id(mic_gain).state;'
                  on_release:
                    - number.set:
                        id: mic_gain
                        value: !lambda 'return x;'
              # ========================================================================
              # SECTION: MUTE / AUTO ANSWER
              # ========================================================================
              - obj:
                  width: ${settings_row_width}
                  height: 2
                  bg_color: 0x444444
                  border_width: 0
                  pad_all: 0
              - label:
                  width: ${settings_row_width}
                  text: "Mute"
                  text_align: CENTER
                  text_color: 0x88AAFF
                  text_font: ${settings_label_font}
              - label:
                  width: ${settings_row_width}
                  text: "Speaker mute"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - switch:
                  id: ui_speaker_mute_sw
                  width: ${settings_switch_width}
                  height: ${settings_switch_height}
                  state:
                    checked: !lambda 'return id(speaker_mute).state;'
                  on_value:
                    - lambda: |-
                        if (x == id(speaker_mute).state) return;
                        if (x) id(speaker_mute).turn_on();
                        else id(speaker_mute).turn_off();
              - label:
                  width: ${settings_row_width}
                  text: "Mic mute"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - switch:
                  id: ui_mic_mute_sw
                  width: ${settings_switch_width}
                  height: ${settings_switch_height}
                  state:
                    checked: !lambda 'return id(mute).state;'
                  on_value:
                    - lambda: |-
                        if (x == id(mute).state) return;
                        if (x) id(mute).turn_on();
                        else id(mute).turn_off();
              - label:
                  width: ${settings_row_width}
                  text: "Auto answer"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - switch:
                  id: ui_auto_answer_sw
                  width: ${settings_switch_width}
                  height: ${settings_switch_height}
                  state:
                    checked: !lambda 'return id(auto_answer_switch).state;'
                  on_value:
                    - lambda: |-
                        if (x == id(auto_answer_switch).state) return;
                        if (x) id(auto_answer_switch).turn_on();
                        else id(auto_answer_switch).turn_off();
              - label:
                  width: ${settings_row_width}
                  text: "Do Not Disturb"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - switch:
                  id: ui_dnd_sw
                  width: ${settings_switch_width}
                  height: ${settings_switch_height}
                  state:
                    checked: !lambda 'return id(dnd_switch).state;'
                  on_value:
                    - lambda: |-
                        if (x == id(dnd_switch).state) return;
                        if (x) id(dnd_switch).turn_on();
                        else id(dnd_switch).turn_off();

              # ========================================================================
              # SECTION: ECHO CANCELLATION (AEC switch + Mode dropdown)
              # ========================================================================
              - obj:
                  width: ${settings_row_width}
                  height: 2
                  bg_color: 0x444444
                  border_width: 0
                  pad_all: 0
              - label:
                  width: ${settings_row_width}
                  text: "Echo Cancellation"
                  text_align: CENTER
                  text_color: 0x88AAFF
                  text_font: ${settings_label_font}
              - label:
                  width: ${settings_row_width}
                  text: "AEC"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - switch:
                  id: ui_aec_sw
                  width: ${settings_switch_width}
                  height: ${settings_switch_height}
                  state:
                    checked: !lambda 'return id(aec_switch).state;'
                  on_value:
                    - lambda: |-
                        if (x == id(aec_switch).state) return;
                        if (x) id(aec_switch).turn_on();
                        else id(aec_switch).turn_off();
              - label:
                  width: ${settings_row_width}
                  text: "AEC mode"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - dropdown:
                  id: ui_aec_mode_dd
                  width: 240
                  options:
                    - "fd_low_cost"
                    - "fd_high_perf"
                  selected_text: !lambda 'return id(aec_mode_select).current_option();'
                  on_value:
                    - select.set_index:
                        id: aec_mode_select
                        index: !lambda 'return x;'

              # ========================================================================
              # SECTION: AFE PIPELINE
              # ========================================================================
              - obj:
                  width: ${settings_row_width}
                  height: 2
                  bg_color: 0x444444
                  border_width: 0
                  pad_all: 0
              - label:
                  width: ${settings_row_width}
                  text: "AFE Pipeline"
                  text_align: CENTER
                  text_color: 0x88AAFF
                  text_font: ${settings_label_font}
              - label:
                  width: ${settings_row_width}
                  text: "Voice Activity Detector"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - switch:
                  id: ui_vad_sw
                  width: ${settings_switch_width}
                  height: ${settings_switch_height}
                  state:
                    checked: !lambda 'return id(vad_switch).state;'
                  on_value:
                    - lambda: |-
                        if (x) id(vad_switch).turn_on();
                        else id(vad_switch).turn_off();

              # ========================================================================
              # SECTION: VOICE ASSISTANT
              # ========================================================================
              - obj:
                  width: ${settings_row_width}
                  height: 2
                  bg_color: 0x444444
                  border_width: 0
                  pad_all: 0
              - label:
                  width: ${settings_row_width}
                  text: "Voice Assistant"
                  text_align: CENTER
                  text_color: 0x88AAFF
                  text_font: ${settings_label_font}
              - label:
                  width: ${settings_row_width}
                  text: "Wake word"
                  text_align: CENTER
                  text_color: 0xFFFFFF
                  text_font: ${settings_label_font}
              - switch:
                  id: ui_wake_word_sw
                  width: ${settings_switch_width}
                  height: ${settings_switch_height}
                  state:
                    checked: !lambda 'return id(wake_word_switch).state;'
                  on_value:
                    - lambda: |-
                        if (x == id(wake_word_switch).state) return;
                        if (x) id(wake_word_switch).turn_on();
                        else id(wake_word_switch).turn_off();

# =============================================================================
# RUNTIME LOGIC AND ENTITIES
# =============================================================================

globals:
  - id: voice_assistant_phase
    type: int
    restore_value: false
    initial_value: ${voice_assist_not_ready_phase_id}

  - id: current_mode
    type: int
    restore_value: no
    initial_value: "0"

  - id: previous_mode
    type: int
    restore_value: no
    initial_value: "0"

  - id: peer_name
    type: std::string
    restore_value: no
    initial_value: '""'

  # call_ended_group is shown briefly after a call terminates (hangup,
  # decline, error, timeout). The flag is set by ui_call_ended and
  # cleared either by the auto-return delay or by an early state
  # change. draw_display checks it so the page is not overwritten
  # while the user reads the reason.
  - id: call_ended_active
    type: bool
    restore_value: false
    initial_value: "false"

  # Forecast arrays (5-day)
  - id: forecast_condition
    type: std::array<std::string, 5>
  - id: forecast_temp_max
    type: float[5]
  - id: forecast_temp_min
    type: float[5]
  - id: forecast_dow
    type: int[5]

script:
  # Remove package's LED-based update_led (P4 has no status_led, uses LVGL display)
  - id: !remove update_led
  - id: update_led
    mode: restart
    then:
      - script.execute: draw_display

  - id: apply_media_artwork
    then:
      - lambda: |-
          lv_img_set_src(id(mood_bg), id(mood_neutral));
          lv_obj_invalidate(id(mood_bg));

  # Display cleanup after VA ends
  - id: !extend ui_va_end
    then:
      - script.execute: backlight_timer
      - text_sensor.template.publish:
          id: text_request
          state: ""
      - text_sensor.template.publish:
          id: text_response
          state: ""
      - script.execute: clear_replying_text
      - script.execute: set_idle_or_mute_phase
      - script.execute: draw_display

  # Display state routing (extends package placeholder)
  # Maps canonical ui_state to the device-local VA phase and calls draw_display.
  # Device-local overlays (timer, settings, call-ended) are resolved inside draw_display.
  - id: !extend render_ui_state
    then:
      - lambda: |-
          int state = id(ui_state);
          // VoIP idle: restore previous mode after call ends.
          if (state == ${ui_state_idle} && id(current_mode) == 1 && id(phone).get_state_str() == "idle") {
            id(peer_name) = id(phone).get_current_destination();
            if (id(previous_mode) == 0) {
              id(current_mode) = 0;
            }
          }

          switch (state) {
            case ${ui_state_init}:
            case ${ui_state_no_wifi}:
            case ${ui_state_no_ha}:
              id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
              break;
            case ${ui_state_both_muted}:
            case ${ui_state_mic_muted}:
              id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
              break;
            case ${ui_state_mww_recent}:
            case ${ui_state_va_listening}:
              id(current_mode) = 0;
              id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
              break;
            case ${ui_state_va_thinking}:
              id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
              break;
            case ${ui_state_va_replying}:
              id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              break;
            case ${ui_state_va_error}:
              id(voice_assistant_phase) = ${voice_assist_error_phase_id};
              break;
            case ${ui_state_media}:
              if (id(mute).state) {
                id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
              } else {
                id(apply_media_artwork).execute();
                id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
              }
              break;
            case ${ui_state_idle}:
              if (id(mute).state) {
                id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
              } else {
                id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              }
              break;
            default:
              break;
          }
      - script.execute: backlight_timer
      # Reset text on listening start.
      - if:
          condition:
            lambda: 'return id(ui_state) == ${ui_state_va_listening};'
          then:
            - text_sensor.template.publish:
                id: text_request
                state: "..."
            - text_sensor.template.publish:
                id: text_response
                state: "..."
      # VoIP idle: update labels if staying in call mode.
      - if:
          condition:
            lambda: |-
              return id(ui_state) == ${ui_state_idle} && id(current_mode) == 1
                     && id(phone).get_state_str() == "idle";
          then:
            - script.execute: update_call_idle_labels
      - script.execute: draw_display

  # TTS text display (extends package placeholder)
  - id: !extend ui_tts_started
    then:
      # Parse emoticon prefix, set mood background, strip from displayed text
      - lambda: |-
          std::string t = text;
          esphome::image::Image *mood = id(mood_neutral);
          if (t.size() >= 3) {
            std::string prefix = t.substr(0, 3);
            if (prefix == ":-)") {
              mood = id(mood_happy);
            } else if (prefix == ":-(") {
              mood = id(mood_angry);
            } else if (prefix == ":-|") {
              // neutral (default)
            }
            if (prefix == ":-)" || prefix == ":-(" || prefix == ":-|") {
              t = t.substr(3);
              if (!t.empty() && t[0] == ' ') t = t.substr(1);
            }
          }
          if (lv_img_get_src(id(mood_bg)) != mood)
            lv_img_set_src(id(mood_bg), mood);
          id(text_response).publish_state(t);
      - globals.set:
          id: voice_assistant_phase
          value: '${voice_assist_replying_phase_id}'
      - script.stop: backlight_timer
      - output.set_level:
          id: backlight_pwm
          level: 100%
      - script.execute: draw_display

  # STT text display (extends package placeholder)
  - id: !extend ui_stt_ended
    then:
      - text_sensor.template.publish:
          id: text_request
          state: !lambda 'return text;'
      - script.execute: draw_display

  # VoIP call display (extends package placeholder). Resets the
  # calling-status label to "CALLING" so a fresh start() doesn't leak
  # the "RINGING" text from a previous call.
  - id: !extend ui_call_started
    then:
      - lambda: |-
          id(peer_name) = peer;
          id(previous_mode) = id(current_mode);
          id(current_mode) = 1;
      - lvgl.label.update:
          id: call_ringing_out_status_label
          text: "CALLING"
      - script.execute: backlight_timer
      - script.execute: draw_display

  # Caller path: dest acked with RING. Same calling tile, label flips
  # from "CALLING" to "RINGING".
  - id: !extend ui_call_dest_ringing
    then:
      - lambda: 'id(peer_name) = peer;'
      - lvgl.label.update:
          id: call_ringing_out_peer_label
          text: !lambda 'return id(peer_name);'
      - lvgl.label.update:
          id: call_ringing_out_status_label
          text: "RINGING"
      - script.execute: backlight_timer

  # Call ended (hangup, decline, error, timeout). Show call_ended_group
  # with peer + reason for ~4 s, then auto-route back to whatever the
  # runtime display state is in now (typically Idle).
  - id: !extend ui_call_ended
    mode: restart
    then:
      - globals.set:
          id: call_ended_active
          value: "true"
      - lvgl.label.update:
          id: call_ended_peer_label
          text: !lambda |-
            return peer.empty() ? std::string("Call ended.") : ("Call with " + peer + " ended.");
      - lvgl.label.update:
          id: call_ended_reason_label
          text: !lambda |-
            std::string r = reason;
            std::string label;
            if      (r == "local_hangup")    label = "Local hangup";
            else if (r == "remote_hangup")   label = "Remote hangup";
            else if (r == "declined")        label = "Declined";
            else if (r == "timeout")         label = "Timeout";
            else if (r == "busy")            label = "Busy";
            else if (r == "unreachable")     label = "Unreachable";
            else if (r == "protocol_error")  label = "Protocol error";
            else if (r == "bridge_error")    label = "Bridge error";
            else                             label = r.empty() ? std::string("Ended") : ("Declined: " + r);
            return std::string("Reason: ") + label;
      - script.execute: backlight_timer
      - script.execute: draw_display
      - delay: 4s
      - if:
          condition:
            lambda: 'return id(call_ended_active);'
          then:
            - globals.set:
                id: call_ended_active
                value: "false"
            - script.execute: draw_display

  # Main display rendering: split-screen layout
  - id: draw_display
    mode: restart
    then:
      - lambda: |-
          lv_obj_t* active_scr = lv_disp_get_scr_act(nullptr);

          // Settings page is user-driven (modal): never let the periodic
          // draw_display callers (VoIP state, idle phase, animations,
          // weather refresh, ...) snap the screen back to main_page while
          // the user is interacting with the settings carousel.
          if (active_scr == id(settings_p4_page)->obj) return;

          auto set_hidden = [](lv_obj_t *obj, bool hidden) {
            const bool is_hidden = lv_obj_has_flag(obj, LV_OBJ_FLAG_HIDDEN);
            if (hidden && !is_hidden) {
              lv_obj_add_flag(obj, LV_OBJ_FLAG_HIDDEN);
            } else if (!hidden && is_hidden) {
              lv_obj_clear_flag(obj, LV_OBJ_FLAG_HIDDEN);
            }
          };
          auto set_label = [](lv_obj_t *label, const char *text) {
            if (text == nullptr) text = "";
            const char *current = lv_label_get_text(label);
            if (current == nullptr || strcmp(current, text) != 0)
              lv_label_set_text(label, text);
          };

          // Stop idle animation when leaving main page (prevents LVGL memory leak)
          auto stop_anim = [&]() {
            id(ai_animation_loop).stop();
            lv_anim_del(id(idle_animation), nullptr);
            lv_animimg_start(id(idle_animation));
            lv_anim_del(id(idle_animation), nullptr);
          };

          // Overlay pages (full-screen, cover everything)
          if (!wifi::global_wifi_component->is_connected()) {
            stop_anim();
            if (active_scr != id(no_wifi_page)->obj)
              lv_disp_load_scr(id(no_wifi_page)->obj);
            return;
          }
          if (!api::global_api_server->is_connected()) {
            stop_anim();
            if (active_scr != id(no_ha_page)->obj)
              lv_disp_load_scr(id(no_ha_page)->obj);
            return;
          }
          int phase = id(voice_assistant_phase);
          if (phase == ${voice_assist_not_ready_phase_id}) {
            stop_anim();
            if (active_scr != id(no_ha_page)->obj)
              lv_disp_load_scr(id(no_ha_page)->obj);
            return;
          }
          // Timer ringing owns the full-screen overlay while the alarm is active.
          // Use the runtime_controller timer activity instead of voice_assistant_phase because the
          // alarm sound is played through media_player and may update the phase.
          if (id(runtime).is_activity_active("timer_ringing")) {
            stop_anim();
            if (active_scr != id(timer_finished_page)->obj)
              lv_disp_load_scr(id(timer_finished_page)->obj);
            return;
          }

          // Normal: show main split-screen page
          if (active_scr != id(main_page)->obj) {
            lv_disp_load_scr(id(main_page)->obj);
            // Disable scrolling on tileview tiles (content must not scroll within tiles)
            lv_obj_clear_flag(id(weather_tile), LV_OBJ_FLAG_SCROLLABLE);
            lv_obj_clear_flag(id(voip_tile), LV_OBJ_FLAG_SCROLLABLE);
          }

          // === Update VA container (bottom half) ===
          bool va_idle = (phase == ${voice_assist_idle_phase_id});

          // Hide all VA groups
          set_hidden(id(va_idle_group), true);
          set_hidden(id(va_listening_group), true);
          set_hidden(id(va_thinking_group), true);
          set_hidden(id(va_replying_group), true);
          set_hidden(id(va_error_group), true);
          set_hidden(id(va_muted_group), true);

          if (va_idle) {
            set_hidden(id(va_idle_group), false);
          } else if (phase == ${voice_assist_listening_phase_id}) {
            set_hidden(id(va_listening_group), false);
          } else if (phase == ${voice_assist_thinking_phase_id}) {
            set_label(id(thinking_text_label), id(text_request).state.c_str());
            set_hidden(id(va_thinking_group), false);
          } else if (phase == ${voice_assist_replying_phase_id}) {
            set_label(id(replying_text_label), id(text_response).state.c_str());
            set_hidden(id(va_replying_group), false);
          } else if (phase == ${voice_assist_error_phase_id}) {
            set_hidden(id(va_error_group), false);
          } else if (phase == ${voice_assist_muted_phase_id}) {
            set_hidden(id(va_muted_group), false);
          }

          // === Update VoIP tile (top right) ===
          auto call_state = id(phone).get_state_str();

          set_hidden(id(call_idle_group), true);
          set_hidden(id(call_ringing_in_group), true);
          set_hidden(id(call_ringing_out_group), true);
          set_hidden(id(call_in_call_group), true);
          set_hidden(id(call_ended_group), true);

          if (id(call_ended_active)) {
            // ui_call_ended owns the tile for ~4 s after a terminated
            // call so the user reads the reason regardless of the runtime state
            // state already returning to IDLE.
            set_hidden(id(call_ended_group), false);
            lv_obj_set_tile_id(id(top_tileview), 1, 0, LV_ANIM_OFF);
          } else if (call_state == "ringing") {
            set_label(id(call_ringing_in_peer_label), id(peer_name).c_str());
            set_hidden(id(call_ringing_in_group), false);
            lv_obj_set_tile_id(id(top_tileview), 1, 0, LV_ANIM_OFF);
          } else if (call_state == "calling" || call_state == "remote_ringing") {
            set_label(id(call_ringing_out_peer_label), id(peer_name).c_str());
            set_hidden(id(call_ringing_out_group), false);
            lv_obj_set_tile_id(id(top_tileview), 1, 0, LV_ANIM_OFF);
          } else if (call_state == "in_call" || call_state == "connecting") {
            set_label(id(call_in_call_peer_label), id(peer_name).c_str());
            set_hidden(id(call_in_call_group), false);
            lv_obj_set_tile_id(id(top_tileview), 1, 0, LV_ANIM_OFF);
          } else {
            set_label(id(call_idle_peer_label), id(peer_name).c_str());
            auto csv = id(phone).get_contacts_csv();
            int count = csv.empty() ? 0 : (int)std::count(csv.begin(), csv.end(), ',') + 1;
            char buf[32];
            snprintf(buf, sizeof(buf), "Contacts: %d", count);
            set_label(id(call_idle_contacts_label), buf);
            set_hidden(id(call_idle_group), false);
          }

      # Animation lifecycle
      - if:
          condition:
            lambda: |-
              std::string call_state = id(phone).get_state_str();
              return id(current_mode) == 0 &&
                     id(voice_assistant_phase) == ${voice_assist_idle_phase_id} &&
                     !id(init_in_progress) &&
                     (call_state == "idle" || call_state.empty());
          then:
            - if:
                condition:
                  lambda: return !id(ai_animation_loop).is_running();
                then:
                  - script.execute: ai_animation_loop
          else:
            - script.stop: ai_animation_loop
            - lambda: |-
                lv_anim_del(id(idle_animation), nullptr);
                lv_animimg_start(id(idle_animation));
                lv_anim_del(id(idle_animation), nullptr);
      # Self-heal: ensure MWW is active when idle
      - if:
          condition:
            and:
              - lambda: |-
                  return id(voice_assistant_phase) == ${voice_assist_idle_phase_id} &&
                         !id(init_in_progress);
              - lambda: |-
                  std::string call_state = id(phone).get_state_str();
                  return call_state == "idle" || call_state.empty();
              - switch.is_off: mute
              - not:
                  micro_wake_word.is_running:
              - not:
                  media_player.is_announcing:
          then:
            - script.execute: start_mww_when_ready
      - script.execute: update_timer_state

  # Idle animation loop (play once + long pause)
  - id: ai_animation_loop
    mode: single
    then:
      - lambda: |-
          lv_anim_del(id(idle_animation), nullptr);
          lv_animimg_set_repeat_count(id(idle_animation), 0);
          lv_animimg_start(id(idle_animation));
          lv_anim_del(id(idle_animation), nullptr);
      - while:
          condition:
            lambda: return true;
          then:
            - lvgl.animimg.start: idle_animation
            - delay: 25s

  # Weather display update
  - id: update_weather_display
    mode: restart
    then:
      - lambda: |-
          std::string call_state = id(phone).get_state_str();
          if (id(call_ended_active) ||
              call_state == "ringing" ||
              call_state == "calling" || call_state == "remote_ringing" ||
              call_state == "in_call" || call_state == "connecting") {
            return;
          }

          // Condition → MDI icon mapping
          auto icon_for = [](const std::string& c) -> const char* {
            if (c == "sunny") return "\U000F0599";
            if (c == "clear-night") return "\U000F0594";
            if (c == "cloudy") return "\U000F0590";
            if (c == "partlycloudy") return "\U000F0595";
            if (c == "fog") return "\U000F0591";
            if (c == "rainy") return "\U000F0597";
            if (c == "snowy") return "\U000F0598";
            if (c == "lightning") return "\U000F0593";
            if (c == "hail") return "\U000F0592";
            if (c == "windy") return "\U000F059D";
            if (c == "pouring") return "\U000F0596";
            if (c == "snowy-rainy") return "\U000F067F";
            if (c == "windy-variant") return "\U000F059E";
            if (c == "lightning-rainy") return "\U000F067E";
            if (c == "exceptional") return "\U000F0F37";
            return "\U000F0590";
          };
          // Condition → English text
          auto text_for = [](const std::string& c) -> const char* {
            if (c == "sunny") return "Sunny";
            if (c == "clear-night") return "Clear";
            if (c == "cloudy") return "Cloudy";
            if (c == "partlycloudy") return "Partly Cloudy";
            if (c == "fog") return "Fog";
            if (c == "rainy") return "Rain";
            if (c == "snowy") return "Snow";
            if (c == "lightning") return "Thunderstorm";
            if (c == "hail") return "Hail";
            if (c == "windy") return "Windy";
            if (c == "pouring") return "Heavy Rain";
            if (c == "snowy-rainy") return "Sleet";
            if (c == "windy-variant") return "Windy";
            if (c == "lightning-rainy") return "Thunderstorm";
            if (c == "exceptional") return "Exceptional";
            return "";
          };
          static const char* day_full[] = {"Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"};
          static const char* day_short[] = {"Sun","Mon","Tue","Wed","Thu","Fri","Sat"};
          static const char* month_names[] = {"January","February","March","April","May","June",
                                              "July","August","September","October","November","December"};

          // --- Header: date + clock + battery ---
          auto now = id(my_time).now();
          if (now.is_valid()) {
            char date_buf[48];
            snprintf(date_buf, sizeof(date_buf), "%s %d %s",
                     day_full[now.day_of_week - 1], now.day_of_month,
                     month_names[now.month - 1]);
            lv_label_set_text(id(weather_date_label), date_buf);

            char clk[8];
            snprintf(clk, sizeof(clk), "%02d:%02d", now.hour, now.minute);
            lv_label_set_text(id(weather_clock_label), clk);
          }

          // --- Current weather ---
          auto cond = id(weather_condition).state;
          if (!cond.empty()) {
            lv_label_set_text(id(weather_icon_label), icon_for(cond));
            lv_label_set_text(id(weather_condition_label), text_for(cond));
          }

          if (!std::isnan(id(weather_temperature).state)) {
            char temp[16];
            snprintf(temp, sizeof(temp), "%.0f\u00B0", id(weather_temperature).state);
            lv_label_set_text(id(weather_temp_label), temp);
          }

          auto loc = id(weather_location).state;
          if (!loc.empty()) {
            lv_label_set_text(id(weather_location_label), loc.c_str());
          }

          // Humidity + wind
          char details[64];
          float hum = id(weather_humidity).state;
          float wind = id(weather_wind_speed).state;
          if (!std::isnan(hum) && !std::isnan(wind))
            snprintf(details, sizeof(details), "Humidity: %.0f%%  |  Wind: %.0f km/h", hum, wind);
          else if (!std::isnan(hum))
            snprintf(details, sizeof(details), "Humidity: %.0f%%", hum);
          else
            details[0] = '\0';
          lv_label_set_text(id(weather_details_label), details);

          // --- Forecast 5 days ---
          lv_obj_t* fc_day_labels[] = {id(fc0_day_label), id(fc1_day_label), id(fc2_day_label), id(fc3_day_label), id(fc4_day_label)};
          lv_obj_t* fc_icon_labels[] = {id(fc0_icon_label), id(fc1_icon_label), id(fc2_icon_label), id(fc3_icon_label), id(fc4_icon_label)};
          lv_obj_t* fc_max_labels[] = {id(fc0_max_label), id(fc1_max_label), id(fc2_max_label), id(fc3_max_label), id(fc4_max_label)};
          lv_obj_t* fc_min_labels[] = {id(fc0_min_label), id(fc1_min_label), id(fc2_min_label), id(fc3_min_label), id(fc4_min_label)};
          for (int i = 0; i < 5; i++) {
            int dow = id(forecast_dow)[i];
            if (dow >= 0 && dow <= 6)
              lv_label_set_text(fc_day_labels[i], day_full[dow]);
            auto& fc = id(forecast_condition)[i];
            if (!fc.empty())
              lv_label_set_text(fc_icon_labels[i], icon_for(fc));
            char t[16];
            snprintf(t, sizeof(t), "Max: %.0f\u00B0", id(forecast_temp_max)[i]);
            lv_label_set_text(fc_max_labels[i], t);
            snprintf(t, sizeof(t), "Min: %.0f\u00B0", id(forecast_temp_min)[i]);
            lv_label_set_text(fc_min_labels[i], t);
          }

  # Fetch 5-day forecast from HA
  - id: fetch_forecast
    mode: single
    then:
      - homeassistant.action:
          action: weather.get_forecasts
          data:
            entity_id: ${weather_entity_id}
            type: daily
          capture_response: true
          on_success:
            - lambda: |-
                JsonObjectConst resp = response["response"];
                JsonObjectConst data = resp["${weather_entity_id}"];
                JsonArrayConst forecast = data["forecast"];
                for (int i = 0; i < 5 && i < (int)forecast.size(); i++) {
                  JsonObjectConst day = forecast[i];
                  id(forecast_condition)[i] = day["condition"].as<std::string>();
                  id(forecast_temp_max)[i]  = day["temperature"]   | 0.0f;
                  id(forecast_temp_min)[i]  = day["templow"]       | 0.0f;
                  // Extract day of week from datetime
                  std::string dt = day["datetime"].as<std::string>();
                  int y, m, d;
                  sscanf(dt.c_str(), "%d-%d-%d", &y, &m, &d);
                  struct tm tm = {};
                  tm.tm_year = y - 1900;
                  tm.tm_mon = m - 1;
                  tm.tm_mday = d;
                  mktime(&tm);
                  id(forecast_dow)[i] = tm.tm_wday;
                }
            - script.execute: update_weather_display

  # Timer state update
  - id: update_timer_state
    then:
      - lambda: |-
          const auto &timers = id(va).get_timers();
          bool any_active = false;
          voice_assistant::Timer first_active{};
          for (const auto &t : timers) {
            if (t.is_active && (!any_active || t.seconds_left < first_active.seconds_left)) {
              first_active = t;
              any_active = true;
            }
          }
          int phase = id(voice_assistant_phase);
          bool on_supported_page = (
            phase == ${voice_assist_idle_phase_id} ||
            phase == ${voice_assist_listening_phase_id} ||
            phase == ${voice_assist_thinking_phase_id} ||
            phase == ${voice_assist_muted_phase_id}
          );
          if (!on_supported_page || !any_active) {
            lv_obj_add_flag(id(timer_overlay), LV_OBJ_FLAG_HIDDEN);
            return;
          }
          uint32_t sec = first_active.seconds_left;
          lv_bar_set_value(id(timer_bar), 100, LV_ANIM_OFF);
          char buf[8];
          int h = sec / 3600;
          int m = (sec / 60) % 60;
          int s = sec % 60;
          if (h > 0) snprintf(buf, sizeof(buf), "%02d:%02d", h, m);
          else       snprintf(buf, sizeof(buf), "%02d:%02d", m, s);
          lv_label_set_text(id(timer_label), buf);
          lv_obj_clear_flag(id(timer_overlay), LV_OBJ_FLAG_HIDDEN);

  # Update peer name + contacts count on the VoIP idle group.
  # Used by next/prev_contact_button and by render_ui_state when staying idle.
  - id: update_call_idle_labels
    then:
      - lambda: id(peer_name) = id(phone).get_current_destination();
      - lvgl.label.update:
          id: call_idle_peer_label
          text: !lambda 'return id(peer_name);'
      - lvgl.label.update:
          id: call_idle_contacts_label
          text: !lambda |-
            auto csv = id(phone).get_contacts_csv();
            int count = csv.empty() ? 0 : (int)std::count(csv.begin(), csv.end(), ',') + 1;
            char buf[32];
            snprintf(buf, sizeof(buf), "Contacts: %d", count);
            return std::string(buf);

  # VA end handler (mode: restart ensures barge-in cancels previous on_end)
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_on: mute
          then:
            - globals.set:
                id: voice_assistant_phase
                value: '${voice_assist_muted_phase_id}'
          else:
            - if:
                condition:
                  media_player.is_playing:
                then:
                  # Music playing: show neutral mood screen instead of idle animation
                  - script.execute: apply_media_artwork
                  - globals.set:
                      id: voice_assistant_phase
                      value: '${voice_assist_replying_phase_id}'
                else:
                  - globals.set:
                      id: voice_assistant_phase
                      value: '${voice_assist_idle_phase_id}'

  # Timer alarm: play sound in a loop while runtime_controller timer_ringing is active
  - id: timer_alarm_loop
    mode: single
    then:
      - while:
          condition:
            runtime_controller.is_active:
              id: runtime
              activity: timer_ringing
          then:
            - media_player.play_media:
                id: speaker_media_player
                media_url: "audio-file://timer_finished_sound"
                announcement: true
            - delay: 6s

  - id: timer_alarm_auto_stop
    mode: restart
    then:
      - delay: 15min
      - runtime_controller.event:
          id: runtime
          event: timer_stopped

  # Backlight auto-off timer
  - id: backlight_timer
    mode: restart
    then:
      - output.set_level:
          id: backlight_pwm
          level: 100%
      - delay: 60s
      - output.set_level:
          id: backlight_pwm
          level: 60%
      - delay: 120s
      - output.set_level:
          id: backlight_pwm
          level: 20%

binary_sensor:
  - platform: gpio
    name: Boot Button
    id: boot_button
    pin:
      number: ${boot_button_pin}
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      # Single click: toggle VA or stop timer
      - timing:
          - ON for at most 500ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                runtime_controller.is_active:
                  id: runtime
                  activity: timer_ringing
              then:
                - runtime_controller.event:
                    id: runtime
                    event: timer_stopped
              else:
                - runtime_controller.event:
                    id: runtime
                    event: wake_word
      # Long press: toggle mute
      - timing:
          - ON for 1s to 3s
          - OFF for at least 300ms
        then:
          - switch.toggle: mute

sensor:
  - platform: homeassistant
    id: weather_temperature
    entity_id: ${weather_entity_id}
    attribute: temperature
    internal: true
    on_value:
      - script.execute: update_weather_display

  - platform: homeassistant
    id: weather_humidity
    entity_id: ${weather_entity_id}
    attribute: humidity
    internal: true

  - platform: homeassistant
    id: weather_wind_speed
    entity_id: ${weather_entity_id}
    attribute: wind_speed
    internal: true

text_sensor:
  - id: text_request
    platform: template

  - id: text_response
    platform: template

  - platform: homeassistant
    id: weather_condition
    entity_id: ${weather_entity_id}
    internal: true
    on_value:
      - script.execute: update_weather_display

  - platform: homeassistant
    id: weather_location
    entity_id: ${weather_entity_id}
    attribute: friendly_name
    internal: true

switch:
  # Replace package mic mute; speaker mute is device-specific.
  - id: !remove mute

  # Mic Mute (device override): uses mic_afe, adds display updates
  - platform: template
    name: Mic Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute ON: microphone silenced, MWW stopped"
      - voice_assistant.stop:
      - micro_wake_word.stop:
      - microphone.mute: mic_afe
      - runtime_controller.event:
          id: runtime
          event: mic_muted
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute OFF: microphone active, MWW started"
      - microphone.unmute: mic_afe
      - runtime_controller.event:
          id: runtime
          event: mic_unmuted
      - if:
          condition:
            not:
              micro_wake_word.is_running:
          then:
            - script.execute: start_mww_when_ready
      - script.execute: draw_display

  # Speaker Mute (device override): adds amp enable/disable
  - platform: template
    name: Speaker Mute
    id: speaker_mute
    icon: mdi:volume-off
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute ON: DAC muted, amplifier off"
      - speaker.mute_on: hw_speaker
      - runtime_controller.event:
          id: runtime
          event: speaker_muted
      - delay: 50ms
      - output.turn_off: speaker_enable
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute OFF: amplifier on, DAC unmuted"
      - if:
          condition:
            speaker.is_playing: hw_speaker
          then:
            - output.turn_on: speaker_enable
            - delay: 50ms
      - speaker.mute_off: hw_speaker
      - runtime_controller.event:
          id: runtime
          event: speaker_unmuted

# Select Entities
# =============================================================================

select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    # FD is the P4 profile. Keep the Espressif rate-conversion backend fixed
    # for this target so this select only changes the AFE mode.
    options:
      - "fd_low_cost"
      - "fd_high_perf"
    initial_option: "fd_high_perf"
    # Non-optimistic: template_select::control runs the set_action first
    # and only auto-publishes `index` when optimistic=true, overwriting
    # whatever we published. With optimistic=false, the final lambda
    # publish_state drives HA state from the live esp_afe mode.
    optimistic: false
    restore_value: false
    set_action:
      - if:
          condition:
            lambda: 'return id(init_in_progress);'
          then:
            - logger.log: "AEC mode select: skipping during boot"
          else:
            - if:
                condition:
                  or:
                    - voice_assistant.is_running:
                    - not:
                        voip_stack.is_idle:
                then:
                  - logger.log:
                      level: WARN
                      format: "Cannot switch AEC mode during active VA/VoIP"
                else:
                  - logger.log:
                      format: "Switching AEC mode to %s"
                      args: ['x.c_str()']
                  - micro_wake_word.stop:
                  - esp_audio_stack.stop_and_wait: audio_stack
                  - wait_until:
                      condition:
                        esp_audio_stack.is_idle: audio_stack
                      timeout: 2s
                  - esp_afe.set_mode:
                      id: afe_processor
                      mode: !lambda 'return x;'
                  - wait_until:
                      condition:
                        lambda: 'return id(afe_processor).is_reconfigure_idle();'
                      timeout: 20s
                  - if:
                      condition:
                        lambda: 'return id(afe_processor).is_reconfigure_idle() && id(afe_processor).get_last_reconfigure_ok();'
                      then:
                        - esp_audio_stack.start: audio_stack
                        - delay: 300ms
                        - if:
                            condition:
                              switch.is_off: mute
                            then:
                              - script.execute: start_mww_when_ready
                      else:
                        - logger.log:
                            level: ERROR
                            tag: main
                            format: "AFE mode switch did not complete cleanly; audio restart skipped"
      # Reflect actual live mode (covers rejection and silent hardware mode).
      - lambda: |-
          id(aec_mode_select).publish_state(id(afe_processor).get_mode_name());

interval:
  # Update weather display + clocks every 30s
  - interval: 30s
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - script.execute: update_weather_display

  # Fetch forecast every 5 min
  - interval: 5min
    then:
      - if:
          condition:
            and:
              - api.connected:
              - lambda: |-
                  std::string call_state = id(phone).get_state_str();
                  return !id(init_in_progress) &&
                         !id(call_ended_active) &&
                         (call_state == "idle" || call_state.empty());
          then:
            - script.execute: fetch_forecast
