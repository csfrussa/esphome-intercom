# =============================================================================
# Waveshare ESP32-P4 WiFi6 Touch LCD: VA + VoIP + MWW (LVGL)
# =============================================================================
#
# Hardware:
#   - ESP32-P4 RISC-V dual-core (32MB Flash, 32MB PSRAM hex)
#   - WiFi via ESP32-C6 co-processor (SDIO, esp32_hosted)
#   - MIPI DSI display: 10.1" 800x1280 (JD9365), portrait mode
#   - GT9271 capacitive touch (GT911 driver compatible, I2C 0x14)
#   - ES8311 Audio DAC (speaker, I2C 0x18)
#   - ES7210 Audio ADC (dual mic array + hardware AEC ref, I2C 0x40)
#   - NS4150B 3W mono Class-D speaker amp (GPIO53)
#   - BOOT button (GPIO0)
#
# Pin Map:
#   I2S:   MCLK=GPIO13 BCLK=GPIO12 LRCLK=GPIO10 DIN=GPIO11 DOUT=GPIO9
#   I2C:   SDA=GPIO7 SCL=GPIO8 (ES8311@0x18, ES7210@0x40, GT9271@0x14)
#   Touch: INT=GPIO22 RST=GPIO23
#   Backlight: GPIO32 (7B) or GPIO26 (7/8/10.1)
#   Speaker amp: GPIO53
#   C6 SDIO: RST=GPIO54 CMD=GPIO19 CLK=GPIO18 D0-D3=GPIO14-17
#
# Display variant selection:
#   7B:  model: WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B  (1024x600, backlight GPIO32)
#   7":  model: CUSTOM + ILI9881C init_sequence          (720x1280, backlight GPIO26)
#   8":  model: CUSTOM + JD9365 init_sequence             (800x1280, backlight GPIO26)
#   10.1": model: WAVESHARE-P4-NANO-10.1                  (800x1280, backlight GPIO26)
#
# Audio pipeline (esp_audio_stack at 48kHz, TDM + Espressif rate conversion to 16kHz):
#
#   ES7210 TDM [mic=slot0, ref=slot1, mic=slot2, nc=slot3] → esp_ae_rate_cvt x3 ──────┐
#                                                                         └── esp_afe FD/MMNR (AEC + Speech Enhancement + VAD) → mic_afe → VA / VoIP TX / MWW
#
#   Music/radio → media_speaker_input (resampler) ───────────┐
#   VA TTS      → tts_speaker_input (resampler) ─────────────┼── mixer (48kHz) → hw_speaker → ES8311
#   VoIP RX → voip_speaker_input (resampler) ────────┘
#
# Touch UI:
#   VA pages:      Status display (idle, listening, thinking, replying, error)
#   VoIP pages: Touch buttons for call/answer/decline/hangup/next/prev
#   Mode switch:   Long press GPIO0 or touch "Mode" button
#
# =============================================================================

# =============================================================================
# PROJECT SETUP
# =============================================================================

substitutions:
  name: waveshare-p4-touch
  friendly_name: Waveshare P4 Touch
  mic_id: mic_afe

  # Toggled by scripts/yaml_paths.sh between local (../../../...) and remote
  # release mode.
  ext_components_source: "github://n-IA-hane/esphome-intercom@dev"
  voip_stack_components_source: "github://n-IA-hane/esphome-voip-stack@dev"
  audio_stack_components_source: "github://n-IA-hane/esphome-audio-stack@dev"
  runtime_controller_components_source: "github://n-IA-hane/esphome-runtime-controller@dev"
  assets_base: "https://github.com/n-IA-hane/esphome-intercom/raw/dev/"

  # Display dimensions (portrait)
  display_width: "800"
  display_height: "1280"

  # AI avatar folder (${assets_base}assets/images/assistant/<ai_avatar>/)
  ai_avatar: f_off
  sendspin_artwork_resize: 400x400

  # P4 uses ES7210 hardware gain plus this post-AFE user trim for capture level.
  mic_gain_min: "-20"
  mic_gain_max: "30"

  # Home Assistant weather entity used by the P4 dashboard page.
  weather_entity_id: weather.casa

  voice_assist_idle_phase_id: "1"
  voice_assist_listening_phase_id: "2"
  voice_assist_thinking_phase_id: "3"
  voice_assist_replying_phase_id: "4"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  voice_assist_muted_phase_id: "12"

  # Settings page widths for the 800x1280 portrait display (no rounding).
  settings_row_width: "760"
  settings_wide_width: "760"
  settings_mid_width: "760"
  settings_narrow_width: "760"
  settings_dropdown_width: "240"
  settings_pad_row: "20"
  settings_slider_height: "20"
  settings_switch_width: "70"
  settings_switch_height: "36"
  settings_label_font: font_body

  # P4 AFE profile: dual mic keeps SE/BSS structural. AEC remains runtime
  # togglable, but defaults ON because this ES7210/ES8311 path degrades
  # audibly when AEC is disabled.
  afe_aec_restore_mode: ALWAYS_ON

  # ---------------------------------------------------------------------------
  # Pinout: ESP32-C6 hosted Wi-Fi SDIO link
  # ---------------------------------------------------------------------------
  hosted_reset_pin: GPIO54
  hosted_cmd_pin: GPIO19
  hosted_clk_pin: GPIO18
  hosted_d0_pin: GPIO14
  hosted_d1_pin: GPIO15
  hosted_d2_pin: GPIO16
  hosted_d3_pin: GPIO17

  # ---------------------------------------------------------------------------
  # Pinout: shared codec/touch I2C bus
  # ---------------------------------------------------------------------------
  codec_i2c_sda_pin: GPIO7
  codec_i2c_scl_pin: GPIO8

  # ---------------------------------------------------------------------------
  # Pinout: shared ES7210/ES8311 TDM audio bus
  # ---------------------------------------------------------------------------
  i2s_mclk_pin: GPIO13
  i2s_bclk_pin: GPIO12
  i2s_lrclk_pin: GPIO10
  i2s_din_pin: GPIO11
  i2s_dout_pin: GPIO9

  # ---------------------------------------------------------------------------
  # Pinout: display, backlight, speaker amp and physical button
  # ---------------------------------------------------------------------------
  display_reset_pin: "27"
  display_backlight_pin: GPIO26
  speaker_enable_pin: GPIO53
  boot_button_pin: GPIO0

# Shared packages: P4 base/hosted Wi-Fi, full VA/VoIP runtime, runtime
# controller, phonebook sync, ESP AFE controls, LVGL dashboard and media assets.

packages:
  p4_base: github://n-IA-hane/esphome-intercom/packages/platform/esp32p4_base.yaml@dev
  p4_c6_sdio: github://n-IA-hane/esphome-intercom/packages/board/esp32p4_c6_sdio.yaml@dev
  p4_diagnostics: github://n-IA-hane/esphome-intercom/packages/diagnostics/native_no_wifi_signal.yaml@dev
  full_voice_voip_runtime: github://n-IA-hane/esphome-intercom/packages/presets/full_voice_voip_runtime.yaml@dev
  runtime_controller: github://n-IA-hane/esphome-runtime-controller/packages/runtime_controller/full_controller_no_led.yaml@dev
  voice_assistant_runtime_controls: github://n-IA-hane/esphome-intercom/packages/voice_assistant/runtime_controls.yaml@dev
  call_settings: github://n-IA-hane/esphome-intercom/packages/voip/call_settings.yaml@dev
  ha_api: github://n-IA-hane/esphome-intercom/packages/voip/ha_api_runtime.yaml@dev
  voice_assistant_local_commands: github://n-IA-hane/esphome-intercom/packages/voice_assistant/local_commands.yaml@dev
  voip_transport: github://n-IA-hane/esphome-intercom/packages/voip/transport.yaml@dev
  phonebook_subscribe: github://n-IA-hane/esphome-intercom/packages/voip/phonebook_subscribe.yaml@dev
  afe_entities: github://n-IA-hane/esphome-intercom/packages/esp_afe/dual_mic_entities.yaml@dev
  audio_stack_controls: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/controls.yaml@dev
  speaker_power: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/speaker_power_output.yaml@dev
  flac_codecs_psram: github://n-IA-hane/esphome-intercom/packages/audio/flac_codecs_psram.yaml@dev
  sendspin_artwork: github://n-IA-hane/esphome-intercom/packages/media_player/sendspin_artwork.yaml@dev
  lvgl_p4_ppa: github://n-IA-hane/esphome-intercom/packages/lvgl/p4_ppa.yaml@dev
  p4_va_cleanup: github://n-IA-hane/esphome-intercom/packages/lvgl/p4_va_cleanup.yaml@dev
  # No carousel (lvgl_settings_navigation) on P4: portrait 800x1280 holds all
  # settings in a single scrollable page. See packages/lvgl/lvgl_settings_p4_unified.yaml.
  # _boot package provides the settings_p4_sync_widgets script invoked from on_boot.
  lvgl_settings_p4_boot: github://n-IA-hane/esphome-intercom/packages/lvgl/lvgl_settings_p4_unified_boot.yaml@dev

# =============================================================================
# BOARD AND MEMORY
# =============================================================================

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: 200
      then:
        - lambda: id(peer_name) = id(phone).get_current_destination();
    - priority: -100
      then:
        - logger.log: "Boot: late init start"
        - delay: 500ms
        - output.set_level:
            id: backlight_pwm
            level: 100%
        - lvgl.page.show: initializing_page
        - script.execute: draw_display
        # One-shot sync of LVGL settings widgets from current entity state
        # (switches restored via restore_mode are settled at this priority).
        - script.execute: settings_p4_sync_widgets
        - micro_wake_word.stop:
        - delay: 1s
        - script.execute: start_mww_when_ready

# External PSRAM used by LVGL assets, media buffers and selected component task
# stacks. The P4 board exposes hex PSRAM at high speed.

psram:
  mode: hex
  speed: 200MHz

# MIPI DSI PHY requires 2.5V from internal LDO channel 3

esp_ldo:
  - channel: 3
    voltage: 2.5V

# =============================================================================
# EXTERNAL COMPONENTS
# =============================================================================

external_components:
  - source: ${voip_stack_components_source}
    components: [voip_stack]
  - source: ${ext_components_source}
    components: [speaker, voice_assistant]
  - source: ${runtime_controller_components_source}
    components: [runtime_controller]
  - source: ${audio_stack_components_source}
    components: [esp_audio_stack, esp_afe]

# =============================================================================
# CONNECTIVITY
# =============================================================================

# Conservative lwIP profile for ESP32-P4 hosted Wi-Fi. Display, AFE and VoIP are
# more sensitive to internal DMA heap pressure than to peak network throughput.

network:
  # ESPHome's high-performance preset uses large lwIP windows/mailboxes and
  # Wi-Fi buffer counts. On hosted P4+C6 the bottleneck is INTERNAL|DMA
  # headroom, not iperf throughput, so keep the network profile conservative.
  enable_high_performance: false

# WiFi via ESP32-C6 co-processor (SDIO)
# Known stability issues: see https://github.com/esphome/esphome/issues/10956
esp32_hosted:
  variant: ESP32C6
  use_psram: true
  reset_pin: ${hosted_reset_pin}
  cmd_pin: ${hosted_cmd_pin}
  clk_pin: ${hosted_clk_pin}
  d0_pin: ${hosted_d0_pin}
  d1_pin: ${hosted_d1_pin}
  d2_pin: ${hosted_d2_pin}
  d3_pin: ${hosted_d3_pin}
  active_high: true

# Network link for HA API, VoIP signaling/RTP and media streams. Power save is
# disabled because calls and dashboard state updates are latency-sensitive.

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 10min
  fast_connect: false
  on_connect:
    - logger.log: "WiFi connected"
    - script.execute: draw_display
  on_disconnect:
    - logger.log: "WiFi disconnected"
    - script.execute: draw_display

# Home Assistant native API. It carries entity state, service actions and the
# central phonebook updates used by VoIP Stack.

api:
  on_client_connected:
    - script.execute: set_idle_or_mute_phase
    - script.execute: draw_display
    - delay: 5s
    - script.execute: fetch_forecast

# OTA update endpoint used by ESPHome Dashboard and `esphome upload`.

ota:
  - platform: esphome

# UART logger. Keep VoIP domains visible at INFO; noisy entity/component domains
# stay WARN unless the board is being actively debugged.

logger:
  hardware_uart: UART0
  # Production profile. Debug packages are opt-in and kept out of device YAMLs.
  level: INFO
  logs:
    voip_stack: INFO
    voip_stack.fsm: INFO
    voip_stack.tcp: INFO
    voip_stack.udp: INFO
    voip_stack.audio: INFO
    voip_stack.settings: INFO
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN

# SNTP clock used by the dashboard page and runtime labels.

time:
  - platform: sntp
    id: my_time
    timezone: Europe/Rome
    servers:
      - 0.pool.ntp.org

# =============================================================================
# BUSES
# =============================================================================

i2c:
  - id: internal_i2c
    sda: ${codec_i2c_sda_pin}
    scl: ${codec_i2c_scl_pin}
    # ESPHome defaults this bus to 50 kHz; the codec/touch bus supports normal
    # fast-mode I2C, so keep init/control traffic at 400 kHz.
    frequency: 400kHz
    scan: false

# =============================================================================
# OUTPUTS AND LIGHTS
# =============================================================================

output:
  - platform: ledc
    id: backlight_pwm
    pin: ${display_backlight_pin} # GPIO32 for 7B variant only
    inverted: false       # X-series BSP: non-inverted (higher duty = brighter)
    frequency: 1000Hz

  - platform: gpio
    id: speaker_enable
    pin: ${speaker_enable_pin}

# Display backlight entity backed by the PWM output above.

light:
  - platform: monochromatic
    id: display_backlight
    name: "Display Backlight"
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms

# =============================================================================
# AUDIO PIPELINE
# =============================================================================

# ES8311 (DAC) and ES7210 (ADC) share BCLK/LRCLK/MCLK with separate data pins.
# Runtime raw TDM probing on the P4 Touch 10.1 matches the working v4.0.0
# layout: slot 0 + slot 2 are the physical mics, slot 1 follows speaker
# playback as the ES8311 feedback/AEC reference, slot 3 is unused.
# Stable P4 front-end: esp-sr FD, dual-mic MMNR feed, hardware TDM reference
# and Espressif rate conversion. `input_format` is the logical AFE frame after
# local staging, not the raw ES7210 slot order. Waveshare GMF examples use RMNM
# in their codec stack; switching this YAML to RMNM would also require changing
# the local AFE staging order. Speech Enhancement is part of the conformant
# dual-mic MMNR FD topology. Disabling it falls back to the single-mic MR AEC path.

# Hardware audio stack: ES7210/ES8311 codec control, 48 kHz TDM bus, AFE feed
# and speaker output through the shared esp_audio_stack component.

esp_audio_stack:
  id: audio_stack
  # Concurrent TLS streams (music + TTS + VoIP) are tight on internal RAM.
  # Move the audio task's own stack to PSRAM (matches waveshare-s3-full-afe).
  # The task is not CPU-bound (per-frame AFE work lives in Espressif GMF manager tasks), so
  # PSRAM stack latency is acceptable.
  audio_task_stack_in_psram: true
  i2s_lrclk_pin: ${i2s_lrclk_pin}
  i2s_bclk_pin: ${i2s_bclk_pin}
  i2s_mclk_pin: ${i2s_mclk_pin}
  i2s_din_pin: ${i2s_din_pin}   # From ES7210 ADC (BSP_I2S_DSIN)
  i2s_dout_pin: ${i2s_dout_pin} # To ES8311 DAC (BSP_I2S_DOUT)
  sample_rate: 48000           # I2S bus at ES8311/ES7210 native rate
  output_sample_rate: 16000    # Mic/AFE/MWW/VA converted to 16kHz via esp_ae_rate_cvt x3
  processor_id: afe_processor
  audio_effects:
    rate_cvt_complexity: 3
    rate_cvt_perf_type: memory
  codec:
    i2c_id: internal_i2c
    input:
      type: es7210
      address: 0x40
      mic_selected: 0x0F
      gain_db: 30.0
      ref_channel: 1
      ref_gain_db: 0.0
    output:
      type: es8311
      address: 0x18
      use_mclk: true
      no_dac_ref: true
  slot_bit_width: 16
  use_tdm_reference: true
  tdm_total_slots: 4
  tdm_mic_slots: [0, 2]        # ES7210 TDM: slot 0 + slot 2 = physical microphones
  tdm_ref_slot: 1              # ES7210 TDM: slot 1 = ES8311 feedback/AEC reference
  # Match the current dual-mic full-experience policy. DMA/I2S buffers stay
  # internal in the component; this moves only component-owned frame buffers.
  buffers_in_psram: true

esp_afe:
  id: afe_processor
  type: fd
  mode: low_cost
  mic_num: 2
  input_format: MMNR
  aec_enabled: true
  # Dual-mic GMF follows Espressif's official element output path. Keep AEC on
  # for normal audio quality; AEC-off on dual-mic BSS targets may sound metallic.
  aec_filter_length: 4
  aec_nlp_level: normal
  se_enabled: true             # Structural dual-mic SE/BSS; no runtime SE toggle.
  ns_enabled: true              # SE/BSS is structural; keep the dual-mic profile aligned with WS3.
  vad_enabled: true            # Keep GMF VAD internals live; HA switch gates runtime behavior.
  continuous_vad: true         # Keep Voice Detected alive in standby when VAD is enabled.
  agc_enabled: false
  # Keep the complete GMF bridge in internal RAM. These buffers are touched on
  # every AFE frame, and P4 now has enough contiguous internal heap after the
  # SDK baseline cleanup. Setting these three flags to true moves about 45-50KB
  # back to PSRAM on the P4 dual-mic profile, but adds per-frame PSRAM traffic
  # and was observed to make VoIP TX less stable under full display/audio load.
  feed_buf_in_psram: false
  feed_ring_in_psram: false
  fetch_ring_in_psram: false

# Microphone: publishes AFE-clean PCM frames to VA, wake word and VoIP
# Same beamformed/cleaned stream feeds every consumer.

microphone:
  - platform: esp_audio_stack
    id: mic_afe
    esp_audio_stack_id: audio_stack

# Speaker pipeline: mixes media, TTS and VoIP RX into the hardware speaker

speaker:
  # Hardware output: writes 48kHz PCM to I2S bus
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000
    bits_per_sample: 16

  # 3-source mixer: media (duckable) + TTS (never ducked) + VoIP
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    task_stack_in_psram: true
    source_speakers:
      - id: media_mixer_input       # Music/radio streams (duckable)
        timeout: 10s
        buffer_duration: 100ms
      - id: tts_mixer_input         # VA TTS announcements (never ducked)
        timeout: 10s
        buffer_duration: 100ms
      - id: voip_mixer_input    # VoIP audio
        timeout: 10s
        buffer_duration: 128ms       # VoIP jitter/mixer staging; RTP ptime is negotiated separately.

  # ResamplerSpeakers: convert any input rate to 48kHz before the mixer
  - platform: resampler
    id: media_speaker_input              # Music/radio to 48kHz
    output_speaker: media_mixer_input
    task_stack_in_psram: true

  - platform: resampler
    id: tts_speaker_input                # VA TTS to 48kHz
    output_speaker: tts_mixer_input
    task_stack_in_psram: true

  - platform: resampler
    id: voip_speaker_input           # VoIP RX (16kHz) to 48kHz
    output_speaker: voip_mixer_input
    task_stack_in_psram: true
    buffer_duration: 128ms

# =============================================================================
# MEDIA, ASSIST AND VOIP
# =============================================================================

# Sendspin media hub used by the full dashboard media experience.

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

# Local FLAC assets for timer completion and VoIP ringing.

audio_file:
  - id: timer_finished_sound
    file: ${assets_base}assets/sounds/timer_finished.flac
  - id: voip_ringing_sound
    file: ${assets_base}assets/sounds/ringtone.flac

# Media sources for music, announcements, bundled sounds and Sendspin artwork.

media_source:
  - platform: audio_http
    id: media_http_source
    buffer_size: 65536
    task_stack_in_psram: true
  - platform: audio_http
    id: announcement_http_source
    buffer_size: 65536
    task_stack_in_psram: true
  - platform: audio_file
    id: announcement_file_source
    task_stack_in_psram: true
  - platform: sendspin
    id: sendspin_media_source
    sample_rate: 48000
    buffer_size: 262144
    task_stack_in_psram: true
    decode_memory: psram

media_player:
  - platform: speaker_source
    name: None
    id: speaker_media_player
    internal: false
    # Keep source/media volume separate from board loudness: `master_volume`
    # drives the ES8311 DAC, while media_player volume is the speaker/source
    # software layer. The TDM reference is captured from the hardware feedback
    # path, so do not attach audio_dac directly to hw_speaker here.
    volume_initial: 100%
    volume_min: 0%
    volume_max: 100%
    volume_increment: 5%
    media_pipeline:
      speaker: media_speaker_input
      sample_rate: 48000
      format: FLAC
      sources:
        - media_http_source
        - sendspin_media_source
    announcement_pipeline:
      speaker: tts_speaker_input
      format: FLAC
      sample_rate: 48000
      sources:
        - announcement_http_source
        - announcement_file_source
    on_announcement:
      - runtime_controller.event:
          id: runtime
          event: announcement_started
      - if:
          condition:
            voip_stack.is_idle:
          then:
            - script.execute: backlight_timer
    on_play:
      - runtime_controller.event:
          id: runtime
          event: media_playing
      - script.execute: backlight_timer
    on_pause:
      - runtime_controller.event:
          id: runtime
          event: media_paused
      - script.execute: backlight_timer
    on_idle:
      - if:
          condition:
            lambda: 'return id(g_voip_ringtone_media_suppressed) && id(g_voip_ringtone_restore_media);'
          then:
            - runtime_controller.event:
                id: runtime
                event: announcement_idle
          else:
            - runtime_controller.event:
                id: runtime
                event: media_idle
      - delay: 200ms
      - script.execute: backlight_timer

micro_wake_word:
  id: mww
  microphone: mic_afe
  stop_after_detection: false
  models:
    - model: alexa

voice_assistant:
  id: va
  microphone: mic_afe
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 0   # AFE does NS locally
  auto_gain: 0dBFS             # Do not add HA-side AGC on top of the AFE profile
  # Keep VA playback PCM at unity. Board loudness belongs to ES8311
  # `master_volume`; digital boost here can clip before the AEC reference path.
  volume_multiplier: 1.0
  on_timer_started:
    - script.execute: update_timer_state
  on_timer_cancelled:
    - script.execute: update_timer_state
  on_timer_updated:
    - script.execute: update_timer_state
  on_timer_tick:
    - script.execute: update_timer_state
  on_timer_finished:
    - runtime_controller.event:
        id: runtime
        event: timer_finished
    - script.execute: draw_display

voip_stack:
  id: phone
  task_stacks_in_psram: true
  # Set true to save roughly 5-8KB internal RAM from VoIP-owned staging
  # buffers. Keep false on P4 full AFE while there is enough heap, because these
  # buffers sit on the mic TX path during calls.
  buffers_in_psram: false
  audio:
    # Primary/preferred RTP profile: 16 kHz/10 ms from the AFE mic toward HA
    # and 48 kHz/10 ms toward the speaker. The 16 ms TX reframe remains for
    # direct ESP peers that prefer that packet time.
    tx:
      sample_rate: 16000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
    tx_formats:
      - sample_rate: 16000
        pcm_format: s16le
        channels: 1
        frame_ms: 16
    rx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
    # Additional accepted RX formats for direct ESP-to-ESP calls. These are valid
    # only because speaker: voip_speaker_input points at the resampler; do
    # not advertise additional formats when wiring voip_stack directly to a
    # fixed-rate mixer input.
    rx_formats:
      - sample_rate: 16000
        pcm_format: s16le
        channels: 1
        frame_ms: 10
      - sample_rate: 32000
        pcm_format: s16le
        channels: 1
        frame_ms: 16
      - sample_rate: 16000
        pcm_format: s16le
        channels: 1
        frame_ms: 16
      - sample_rate: 16000
        pcm_format: s16le
        channels: 1
        frame_ms: 32
  microphone: mic_afe          # Post-AEC: no echo in transmitted audio
  speaker: voip_speaker_input
  ringing_timeout: 30s
  # routing_mode default = device_independent (P2P). Override at runtime
  # via the "SIP bridge" switch in the SWITCHES block below.
  delete_contact_missing_from:
    updates_number: 1
  on_phonebook_update:
    - lambda: 'id(peer_name) = id(phone).get_current_destination();'
    - script.execute: draw_display
    - delay: 2s
    - script.execute: update_call_idle_labels
  on_destination_changed:
    - lambda: 'id(peer_name) = id(phone).get_current_destination();'
    - script.execute: update_call_idle_labels
    - script.execute: draw_display

# =============================================================================
# DISPLAY AND UI
# =============================================================================

# Using 7B model. For other sizes, change model and backlight pin:
#   7B:   WAVESHARE-ESP32-P4-WIFI6-TOUCH-LCD-7B  (1024x600, GPIO32)
#   10.1: WAVESHARE-P4-NANO-10.1                  (800x1280, GPIO26)
#   For 7"/8": model: CUSTOM + init_sequence from Waveshare BSP

display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-P4-NANO-10.1
    reset_pin: ${display_reset_pin} # GPIO27, X-series BSP hardware reset (BSP_LCD_RST)
    lane_bit_rate: 1500Mbps       # Per BSP: 1500 Mbps for 10.1" JD9365
    vsync_back_porch: 10          # Per Waveshare driver (ESPHome default is 12)
    dimensions:
      width: 800
      height: 1280
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: gt911
    id: main_touch
    i2c_id: internal_i2c
    # On this hardware revision GT9271 is detected on 0x5D.
    address: 0x5D
    display: main_display
    on_touch:
      - output.set_level:
          id: backlight_pwm
          level: 100%
      - script.execute: backlight_timer

