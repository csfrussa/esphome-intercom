# =============================================================================
# GENERIC ESP32-S3 INTERCOM + VA (ESP AUDIO STACK UDP) - Single I2S bus, no hardware codec
# =============================================================================
# Full-featured config: Intercom + Media Player + mixer (VA/MWW ready).
# For ESP32 boards where mic and speaker share the SAME I2S bus.
#
# Audio pipeline:
#   MEMS mic → esp_audio_stack (48kHz) → esp_ae_rate_cvt x3 → esp_afe (AEC+NS+AGC) → mic_main → VA / Intercom TX / MWW
#
#   Media       → media_speaker (resampler) ───────────┐
#   VA TTS      → tts_speaker (resampler) ─────────────┼── mixer (48kHz) → hw_speaker → class-D amp
#   Intercom RX → intercom_speaker (resampler) ────────┘
#
# HARDWARE (adapt GPIOs to YOUR board):
#   - Board: Any ESP32-S3 with PSRAM
#   - Flash: requires an ESP32-S3 layout with an app slot larger than the
#     default 4 MB OTA slot; 8 MB or 16 MB flash is recommended
#   - Microphone: Any I2S MEMS mic on DIN pin
#   - Speaker: Any I2S class-D amp on DOUT pin
#   - Mic and speaker SHARE BCLK + LRCLK (same I2S bus, full-duplex)
#   - LED: SK6812/WS2812 RGB (optional)
#   - ESP32-S3R8/S3R8V: do not use PSRAM pins for I2S/LED; the GPIOs below
#     are examples only and may need moving on those modules.
#
# GPIO PINOUT (example, change to match your wiring):
#   Shared I2S:  BCLK=GPIO36, LRCLK=GPIO37, DIN=GPIO35 (mic), DOUT=GPIO7 (speaker)
#   LED:         DATA=GPIO33
#
# =============================================================================

substitutions:
  # Hardware-shared identity: dropping firmware-variant suffix keeps build cache
  # and HA device entity stable across rebuilds.
  name: generic-s3
  friendly_name: Generic S3

  ext_components_source: "../../../esphome/components"

  assets_base: "../../../"

  # Microphone ID for package mute switch
  mic_id: mic_main

  # Non-default ports used by the integration test matrix to prove that mDNS,
  # HA phonebook generation, and UDP bridge dialing do not assume 6054/6055.
  intercom_udp_audio_port: "6156"
  intercom_udp_control_port: "6157"

# =============================================================================
# Package: shared VA + Intercom state machine
# =============================================================================
packages:
  core: !include ../../../packages/va_intercom.yaml
  intercom_transport: !include ../../../packages/intercom/transport_udp.yaml
  phonebook_subscribe: !include ../../../packages/intercom/phonebook_subscribe.yaml
  speaker_mute: !include ../../../packages/intercom/speaker_mute.yaml
  s3_base: !include ../../../packages/platform/esp32s3_base.yaml
  native_diagnostics: !include ../../../packages/diagnostics/native.yaml
  status_led: !include ../../../packages/led/status_ws2812_single.yaml
  led_state_full: !include ../../../packages/led/state_full_single.yaml
  speaker_mixer: !include ../../../packages/audio/full_mono_mixer_48k.yaml
  speaker_media_player: !include ../../../packages/media_player/full_mono_48k.yaml
  audio_stack_controls: !include ../../../packages/esp_audio_stack/controls.yaml
  afe_entities: !include ../../../packages/esp_afe/single_mic_entities.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      # Allow mbedtls to allocate its working buffers in PSRAM.
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Route ESP-IDF stdout (and ESPHome logger when hardware_uart=USB_SERIAL_JTAG)
      # to the built-in USB-Serial-JTAG peripheral. Required on boards where the
      # USB-C connector is wired to the S3's native USB-Serial-JTAG (e.g. Freenove,
      # bare ESP32-S3-DevKitC-1) rather than to an external USB-UART chip.
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: quad
  speed: 80MHz

preferences:
  flash_write_interval: 5min

api:

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  # DEBUG keeps PBX-lite signaling + AEC/AFE/i2s lifecycle visible.
  # Mute chatty ESPHome built-ins below; project components stay at DEBUG.
  level: INFO
  logs:
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN
    api.service: INFO
    light: INFO
    select: INFO
    speaker: INFO
    audio: INFO
    micro_wake_word: INFO
    voice_assistant: INFO
    media_player: INFO
    resampler: INFO
    mixer_speaker: INFO
    mdns: INFO
    wifi: INFO
    json: INFO
    intercom_api: INFO
    audio_processor: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, esp_audio_stack, esp_afe, audio_processor]

# =============================================================================
# ESP AFE
# =============================================================================
esp_afe:
  id: afe_processor
  type: sr
  mode: low_cost
  mic_num: 1
  aec_enabled: true
  aec_filter_length: 4
  aec_nlp_level: normal
  se_enabled: false
  ns_enabled: true
  vad_enabled: false
  agc_enabled: true
  memory_alloc_mode: more_psram
  task_core: 1
  task_priority: 5
  ringbuf_size: 8
  feed_task_core: 0
  feed_task_priority: 5
  feed_task_stack_size: 3072
  fetch_task_core: 1
  fetch_task_priority: 5
  fetch_task_stack_size: 3072
  feed_buf_in_psram: false
  feed_ring_in_psram: true
  fetch_ring_in_psram: false

# =============================================================================
# ESP Audio Stack
# =============================================================================
esp_audio_stack:
  id: audio_stack
  i2s_lrclk_pin: GPIO37
  i2s_bclk_pin: GPIO36
  i2s_din_pin: GPIO35
  i2s_dout_pin: GPIO7
  sample_rate: 48000
  output_sample_rate: 16000
  slot_bit_width: 32
  correct_dc_offset: true
  processor_id: afe_processor
  # No-codec AEC reference. ring_buffer is the Espressif/ADF TYPE2-style
  # software reference: speaker PCM is staged in a delay-tunable ring before
  # being fed to AFE. Use previous_frame only for lighter custom builds.
  aec_reference: ring_buffer
  buffers_in_psram: true

# =============================================================================
# Microphone
# =============================================================================
microphone:
  - platform: esp_audio_stack
    id: mic_main
    esp_audio_stack_id: audio_stack

# =============================================================================
# Speaker Pipeline
# =============================================================================
speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000

# =============================================================================
# Micro Wake Word: Device part
# =============================================================================
micro_wake_word:
  microphone: mic_main
  models:
    - model: alexa

# =============================================================================
# Voice Assistant: Device part
# =============================================================================
voice_assistant:
  microphone: mic_main
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

# =============================================================================
# Intercom API: Device part
# =============================================================================
intercom_api:
  tasks_stack_in_psram: true   # save ~28KB internal heap on S3 by placing task stacks in PSRAM
  frame_buffers_in_psram: true # Processor frame buffers (mic/ref/out, ~3 KB) in PSRAM
  protocol: udp
  microphone: mic_main
  speaker: intercom_speaker
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 5

# =============================================================================
# Switches (device-specific)
# =============================================================================
switch:

# =============================================================================
# AEC Mode Select
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    # Full-experience default: use the Espressif AFE pipeline. Generic single-mic
    # targets stay on SR modes by default to preserve MWW spectral features while
    # still using AFE-owned AEC/NS/AGC plumbing.
    options:
      - "sr_low_cost"
      - "sr_high_perf"
    initial_option: "sr_low_cost"
    # Non-optimistic: HA reflects the live component mode, not the value the
    # user clicked. If the switch is rejected (e.g. internal RAM fragmented)
    # or the component falls back to the previous mode, the select shows the
    # actual mode rather than a fictitious one.
    optimistic: false
    restore_value: true
    set_action:
      - if:
          condition:
            lambda: 'return id(init_in_progress);'
          then:
            - logger.log: "AEC mode select: skipping during boot"
          else:
            - if:
                condition:
                  or:
                    - voice_assistant.is_running:
                    - not:
                        intercom_api.is_idle: intercom
                then:
                  - logger.log:
                      level: WARN
                      format: "Cannot switch AEC mode during active VA/intercom"
                else:
                  - logger.log:
                      format: "Switching AEC mode to %s"
                      args: ['x.c_str()']
                  - micro_wake_word.stop:
                  - esp_audio_stack.stop: audio_stack
                  - esp_afe.set_mode:
                      id: afe_processor
                      mode: !lambda 'return x;'
                  - esp_audio_stack.start: audio_stack
                  - delay: 300ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start:
      # Reflect actual live mode (covers rejection and silent fallback).
      - lambda: |-
          id(aec_mode_select).publish_state(id(afe_processor).get_mode_name());

binary_sensor:
  # BOOT button (GPIO0), multi-click
  - platform: gpio
    name: Boot Button
    id: boot_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      # Single click: call toggle if intercom active, otherwise VA start/stop
      - timing:
          - ON for at most 500ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                not:
                  - intercom_api.is_idle: intercom
              then:
                - intercom_api.call_toggle: intercom
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      - voice_assistant.stop:
                    else:
                      - voice_assistant.start:
      # Double click: next contact
      - timing:
          - ON for 50ms to 500ms
          - OFF for at most 300ms
          - ON for 50ms to 500ms
          - OFF for at least 400ms
        then:
          - intercom_api.next_contact: intercom
      # Long press (1-3s): toggle mute
      - timing:
          - ON for 1s to 3s
          - OFF for at least 300ms
        then:
          - switch.toggle: mute
