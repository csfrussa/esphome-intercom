# =============================================================================
# Waveshare ESP32-S3-AUDIO-Board: VA + Intercom + MWW (no display)
# =============================================================================
#
# Hardware:
#   - ESP32-S3R8 (16MB Flash, 8MB PSRAM octal)
#   - ES8311 Audio DAC (speaker) + ES7210 Audio ADC (dual mic array)
#   - NS4150 3W mono Class-D speaker amp (via TCA9555 EXIO pin 8)
#   - 7x WS2812 addressable RGB LEDs (GPIO38)
#   - 3 user buttons via TCA9555 (EXIO 9/10/11) + BOOT button (GPIO0)
#   - Battery: MX1.25 3.7V Li-ion connector + charging IC
#
# Pin Map:
#   I2S: MCLK=GPIO12 BCLK=GPIO13 LRCLK=GPIO14 DIN=GPIO15 DOUT=GPIO16
#   I2C: SDA=GPIO11 SCL=GPIO10 (ES8311@0x18, ES7210@0x40, TCA9555@0x20)
#   LEDs: GPIO38 (WS2812 x7)
#   BOOT: GPIO0
#
# Audio pipeline (esp_audio_stack at 48kHz, TDM + Espressif rate conversion to 16kHz):
#
# Verified Waveshare ESP32-S3-AUDIO-Board slot map, board oriented with:
#   - speaker at the bottom
#   - GPIO/header connector at the top
#
# Empirical TDM mapping on this board:
#   - slot 2 = left microphone  (left of the GPIO connector)
#   - slot 0 = right microphone (right of the GPIO connector)
#   - slot 1 = playback reference used by AEC
#   - slot 3 = near-silent / unused on this board revision
#
# Dual-mic target:
#   ES7210 TDM slots [0, 2]          → esp_ae_rate_cvt x3 ──┐
#   ES7210 TDM slot 1 (DAC ref)      → esp_ae_rate_cvt x3 ──┴── esp_afe (AEC + Speech Enhancement + VAD) → mono mic_main → VA / Intercom TX / MWW
#
#   Music/radio → media_speaker (resampler) ───────────┐
#   VA TTS      → tts_speaker (resampler) ─────────────┼── mixer (48kHz) → hw_speaker → ES8311 DAC
#   Intercom RX → intercom_speaker (resampler) ────────┘
#
# =============================================================================

substitutions:
  # Hardware-shared identity: all Waveshare S3 firmware variants share the same
  # name so HA reuses the device entity and ESPHome reuses the build cache.
  name: waveshare-s3
  friendly_name: Waveshare S3 Audio

  ext_components_source: "../../../../esphome/components"

  assets_base: "../../../../"

  # Microphone ID for package mute switch
  mic_id: mic_main

# =============================================================================
# Package: shared VA + Intercom state machine, callbacks, switches, buttons
# =============================================================================
packages:
  core: !include ../../../../packages/va_intercom.yaml
  intercom_transport: !include ../../../../packages/intercom/transport_tcp.yaml
  phonebook_subscribe: !include ../../../../packages/intercom/phonebook_subscribe.yaml
  s3_base: !include ../../../../packages/platform/esp32s3_base.yaml
  native_diagnostics: !include ../../../../packages/diagnostics/native.yaml
  status_led: !include ../../../../packages/led/status_ws2812_ring.yaml
  led_state_full: !include ../../../../packages/led/state_full_ring.yaml
  afe_entities: !include ../../../../packages/esp_afe/dual_mic_entities.yaml
  audio_stack_controls: !include ../../../../packages/esp_audio_stack/controls.yaml
  speaker_power: !include ../../../../packages/esp_audio_stack/speaker_power_switch.yaml
  speaker_mixer: !include ../../../../packages/audio/full_mono_mixer_48k.yaml
  speaker_media_player: !include ../../../../packages/media_player/full_mono_48k.yaml

# =============================================================================
# ESPHome Base
# =============================================================================
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    priority: 200
    then:
      - delay: 200ms
      # Brief LED flash to indicate boot
      - light.turn_on:
          id: status_led
          red: 0%
          green: 0%
          blue: 100%
          brightness: 50%
          effect: none
      - delay: 500ms
      - light.turn_off: status_led
      # Sync reducer state with boot flash
      - globals.set:
          id: g_applied_led
          value: "0"

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      # mbedtls extras (still inline pending benchmark vs tls_external_mem.yaml).
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_DYNAMIC_BUFFER: "y"
      CONFIG_MBEDTLS_SSL_IN_CONTENT_LEN: "16384"
      # Keep AES in hardware for HTTPS media/TTS worst-case testing. The AFE
      # bridge buffers below live in PSRAM to preserve contiguous DMA heap.
      CONFIG_MBEDTLS_HARDWARE_AES: "y"

psram:
  mode: octal
  speed: 80MHz

api:
  # `start_call(dest)` actions come from packages/intercom/ha_api.yaml.

ota:
  - platform: esphome

logger:
  # DEBUG keeps PBX-lite signaling + AEC/AFE/i2s lifecycle visible.
  # Mute chatty ESPHome built-ins below; project components stay at DEBUG.
  level: INFO
  logs:
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN

network:
  enable_high_performance: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Full audio + API needs deterministic Wi-Fi latency; ESP32 LIGHT power save
  # can make the device appear associated while HA can no longer ARP it.
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [audio_processor, intercom_api, esp_audio_stack, esp_afe]

# =============================================================================
# I2C Bus (shared: ES8311, ES7210, TCA9555)
# =============================================================================
i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO10
    scan: false

# TCA9555 IO Expander (speaker amp, buttons)
tca9555:
  - id: io_expander
    address: 0x20
    i2c_id: internal_i2c

# =============================================================================
# Audio: AFE + Espressif-backed ESP Audio Stack
# =============================================================================
esp_afe:
  id: afe_processor
  type: fd
  mode: low_cost
  mic_num: 2
  aec_filter_length: 4
  aec_nlp_level: normal
  memory_alloc_mode: more_psram
  # Espressif layout:
  # - SE/BSS worker preference stays on Core 1 at the official low priority.
  # - GMF AFE manager feed/fetch tasks stay on different cores, as Espressif's
  #   own GMF troubleshooting recommends for avoiding AFE task WDT.
  task_core: 1
  task_priority: 5
  ringbuf_size: 8
  feed_task_core: 0
  feed_task_priority: 5
  feed_task_stack_size: 3072
  fetch_task_core: 1
  fetch_task_priority: 5
  fetch_task_stack_size: 3072
  se_enabled: true
  ns_enabled: true
  vad_enabled: false
  # WS3 keeps AGC out of the runtime profile. It can improve MWW sensitivity
  # under playback, but on this target it causes TTS/media stutter and any
  # runtime toggle requires a full AFE rebuild.
  agc_enabled: false
  # Worst-case HTTPS media/TTS + intercom needs contiguous internal/DMA heap for
  # TLS and I2S. Keep only the large staging ring in PSRAM; the per-frame
  # scratch and fetch output ring stay internal to avoid PSRAM jitter.
  feed_buf_in_psram: false      # ~3 KB hot scratch
  feed_ring_in_psram: true      # ~24 KB staging ring on 2-mic + ref FD
  fetch_ring_in_psram: false    # ~8 KB hot output ring

esp_audio_stack:
  id: audio_stack
  # WS3 full AFE profile:
  # - audio_stack is the non-network realtime I2S bridge: Core 0 / prio 19 is
  #   below Wi-Fi prio 23 and above lwIP prio 18, matching ESP-IDF guidance
  #   for time-critical tasks that do not perform TCP/IP work.
  # - audio_stack task stack in PSRAM saves ~8 KB internal heap.
  # - component frame buffers in PSRAM preserve internal/DMA heap for Wi-Fi,
  #   TLS, I2S DMA and esp-sr internals.
  # - GMF codec IO stays synchronous: io_codec_dev read/write run inside the
  #   audio_stack task, so they inherit the PSRAM stack without adding reader/
  #   writer tasks or data-bus latency between mic/ref and AFE.
  audio_stack_in_psram: true
  buffers_in_psram: true
  task_core: 0
  task_priority: 19
  task_stack_size: 8192
  # Official IDF i2s_chan_config_t knob. 240 frames is the IDF/periph_i2s
  # default and halves the WS3 full-duplex TDM DMA reservation vs the previous
  # 10ms auto value (~480 frames), recovering ~23 KB contiguous internal heap.
  dma_frame_num: 240
  gmf_io:
    reader:
      io_size: 0
      buffer_size: 0
      task_stack_size: 0
      speed_monitor: false
    writer:
      io_size: 0
      buffer_size: 0
      task_stack_size: 0
      speed_monitor: false
  i2s_lrclk_pin: GPIO14
  i2s_bclk_pin: GPIO13
  i2s_mclk_pin: GPIO12
  i2s_din_pin: GPIO15
  i2s_dout_pin: GPIO16
  sample_rate: 48000
  output_sample_rate: 16000
  processor_id: afe_processor
  audio_effects:
    rate_cvt_complexity: 3
    rate_cvt_perf_type: speed
  codec:
    i2c_id: internal_i2c
    input:
      type: es7210
      address: 0x40
      mic_selected: 0x0F
      gain_db: 24.0
    output:
      type: es8311
      address: 0x18
      use_mclk: true
      no_dac_ref: true
  use_tdm_reference: true
  tdm_total_slots: 4
  tdm_mic_slots: [0, 2]  # Verified right-side mic, left-side mic
  tdm_ref_slot: 1        # Verified playback reference for AEC

# =============================================================================
# Microphone (ES7210 ADC, 16kHz output after Espressif rate conversion + AEC)
# =============================================================================
microphone:
  - platform: esp_audio_stack
    id: mic_main
    esp_audio_stack_id: audio_stack

# =============================================================================
# Speaker Pipeline: esp_audio_stack -> resampler -> mixer (all at 48kHz)
# =============================================================================
speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000


# =============================================================================
# Media Player board sizing
# =============================================================================
media_player:
  - id: !extend speaker_media_player
    buffer_size: 131072

# =============================================================================
# Micro Wake Word: Hardware config (callbacks from package)
# =============================================================================
micro_wake_word:
  microphone: mic_main
  models:
    - model: alexa

# =============================================================================
# Voice Assistant: Hardware config (callbacks from package)
# =============================================================================
voice_assistant:
  microphone: mic_main
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 0
  auto_gain: 0dBFS
  volume_multiplier: 2.0

# =============================================================================
# Intercom API: Hardware config (callbacks from package)
# =============================================================================
intercom_api:
  tasks_stack_in_psram: true   # save ~28KB internal heap on S3 PSRAM builds by placing task stacks in PSRAM
  frame_buffers_in_psram: true # Processor frame buffers (mic/ref/out, ~3 KB) in PSRAM
  microphone: mic_main
  speaker: intercom_speaker
  ringing_timeout: 30s
  # routing_mode default = device_independent (P2P). Override at runtime
  # via the "HA PBX Mode" switch in the device-specific switch block below.
  delete_contact_missing_from:
    updates_number: 5

# =============================================================================
# Physical Buttons
# =============================================================================
binary_sensor:
  # BOOT button (GPIO0), multi-click
  - platform: gpio
    name: Boot Button
    id: boot_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      # Single click: call toggle if intercom active, otherwise VA start/stop
      - timing:
          - ON for at most 500ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                not:
                  - intercom_api.is_idle: intercom
              then:
                - intercom_api.call_toggle: intercom
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      - voice_assistant.stop:
                    else:
                      - voice_assistant.start:
      # Double click: next contact
      - timing:
          - ON for 50ms to 500ms
          - OFF for at most 300ms
          - ON for 50ms to 500ms
          - OFF for at least 400ms
        then:
          - intercom_api.next_contact: intercom
      # Long press (1-3s): toggle mute
      - timing:
          - ON for 1s to 3s
          - OFF for at least 300ms
        then:
          - switch.toggle: mute

  # KEY1 (TCA9555 EXIO9): Call/Answer/Hangup
  - platform: gpio
    name: Key 1
    id: key1
    internal: true
    pin:
      tca9555: io_expander
      number: 9
      inverted: true
      mode:
        input: true
    on_press:
      - intercom_api.call_toggle: intercom

  # KEY2 (TCA9555 EXIO10): Next contact
  - platform: gpio
    name: Key 2
    id: key2
    internal: true
    pin:
      tca9555: io_expander
      number: 10
      inverted: true
      mode:
        input: true
    on_press:
      - intercom_api.next_contact: intercom

  # KEY3 (TCA9555 EXIO11): Decline / Previous contact
  - platform: gpio
    name: Key 3
    id: key3
    internal: true
    pin:
      tca9555: io_expander
      number: 11
      inverted: true
      mode:
        input: true
    on_press:
      - if:
          condition:
            intercom_api.is_ringing: intercom
          then:
            - intercom_api.decline_call: intercom
          else:
            - intercom_api.prev_contact: intercom

# =============================================================================
# Switches (device-specific)
# =============================================================================
switch:
  # Speaker amplifier enable (TCA9555 EXIO8)
  - platform: gpio
    id: speaker_enable
    internal: true
    restore_mode: ALWAYS_OFF
    pin:
      tca9555: io_expander
      number: 8
      mode:
        output: true

  - platform: template
    name: Speaker Mute
    id: speaker_mute
    icon: mdi:volume-off
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute ON"
      - speaker.mute_on: hw_speaker
      - delay: 50ms
      - switch.turn_off: speaker_enable
      - script.execute: update_status
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Speaker mute OFF"
      - if:
          condition:
            speaker.is_playing: hw_speaker
          then:
            - switch.turn_on: speaker_enable
            - delay: 50ms
      - speaker.mute_off: hw_speaker
      - script.execute: update_status

  # Intercom switches

# =============================================================================
# Select Entities
# =============================================================================
select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    # FD* is the esp-sr 2.4 full-audio stack pipeline (NLP baked in for two-way speech).
    # Default on this board because dual-mic ES7210 TDM input enables AFE_TYPE_FD,
    # which is the recommended type for boards with mic+ref on the same bus.
    options:
      - "fd_low_cost"
      - "fd_high_perf"
    initial_option: "fd_low_cost"
    # Non-optimistic: template_select::control runs the set_action first
    # and only auto-publishes `index` when optimistic=true, overwriting
    # whatever we published. With optimistic=false, the final lambda
    # publish_state drives HA state from the live esp_afe mode.
    optimistic: false
    restore_value: true
    set_action:
      - if:
          condition:
            lambda: 'return id(init_in_progress);'
          then:
            - logger.log: "AEC mode select: skipping during boot"
          else:
            - if:
                condition:
                  or:
                    - voice_assistant.is_running:
                    - not:
                        intercom_api.is_idle: intercom
                then:
                  - logger.log:
                      level: WARN
                      format: "Cannot switch AEC mode during active VA/intercom"
                else:
                  - logger.log:
                      format: "Switching AEC mode to %s"
                      args: ['x.c_str()']
                  - micro_wake_word.stop:
                  - esp_audio_stack.stop: audio_stack
                  - esp_afe.set_mode:
                      id: afe_processor
                      mode: !lambda 'return x;'
                  - esp_audio_stack.start: audio_stack
                  - delay: 300ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - script.execute: start_mww_when_ready
      - lambda: |-
          id(aec_mode_select).publish_state(id(afe_processor).get_mode_name());
