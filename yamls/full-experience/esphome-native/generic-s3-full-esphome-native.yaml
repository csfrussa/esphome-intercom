# =============================================================================
# GENERIC ESP32-S3 FULL NATIVE - ESPHome native audio, no ESP AEC
# =============================================================================
# Generic target: ESP32-S3 board with PSRAM and native ESPHome
# microphone/speaker components. The tested example uses one INMP441
# microphone and one MAX98357A amplifier on separate I2S buses.
#
# This profile keeps the full-experience ESPHome facade (VA, MWW, media player,
# intercom, phonebook, LEDs, HA API, diagnostics), but deliberately uses native
# ESPHome i2s_audio microphone/speaker components instead of esp_audio_stack.
#
# Intended use:
#   - hardware that already provides processed/AEC audio before ESPHome, for
#     example XMOS front-ends that output echo-cancelled PCM;
#   - regression testing intercom_api standalone against standard ESPHome audio;
#   - simple dual-I2S MEMS + amplifier builds where echo cancellation is not
#     needed.
#
# Important: native ESPHome microphone/speaker components do not provide
# software echo cancellation. With a plain INMP441 + MAX98357A setup, speaker
# echo will not be removed. If you need software AEC/AFE, read the
# esp_audio_stack documentation or use a maintained full AEC/AFE YAML.
#
# Endpoint mode: full_duplex. The intercom-only esphome-native folder contains
# dedicated mic-only and speaker-only variants; this full-experience profile
# keeps both audio directions because VA, MWW and media player require them.
#
# Tested hardware: Freenove ESP32-S3-WROOM CAM / FNK0085, camera module removed.
# Tested chip/memory: ESP32-S3 N8R8, 8 MB flash, 8 MB OPI PSRAM.
# Tested modules: INMP441 digital MEMS microphone, MAX98357A I2S amplifier.
#
# Audio pipeline:
#   INMP441 -> native ESPHome i2s_audio microphone -> MicrophoneSource
#           -> VA / Intercom / MWW
#   Media/VA/Intercom -> mixer/resampler (48 kHz) -> native ESPHome i2s_audio
#           speaker -> MAX98357A
#
# Wiring:
#   INMP441:
#     SCK/BCLK -> GPIO9
#     WS/LRCLK -> GPIO10
#     SD/DOUT  -> GPIO11
#     L/R      -> 3V3, tied locally with VDD so the mic outputs right channel
#     VDD      -> 3V3
#     GND      -> GND
#
#   MAX98357A:
#     BCLK     -> GPIO12
#     LRC/WS   -> GPIO13
#     DIN      -> GPIO14
#     SD/EN    -> GPIO18 (optional; tie high instead if your board prefers)
#     VIN      -> 5V or 3V3 according to your MAX98357A module
#     GND      -> GND
# =============================================================================

substitutions:
  name: generic-s3-full-native
  friendly_name: Generic S3 Full Native

  ext_components_source: "github://n-IA-hane/esphome-intercom@voip-refactor"
  assets_base: "https://github.com/n-IA-hane/esphome-intercom/raw/voip-refactor/"
  mic_id: native_mic_raw

  speaker_enable_pin: GPIO18
  status_led_pin: GPIO48
  status_led_chipset: WS2812
  status_led_rgb_order: GRB

packages:
  core: github://n-IA-hane/esphome-intercom/packages/va_intercom.yaml@voip-refactor
  va_buttons_switches: github://n-IA-hane/esphome-intercom/packages/intercom/va_buttons_switches.yaml@voip-refactor
  call_settings: github://n-IA-hane/esphome-intercom/packages/intercom/call_settings.yaml@voip-refactor
  ha_api: github://n-IA-hane/esphome-intercom/packages/intercom/ha_api.yaml@voip-refactor
  voice_assistant_local_commands: github://n-IA-hane/esphome-intercom/packages/voice_assistant/local_commands.yaml@voip-refactor
  ota_maintenance: github://n-IA-hane/esphome-intercom/packages/ota/full_native_audio_maintenance.yaml@voip-refactor
  intercom_transport: github://n-IA-hane/esphome-intercom/packages/intercom/transport.yaml@voip-refactor
  phonebook_subscribe: github://n-IA-hane/esphome-intercom/packages/intercom/phonebook_subscribe.yaml@voip-refactor
  speaker_mute: github://n-IA-hane/esphome-intercom/packages/intercom/speaker_mute.yaml@voip-refactor
  s3_base: github://n-IA-hane/esphome-intercom/packages/platform/esp32s3_base.yaml@voip-refactor
  native_diagnostics: github://n-IA-hane/esphome-intercom/packages/diagnostics/native.yaml@voip-refactor
  status_led: github://n-IA-hane/esphome-intercom/packages/led/status_ws2812_single.yaml@voip-refactor
  led_state_full: github://n-IA-hane/esphome-intercom/packages/led/state_full_single.yaml@voip-refactor
  speaker_mixer: github://n-IA-hane/esphome-intercom/packages/audio/full_mono_mixer_48k.yaml@voip-refactor
  speaker_media_player: github://n-IA-hane/esphome-intercom/packages/media_player/full_mono_48k.yaml@voip-refactor
  flac_codecs_psram: github://n-IA-hane/esphome-intercom/packages/audio/flac_codecs_psram.yaml@voip-refactor

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: freenove_esp32_s3_wroom
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

api:

ota:
  - platform: esphome
    id: ota_esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    intercom_api: INFO
    intercom_api.fsm: INFO
    intercom_api.tcp: INFO
    intercom_api.udp: INFO
    intercom_api.audio: INFO
    intercom_api.settings: INFO
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN
    api.service: INFO
    light: INFO
    select: INFO
    speaker: INFO
    audio: INFO
    i2s_audio: INFO
    microphone: INFO
    micro_wake_word: INFO
    voice_assistant: INFO
    media_player: INFO
    resampler: INFO
    mixer_speaker: INFO
    wifi: INFO
    json: INFO
    intercom_api: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, audio_processor, speaker]

output:
  - platform: gpio
    id: speaker_enable
    pin: ${speaker_enable_pin}

i2s_audio:
  - id: rx_i2s
    i2s_bclk_pin: GPIO9
    i2s_lrclk_pin: GPIO10

  - id: tx_i2s
    i2s_bclk_pin: GPIO12
    i2s_lrclk_pin: GPIO13

# INMP441 is strapped to the right slot. Keep the wire in stereo and let each
# MicrophoneSource select channel 1; this matches the stable full-duplex path
# and avoids mono-slot silence on some IDF/board combinations.
microphone:
  - platform: i2s_audio
    id: native_mic_raw
    adc_type: external
    i2s_audio_id: rx_i2s
    i2s_din_pin: GPIO11
    channel: stereo
    sample_rate: 16000
    bits_per_sample: 32bit
    correct_dc_offset: true

speaker:
  - platform: i2s_audio
    id: hw_speaker
    dac_type: external
    i2s_audio_id: tx_i2s
    i2s_dout_pin: GPIO14
    channel: mono
    sample_rate: 48000
    bits_per_sample: 16bit
    buffer_duration: 100ms
    timeout: 500ms

micro_wake_word:
  microphone:
    id: mww_mic_source
    microphone: native_mic_raw
    bits_per_sample: 16
    channels: [1]
    gain_factor: 1
  models:
    - model: alexa

voice_assistant:
  microphone:
    - id: va_mic_source
      microphone: native_mic_raw
      bits_per_sample: 16
      channels: [1]
      gain_factor: 1
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

intercom_api:
  task_stacks_in_psram: true
  buffers_in_psram: true
  microphone_source:
    id: intercom_mic_source
    microphone: native_mic_raw
    bits_per_sample: 16
    channels: [1]
    gain_factor: 1
  speaker: intercom_speaker_input
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1

number:
  - platform: template
    id: master_volume
    name: Master Volume
    icon: mdi:volume-high
    entity_category: config
    min_value: 0
    max_value: 100
    step: 5
    mode: SLIDER
    optimistic: true
    restore_value: true
    initial_value: 100
    set_action:
      - lambda: |-
          const float clamped = std::max(0.0f, std::min(100.0f, x));
          const uint8_t reduction = clamped <= 0.0f
                                      ? 51
                                      : static_cast<uint8_t>(std::lround((100.0f - clamped) * 51.0f / 100.0f));
          ESP_LOGI("audio", "Native master volume %.0f%% -> mixer ducking %u dB", clamped, reduction);
      - mixer_speaker.apply_ducking:
          id: media_mixer_input
          decibel_reduction: !lambda |-
            const float clamped = std::max(0.0f, std::min(100.0f, x));
            return clamped <= 0.0f
                       ? static_cast<uint8_t>(51)
                       : static_cast<uint8_t>(std::lround((100.0f - clamped) * 51.0f / 100.0f));
          duration: 150ms
      - mixer_speaker.apply_ducking:
          id: tts_mixer_input
          decibel_reduction: !lambda |-
            const float clamped = std::max(0.0f, std::min(100.0f, x));
            return clamped <= 0.0f
                       ? static_cast<uint8_t>(51)
                       : static_cast<uint8_t>(std::lround((100.0f - clamped) * 51.0f / 100.0f));
          duration: 150ms
      - mixer_speaker.apply_ducking:
          id: intercom_mixer_input
          decibel_reduction: !lambda |-
            const float clamped = std::max(0.0f, std::min(100.0f, x));
            return clamped <= 0.0f
                       ? static_cast<uint8_t>(51)
                       : static_cast<uint8_t>(std::lround((100.0f - clamped) * 51.0f / 100.0f));
          duration: 150ms

  - platform: template
    id: mic_gain
    name: Mic Boost
    icon: mdi:microphone
    entity_category: config
    min_value: 0
    max_value: 36
    step: 1
    unit_of_measurement: dB
    mode: SLIDER
    optimistic: true
    restore_value: true
    initial_value: 0
    set_action:
      - lambda: |-
          const float clamped = std::max(0.0f, std::min(36.0f, x));
          int factor = static_cast<int>(std::lround(std::pow(10.0f, clamped / 20.0f)));
          factor = std::max(1, std::min(64, factor));
          id(va_mic_source).set_gain_factor(factor);
          id(mww_mic_source).set_gain_factor(factor);
          id(intercom_mic_source).set_gain_factor(factor);
          ESP_LOGI("audio", "Native mic boost %.0fdB -> MicrophoneSource gain_factor=%d", clamped, factor);

switch:
  - platform: output
    id: speaker_power
    name: Speaker Power
    output: speaker_enable
    restore_mode: RESTORE_DEFAULT_ON

binary_sensor:
  # BOOT button (GPIO0), multi-click.
  - platform: gpio
    name: Boot Button
    id: boot_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      # Single click: call toggle if intercom active, otherwise VA start/stop.
      - timing:
          - ON for at most 500ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                not:
                  - intercom_api.is_idle: intercom
              then:
                - intercom_api.call_toggle: intercom
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      - voice_assistant.stop:
                    else:
                      - voice_assistant.start:
      # Double click: next contact.
      - timing:
          - ON for 50ms to 500ms
          - OFF for at most 300ms
          - ON for 50ms to 500ms
          - OFF for at least 400ms
        then:
          - intercom_api.next_contact: intercom
      # Long press (1-3s): toggle mute.
      - timing:
          - ON for 1s to 3s
          - OFF for at least 300ms
        then:
          - switch.toggle: mute
