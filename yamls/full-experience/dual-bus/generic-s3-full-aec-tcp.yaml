# =============================================================================
# GENERIC ESP32-S3 FULL AEC TCP - Dual I2S bus, no codec
# =============================================================================
# Generic target: ESP32-S3 board with PSRAM, one INMP441 microphone and one
# MAX98357A amplifier on separate I2S buses.
#
# Tested hardware: Freenove ESP32-S3-WROOM CAM / FNK0085, camera module removed.
# Tested chip/memory: ESP32-S3 N8R8, 8 MB flash, 8 MB OPI PSRAM.
# Tested modules: INMP441 digital MEMS microphone, MAX98357A I2S amplifier.
#
# Audio pipeline:
#   INMP441 -> RX I2S bus -> esp_audio_stack (48 kHz) -> esp_ae_rate_cvt -> esp_aec -> VA / Intercom / MWW
#   Media/VA/Intercom -> mixer (48 kHz) -> esp_audio_stack -> TX I2S bus -> MAX98357A
#
# Pin choice rationale:
#   - Camera GPIOs are reused because the camera module is removed.
#   - Do not use GPIO35/36/37: OPI PSRAM on this Freenove N8R8 board.
#   - Do not use GPIO38/39/40: onboard SD card bus.
#   - Do not use GPIO19/20: native USB D+/D-.
#   - Do not use GPIO43/44: UART0 serial logging/programming.
#   - GPIO48 drives the onboard WS2812 status LED.
#   - Avoid GPIO0/3/45/46 for I2S clocks/data because they are boot/strap/log/JTAG-sensitive.
#
# Wiring:
#   INMP441:
#     SCK/BCLK -> GPIO9
#     WS/LRCLK -> GPIO10
#     SD/DOUT  -> GPIO11
#     L/R      -> 3V3, tied locally with VDD so the mic outputs right channel
#     VDD      -> 3V3
#     GND      -> GND
#
#   MAX98357A:
#     BCLK     -> GPIO12
#     LRC/WS   -> GPIO13
#     DIN      -> GPIO14
#     SD/EN    -> GPIO18 (optional; tie high instead if your board prefers)
#     VIN      -> 5V or 3V3 according to your MAX98357A module
#     GND      -> GND
#
# Sources checked:
#   - Freenove/Freenove_ESP32_S3_WROOM_Board: applies to FNK0085.
#   - Freenove ESP32S3_Pinout.png: camera pins 4/5/6/7/15/16/17/18/8/9/10/11/12/13/14,
#     SD pins 38/39/40, PSRAM pins 35/36/37, USB pins 19/20, WS2812 pin 48.
#   - PlatformIO board freenove_esp32_s3_wroom: N8R8, qio_opi, 8 MB flash, 8 MB PSRAM.
# =============================================================================

substitutions:
  name: generic-s3-dual-aec-tcp
  friendly_name: Generic S3 Dual AEC TCP

  ext_components_source: "github://n-IA-hane/esphome-intercom@dev"
  assets_base: "https://github.com/n-IA-hane/esphome-intercom/raw/dev/"
  mic_id: mic_main
  intercom_tcp_port: "6254"

  speaker_enable_pin: GPIO18
  status_led_pin: GPIO48
  status_led_chipset: WS2812
  status_led_rgb_order: GRB

packages:
  core: github://n-IA-hane/esphome-intercom/packages/va_intercom_cpp.yaml@dev
  va_buttons_switches: github://n-IA-hane/esphome-intercom/packages/intercom/va_buttons_switches_cpp.yaml@dev
  call_settings: github://n-IA-hane/esphome-intercom/packages/intercom/call_settings.yaml@dev
  ha_api: github://n-IA-hane/esphome-intercom/packages/intercom/ha_api_cpp.yaml@dev
  voice_assistant_local_commands: github://n-IA-hane/esphome-intercom/packages/voice_assistant/local_commands_cpp.yaml@dev
  ota_maintenance: github://n-IA-hane/esphome-intercom/packages/ota/full_audio_maintenance.yaml@dev
  intercom_transport: github://n-IA-hane/esphome-intercom/packages/intercom/transport_tcp.yaml@dev
  phonebook_subscribe: github://n-IA-hane/esphome-intercom/packages/intercom/phonebook_subscribe.yaml@dev
  speaker_mute: github://n-IA-hane/esphome-intercom/packages/intercom/speaker_mute_cpp.yaml@dev
  s3_base: github://n-IA-hane/esphome-intercom/packages/platform/esp32s3_base.yaml@dev
  native_diagnostics: github://n-IA-hane/esphome-intercom/packages/diagnostics/native.yaml@dev
  status_led: github://n-IA-hane/esphome-intercom/packages/led/status_ws2812_single.yaml@dev
  led_state_full: github://n-IA-hane/esphome-intercom/packages/led/state_full_single.yaml@dev
  speaker_mixer: github://n-IA-hane/esphome-intercom/packages/audio/full_mono_mixer_48k_cpp.yaml@dev
  speaker_media_player: github://n-IA-hane/esphome-intercom/packages/media_player/full_mono_48k_cpp.yaml@dev
  va_timers: github://n-IA-hane/esphome-intercom/packages/voice_assistant/timers_cpp.yaml@dev
  audio_stack_controls: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/controls.yaml@dev
  aec_controls: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/aec_controls.yaml@dev
  speaker_power: github://n-IA-hane/esphome-intercom/packages/esp_audio_stack/speaker_power_output.yaml@dev
  flac_codecs_psram: github://n-IA-hane/esphome-intercom/packages/audio/flac_codecs_psram.yaml@dev

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: freenove_esp32_s3_wroom
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      # Freenove exposes the S3 USB-Serial/JTAG port as /dev/ttyACM*. Keep
      # ESP-IDF stdout and ESPHome logger on the same port used for flashing.
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

api:

ota:
  - platform: esphome
    id: ota_esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    intercom_api: INFO
    intercom_api.fsm: INFO
    intercom_api.tcp: INFO
    intercom_api.udp: INFO
    intercom_api.audio: INFO
    intercom_api.settings: INFO
    intercom_api.discovery: INFO
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN
    api.service: INFO
    light: INFO
    select: INFO
    speaker: INFO
    audio: INFO
    micro_wake_word: INFO
    voice_assistant: INFO
    media_player: INFO
    resampler: INFO
    mixer_speaker: INFO
    mdns: INFO
    wifi: INFO
    json: INFO
    intercom_api: INFO
    audio_processor: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, esp_audio_stack, esp_aec, audio_processor, runtime_fsm, speaker, voice_assistant]

output:
  - platform: gpio
    id: speaker_enable
    pin: ${speaker_enable_pin}

esp_aec:
  id: aec_processor
  sample_rate: 16000
  filter_length: 4
  mode: sr_low_cost

esp_audio_stack:
  id: audio_stack
  rx_bus:
    i2s_num: 0
    i2s_bclk_pin: GPIO9
    i2s_lrclk_pin: GPIO10
    i2s_din_pin: GPIO11
  tx_bus:
    i2s_num: 1
    i2s_bclk_pin: GPIO12
    i2s_lrclk_pin: GPIO13
    i2s_dout_pin: GPIO14
  sample_rate: 48000
  output_sample_rate: 16000
  bits_per_sample: 32
  slot_bit_width: 32
  correct_dc_offset: true
  mic_channel: right
  rx_slot_mode: stereo
  processor_id: aec_processor
  aec_reference: ring_buffer
  aec_reference_buffer_ms: 80
  buffers_in_psram: true
  aec_ref_ring_in_psram: true
  audio_task_stack_in_psram: true

microphone:
  - platform: esp_audio_stack
    id: mic_main
    esp_audio_stack_id: audio_stack

speaker:
  - platform: esp_audio_stack
    id: hw_speaker
    esp_audio_stack_id: audio_stack
    sample_rate: 48000
    bits_per_sample: 16

micro_wake_word:
  microphone: mic_main
  models:
    - model: alexa

voice_assistant:
  microphone: mic_main
  media_player: speaker_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0

intercom_api:
  task_stacks_in_psram: true
  buffers_in_psram: true
  audio:
    # Primary/preferred RX format: HA/browser calls choose this for better
    # speaker quality on the 48 kHz mixer path. TX remains the microphone/AFE
    # format unless audio.tx is overridden.
    rx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 20
    # Fallback accepted RX formats for direct ESP-to-ESP calls. These are valid
    # only because speaker: intercom_speaker_input points at the resampler; do
    # not advertise fallback formats when wiring intercom_api directly to a
    # fixed-rate mixer input.
    rx_formats:
      - sample_rate: 16000
        pcm_format: s16le
        channels: 1
        frame_ms: 32
  microphone: mic_main
  speaker: intercom_speaker_input
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 1

switch:

select:
  - platform: template
    name: AEC Mode
    id: aec_mode_select
    icon: mdi:tune-vertical
    options:
      - "sr_low_cost"
      - "sr_high_perf"
    initial_option: "sr_low_cost"
    optimistic: false
    restore_value: true
    set_action:
      - if:
          condition:
            lambda: 'return id(init_in_progress);'
          then:
            - logger.log: "AEC mode select: skipping during boot"
          else:
            - if:
                condition:
                  or:
                    - voice_assistant.is_running:
                    - not:
                        intercom_api.is_idle: intercom
                then:
                  - logger.log:
                      level: WARN
                      format: "Cannot switch AEC mode during active VA/intercom"
                else:
                  - logger.log:
                      format: "Switching AEC mode to %s"
                      args: ['x.c_str()']
                  - micro_wake_word.stop:
                  - esp_audio_stack.stop_and_wait: audio_stack
                  - esp_aec.set_mode:
                      id: aec_processor
                      mode: !lambda 'return x;'
                  - esp_audio_stack.start: audio_stack
                  - delay: 300ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start:
      - lambda: |-
          id(aec_mode_select).publish_state(id(aec_processor).get_mode_name());

binary_sensor:
  # BOOT button (GPIO0), multi-click
  - platform: gpio
    name: Boot Button
    id: boot_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
    on_multi_click:
      # Single click: call toggle if intercom active, otherwise VA start/stop
      - timing:
          - ON for at most 500ms
          - OFF for at least 400ms
        then:
          - if:
              condition:
                not:
                  - intercom_api.is_idle: intercom
              then:
                - intercom_api.call_toggle: intercom
              else:
                - runtime_fsm.event:
                    id: runtime_controller
                    event: wake_word
      # Double click: next contact
      - timing:
          - ON for 50ms to 500ms
          - OFF for at most 300ms
          - ON for 50ms to 500ms
          - OFF for at least 400ms
        then:
          - intercom_api.next_contact: intercom
      # Long press (1-3s): toggle mute
      - timing:
          - ON for 1s to 3s
          - OFF for at least 300ms
        then:
          - switch.toggle: mute
