# =============================================================================
# Waveshare ESP32-P4 landscape rotation proof
# =============================================================================
#
# Local debug target, ignored by git.
#
# Purpose:
#   - prove landscape UI over the panel native 800x1280 timing;
#   - verify GT911/GT9271 touch coordinates;
#   - compare horizontal and vertical page gestures before building the real UI.
# =============================================================================

substitutions:
  name: waveshare-p4-landscape-rotation
  friendly_name: Waveshare P4 Landscape Rotation

packages:
  p4_base: !include ../../packages/platform/esp32p4_base.yaml
  p4_c6_sdio: !include ../../packages/board/esp32p4_c6_sdio.yaml
  p4_lvgl_ppa: !include ../../packages/lvgl/p4_ppa.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: -100
      then:
        - light.turn_on:
            id: display_backlight
            brightness: 100%
        - lvgl.page.show: geometry_home_page

psram:
  mode: hex
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

logger:
  level: DEBUG
  logs:
    lvgl: INFO
    display: INFO
    mipi_dsi: INFO
    touchscreen: DEBUG
    gt911.touchscreen: DEBUG

api:

ota:
  - platform: esphome

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 10min

i2c:
  - id: internal_i2c
    sda: GPIO7
    scl: GPIO8
    frequency: 400kHz
    scan: false

display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-P4-NANO-10.1
    reset_pin: 27
    lane_bit_rate: 1500Mbps
    vsync_back_porch: 10
    dimensions:
      width: 800
      height: 1280
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: gt911
    id: main_touch
    i2c_id: internal_i2c
    address: 0x5D
    display: main_display
    update_interval: 50ms
    on_touch:
      - lambda: |-
          ESP_LOGI("p4_landscape_touch", "touch id=%u x=%u y=%u raw=%d,%d state=%d",
                   touch.id, touch.x, touch.y, touch.x_raw, touch.y_raw, touch.state);
          lv_label_set_text_fmt(id(touch_live_label), "touch x=%u y=%u raw=%d,%d",
                                touch.x, touch.y, touch.x_raw, touch.y_raw);
      - light.turn_on:
          id: display_backlight
          brightness: 100%

output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO26
    inverted: false
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: display_backlight
    name: Display Backlight
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 150ms

font:
  - file:
      type: gfonts
      family: Noto Sans
      weight: 700
    id: font_title
    size: 48
    glyphs: " !%()+,-./0123456789:=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file:
      type: gfonts
      family: Noto Sans
      weight: 500
    id: font_body
    size: 26
    glyphs: " !%()+,-./0123456789:=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"
  - file:
      type: gfonts
      family: Noto Sans
      weight: 700
    id: font_marker
    size: 34
    glyphs: " !%()+,-./0123456789:=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"

lvgl:
  displays:
    - main_display
  touchscreens:
    - main_touch
  rotation: 90
  color_depth: 16
  byte_order: little_endian
  log_level: INFO
  full_refresh: true
  pages:
    - id: geometry_home_page
      bg_color: 0x101216
      on_swipe_left:
        - lvgl.page.show:
            id: geometry_horizontal_page
            animation: MOVE_LEFT
            time: 180ms
      on_swipe_up:
        - lvgl.page.show:
            id: geometry_vertical_page
            animation: MOVE_TOP
            time: 180ms
      widgets:
        - obj:
            x: 0
            y: 0
            width: 1280
            height: 800
            bg_color: 0x101216
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              - label:
                  x: 36
                  y: 28
                  text: "P4 landscape via LVGL rotation"
                  text_color: 0xFFFFFF
                  text_font: font_title
              - label:
                  x: 38
                  y: 92
                  text: "Panel timing: 800 x 1280, LVGL rotation: 90"
                  text_color: 0xAAB2C0
                  text_font: font_body
              - label:
                  id: touch_live_label
                  x: 38
                  y: 138
                  text: "touch x=- y=- raw=-,-"
                  text_color: 0x58D6FF
                  text_font: font_body
              - obj:
                  x: 0
                  y: 0
                  width: 1280
                  height: 800
                  bg_opa: TRANSP
                  border_color: 0x30F084
                  border_width: 8
                  radius: 0
                  pad_all: 0
                  widgets:
                    - label:
                        x: 28
                        y: 220
                        text: "top-left"
                        text_color: 0x30F084
                        text_font: font_body
                    - label:
                        x: 24
                        y: 286
                        text: "0,0"
                        text_color: 0xF5C542
                        text_font: font_marker
                    - label:
                        align: TOP_RIGHT
                        x: -24
                        y: 220
                        text: "top-right"
                        text_color: 0x58D6FF
                        text_font: font_body
                    - label:
                        align: TOP_RIGHT
                        x: -24
                        y: 286
                        text: "1279,0"
                        text_color: 0xF5C542
                        text_font: font_marker
                    - label:
                        x: 24
                        y: 596
                        text: "bottom-left"
                        text_color: 0x58D6FF
                        text_font: font_body
                    - label:
                        x: 24
                        y: 652
                        text: "0,799"
                        text_color: 0xF5C542
                        text_font: font_marker
                    - label:
                        align: BOTTOM_RIGHT
                        x: -24
                        y: -88
                        text: "bottom-right"
                        text_color: 0x30F084
                        text_font: font_body
                    - label:
                        align: BOTTOM_RIGHT
                        x: -24
                        y: -28
                        text: "1279,799"
                        text_color: 0xF5C542
                        text_font: font_marker
                    - label:
                        align: CENTER
                        text: "center 640,400"
                        text_color: 0xF5C542
                        text_font: font_marker
              - label:
                  x: 38
                  y: 688
                  text: "Swipe left for horizontal test, swipe up for vertical test"
                  text_color: 0xFFFFFF
                  text_font: font_body

    - id: geometry_horizontal_page
      bg_color: 0x151A24
      on_swipe_right:
        - lvgl.page.show:
            id: geometry_home_page
            animation: MOVE_RIGHT
            time: 180ms
      widgets:
        - label:
            align: CENTER
            y: -34
            text: "Horizontal swipe page"
            text_color: 0xFFFFFF
            text_font: font_title
        - label:
            align: CENTER
            y: 40
            text: "Swipe right to return"
            text_color: 0xAAB2C0
            text_font: font_body

    - id: geometry_vertical_page
      bg_color: 0x111F1A
      on_swipe_down:
        - lvgl.page.show:
            id: geometry_home_page
            animation: MOVE_BOTTOM
            time: 180ms
      widgets:
        - label:
            align: CENTER
            y: -34
            text: "Vertical swipe page"
            text_color: 0xFFFFFF
            text_font: font_title
        - label:
            align: CENTER
            y: 40
            text: "Swipe down to return"
            text_color: 0xAAB2C0
            text_font: font_body
