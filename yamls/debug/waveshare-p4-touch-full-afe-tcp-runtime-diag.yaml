# Full Waveshare P4 AFE TCP target plus runtime diagnostics.
#
# Use this only when investigating loopTask stalls/WDTs on the real P4 target.
# It keeps the production YAML intact and overlays the debug package that can
# dump task snapshots/backtraces before the ESP task watchdog resets the board.

substitutions:
  ext_components_source: "../../esphome/components"
  assets_base: "../../"

packages:
  full_target: !include ../full-experience/single-bus/waveshare-p4-touch-full-afe-tcp-landscape.yaml
  runtime_diag: !include ../../packages/debug/runtime_diag.yaml

external_components:
  - source: ${ext_components_source}
    components:
      - runtime_diag
