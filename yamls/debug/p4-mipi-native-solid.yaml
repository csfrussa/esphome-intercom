# =============================================================================
# Waveshare ESP32-P4 native MIPI solid-fill proof
# =============================================================================
#
# Local debug target, ignored by git.
#
# Purpose:
#   - bypass LVGL completely;
#   - fill the native 800x1280 MIPI framebuffer with obvious color bands;
#   - prove whether the gray rectangle comes from MIPI/framebuffer or LVGL rotation.
# =============================================================================

substitutions:
  name: waveshare-p4-mipi-solid
  friendly_name: Waveshare P4 MIPI Solid

packages:
  p4_base: !include ../../packages/platform/esp32p4_base.yaml
  p4_c6_sdio: !include ../../packages/board/esp32p4_c6_sdio.yaml

external_components:
  - source: ../../esphome/components
    components: [mipi_dsi]

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    - priority: -100
      then:
        - light.turn_on:
            id: display_backlight
            brightness: 100%
        - component.update: main_display

psram:
  mode: hex
  speed: 200MHz

esp_ldo:
  - channel: 3
    voltage: 2.5V

logger:
  level: DEBUG
  logs:
    display: INFO
    mipi_dsi: INFO

api:

ota:
  - platform: esphome

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 10min

output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO26
    inverted: false
    frequency: 1000Hz

light:
  - platform: monochromatic
    id: display_backlight
    name: Display Backlight
    output: backlight_pwm
    restore_mode: ALWAYS_ON
    default_transition_length: 150ms

font:
  - file:
      type: gfonts
      family: Noto Sans
      weight: 700
    id: font_title
    size: 42
    glyphs: " !%()+,-./0123456789:ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"

display:
  - platform: mipi_dsi
    id: main_display
    model: WAVESHARE-10.1-DSI-TOUCH-A
    reset_pin: 27
    lane_bit_rate: 1500Mbps
    pclk_frequency: 80MHz
    color_depth: 16bit
    pixel_mode: 16bit
    vsync_back_porch: 12
    dimensions:
      width: 800
      height: 1280
    update_interval: 5s
    auto_clear_enabled: false
    lambda: |-
      it.fill(Color(0, 0, 0));
      it.filled_rectangle(0, 0, 800, 320, Color(220, 20, 30));
      it.filled_rectangle(0, 320, 800, 320, Color(20, 180, 80));
      it.filled_rectangle(0, 640, 800, 320, Color(40, 90, 240));
      it.filled_rectangle(0, 960, 800, 320, Color(245, 196, 66));
      it.rectangle(0, 0, 800, 1280, Color(255, 255, 255));
      it.print(24, 24, id(font_title), Color(255, 255, 255), "Native MIPI 800x1280");
