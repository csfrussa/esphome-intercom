# =============================================================================
# GENERIC ESP32-S3 INTERCOM TCP - native ESPHome dual I2S buses
# =============================================================================
# Experimental regression profile for intercom_api standalone mode.
#
# Purpose:
#   - No esp_audio_stack.
#   - No esp_aec / esp_afe software processing.
#   - intercom_api talks directly to standard ESPHome microphone/speaker.
#   - Useful for hardware that already outputs processed audio, e.g. XMOS AEC
#     boards, and for testing mic-only / speaker-only / full-duplex code paths.
#
# Default test mode: full duplex.
#   - To test mic-only: comment the speaker: block and the intercom_api.speaker
#     line.
#   - To test speaker-only: comment the microphone: block and the
#     intercom_api.microphone_source block.
#
# Hardware base copied from the generic dual-bus full AEC profile:
#   - Generic ESP32-S3 with PSRAM.
#   - INMP441 microphone on one I2S controller.
#   - MAX98357A amplifier on a second I2S controller.
#
# Tested wiring target: Freenove ESP32-S3-WROOM CAM / FNK0085, camera removed.
# Change pins for your board.
#
# INMP441:
#   SCK/BCLK -> GPIO9
#   WS/LRCLK -> GPIO10
#   SD/DOUT  -> GPIO11
#   L/R      -> 3V3, tied locally with VDD so the mic outputs right channel
#   VDD      -> 3V3
#   GND      -> GND
#
# MAX98357A:
#   BCLK     -> GPIO12
#   LRC/WS   -> GPIO13
#   DIN      -> GPIO14
#   SD/EN    -> GPIO18 (optional; tie high instead if your module prefers)
#   VIN      -> 5V or 3V3 according to your MAX98357A module
#   GND      -> GND
# =============================================================================

substitutions:
  name: generic-s3-native-intercom-tcp
  friendly_name: Generic S3 Native Dual Intercom TCP

  ext_components_source: "../../../esphome/components"
  intercom_tcp_port: "6054"

  speaker_enable_pin: GPIO18
  status_led_pin: GPIO48
  status_led_chipset: WS2812
  status_led_rgb_order: GRB

packages:
  intercom_transport: !include ../../../packages/intercom/transport_tcp.yaml
  phonebook_subscribe: !include ../../../packages/intercom/phonebook_subscribe.yaml
  ha_api: !include ../../../packages/intercom/ha_api.yaml
  s3_base: !include ../../../packages/platform/esp32s3_base.yaml
  native_diagnostics: !include ../../../packages/diagnostics/native.yaml

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: freenove_esp32_s3_wroom
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    advanced:
      compiler_optimization: PERF
    sdkconfig_options:
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: "y"
      CONFIG_ESP_CONSOLE_SECONDARY_NONE: "y"

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

api:
  on_client_connected:
    - lambda: |-
        static bool published = false;
        if (!published) {
          published = true;
          id(intercom).publish_entity_states();
        }

ota:
  - platform: esphome

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: INFO
  logs:
    sensor: WARN
    text_sensor: WARN
    binary_sensor: WARN
    switch: WARN
    number: WARN
    button: WARN
    api: WARN
    api.connection: WARN
    component: WARN
    i2s_audio: INFO
    microphone: INFO
    speaker: INFO
    intercom_api: INFO
    audio_processor: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

external_components:
  - source: ${ext_components_source}
    components: [intercom_api, audio_processor]

output:
  - platform: gpio
    id: speaker_enable
    pin: ${speaker_enable_pin}

switch:
  - platform: output
    id: speaker_power
    name: Speaker Power
    output: speaker_enable
    restore_mode: RESTORE_DEFAULT_ON

i2s_audio:
  - id: rx_i2s
    i2s_bclk_pin: GPIO9
    i2s_lrclk_pin: GPIO10

  - id: tx_i2s
    i2s_bclk_pin: GPIO12
    i2s_lrclk_pin: GPIO13

# Native ESPHome microphone. INMP441 is strapped to the right slot; ESPHome
# exposes that as one mono channel.
microphone:
  - platform: i2s_audio
    id: native_mic_raw
    adc_type: external
    i2s_audio_id: rx_i2s
    i2s_din_pin: GPIO11
    channel: right
    sample_rate: 16000
    bits_per_sample: 32bit
    correct_dc_offset: true

# Native ESPHome speaker. Keep it at intercom's wire format to avoid a
# resampler in this regression profile.
speaker:
  - platform: i2s_audio
    id: intercom_speaker
    dac_type: external
    i2s_audio_id: tx_i2s
    i2s_dout_pin: GPIO14
    channel: mono
    sample_rate: 16000
    bits_per_sample: 16bit
    buffer_duration: 100ms
    timeout: 500ms

intercom_api:
  id: intercom
  task_stacks_in_psram: true
  buffers_in_psram: true
  microphone_source:
    microphone: native_mic_raw
    bits_per_sample: 16
    channels: [0]
    gain_factor: 1
  speaker: intercom_speaker
  dc_offset_removal: false
  ringing_timeout: 30s
  delete_contact_missing_from:
    updates_number: 5
