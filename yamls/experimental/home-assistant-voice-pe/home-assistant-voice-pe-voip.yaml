# =============================================================================
# Home Assistant Voice PE + voip_stack experiment.
#
# This YAML keeps the official Voice PE audio stack intact and only adds the
# native VoIP layer. The Voice PE is not a Generic S3: its microphones are
# processed by the onboard XMOS voice front-end before ESPHome receives them.
#
# Expected audio graph:
#   XMOS processed mic -> i2s_mics channel 0 -> voip_stack TX
#   voip_stack RX -> VoIP resampler -> Voice PE mixer -> AIC3204 speaker
#
# This is an experimental bring-up target, not a validated release preset.
# =============================================================================

# =============================================================================
# PROJECT SETUP
# =============================================================================

substitutions:
  name: ha-voice-pe-voip
  friendly_name: Home Assistant Voice PE VoIP
  ext_components_source: "github://n-IA-hane/esphome-intercom@main"
  voip_stack_components_source: "github://n-IA-hane/esphome-voip-stack@main"
  audio_stack_components_source: "github://n-IA-hane/esphome-audio-stack@main"

# Start from the official Voice PE YAML, then add only VoIP transport,
# phonebook sync and HA call-control actions.

packages:
  voice_pe_base: github://esphome/home-assistant-voice-pe/home-assistant-voice.yaml@main
  voip_transport: github://n-IA-hane/esphome-intercom/packages/voip/transport.yaml@main
  phonebook_subscribe: github://n-IA-hane/esphome-intercom/packages/voip/phonebook_subscribe.yaml@main
  voip_settings: github://n-IA-hane/esphome-intercom/packages/voip/call_settings.yaml@main
  voip_ha_api: github://n-IA-hane/esphome-intercom/packages/voip/ha_api.yaml@main

# =============================================================================
# BOARD AND MEMORY
# =============================================================================

# Device identity. The MAC suffix keeps this experimental profile from
# colliding with a normal Voice PE already adopted in HA.

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true

# =============================================================================
# EXTERNAL COMPONENTS
# =============================================================================

# Only project components that are missing from the official Voice PE base.

external_components:
  - source: ${voip_stack_components_source}
    components: [voip_stack]

# =============================================================================
# CONNECTIVITY
# =============================================================================

# Standard Wi-Fi credentials; the base package owns the rest of the Voice PE
# platform configuration.

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# =============================================================================
# AUDIO PIPELINE
# =============================================================================

# Extend the official Voice PE mixer with a dedicated VoIP input.

speaker:
  # The official Voice PE mixer already combines media and announcements.
  # Add one more input for VoIP audio instead of replacing the hardware
  # speaker, DAC, sendspin, jack compensation or media player.
  - id: !extend mixing_speaker
    source_speakers:
      - id: voip_mixing_input
        timeout: never
        buffer_duration: 100ms
        sample_rate: 48000
        bits_per_sample: 32
        num_channels: 2

  - platform: resampler
    id: voip_resampling_speaker
    output_speaker: voip_mixing_input
    sample_rate: 48000
    bits_per_sample: 16
    num_channels: 1

# =============================================================================
# MEDIA, ASSIST AND VOIP
# =============================================================================

# Local SIP phone using the Voice PE processed XMOS microphone and the extra
# mixer input above for RTP receive audio.

voip_stack:
  id: phone
  audio:
    rx:
      sample_rate: 48000
      pcm_format: s16le
      channels: 1
      frame_ms: 10
  microphone_source:
    microphone: i2s_mics
    channels: 0
  speaker: voip_resampling_speaker
  task_stacks_in_psram: true
  network_socket_headroom: 4
  ringing_timeout: 30s
  calling_timeout: 30s

  on_in_call:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 20
        duration: 0.0s

  on_idle:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s

  on_hangup:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s

  on_call_failed:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s

# =============================================================================
# RUNTIME LOGIC AND ENTITIES
# =============================================================================

# Optional HA buttons for manual call control from the ESPHome integration.

button:
  - platform: voip_stack
    voip_stack_id: phone
    call:
      name: Call
      id: call_button
      icon: mdi:phone
    next_contact:
      name: Next Contact
      id: next_contact_button
      icon: mdi:skip-next
    previous_contact:
      name: Previous Contact
      id: prev_contact_button
      icon: mdi:skip-previous
    decline:
      name: Decline
      id: decline_button
      icon: mdi:phone-hangup
