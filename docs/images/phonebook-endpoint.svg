<text class="small" x="542" y="309">sensor.intercom_phonebook</text>
<text class="small" x="542" y="331">canonical endpoint rows</text>
<text class="small" x="542" y="353">enabled, kind, number</text>
<text class="small" x="542" y="375">sip_uri / transport</text>
<text class="small" x="542" y="397">tx_formats / rx_formats</text>
<rect class="box box-esp" x="1040" y="110" width="300" height="120"/>
<text class="label" x="1062" y="146">Direct SIP</text>
<text class="small" x="1062" y="174">complete URI/IP/transport</text>
<text class="small" x="1062" y="196">compatible media</text>
<text class="small" x="1062" y="218">ESP calls endpoint</text>
