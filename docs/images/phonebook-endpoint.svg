<rect class="box box-ext" x="1040" y="460" width="300" height="120"/>
<text class="label" x="1062" y="496">Trunk route</text>
<text class="small" x="1062" y="524">external number</text>
<text class="small" x="1062" y="546">provider registered</text>
<text class="small" x="1062" y="568">propagate SIP result</text>
<rect class="box box-warn" x="1040" y="610" width="300" height="120"/>
<text class="label" x="1062" y="646">Reject clearly</text>
<text class="small" x="1062" y="674">disabled / not found</text>
<text class="small" x="1062" y="696">media incompatible</text>
<text class="small" x="1062" y="718">trunk unavailable</text>
