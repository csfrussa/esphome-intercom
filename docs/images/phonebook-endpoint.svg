<text class="label" x="82" y="561">Local SIP accounts</text>
<text class="small" x="82" y="589">softphone REGISTER</text>
<text class="small" x="82" y="611">Contact from registrar</text>
<text class="small" x="82" y="633">kind: softphone</text>
<rect class="box box-ha" x="520" y="245" width="360" height="240"/>
