<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#536173"/></marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#316bd6"/></marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#3a9b5f"/></marker>
  <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#d78b1f"/></marker>
  <style>
  .bg { fill: #f7f8fb; }
  .title { font: 700 34px sans-serif; fill: #172033; }
  .subtitle { font: 400 17px sans-serif; fill: #516070; }
  .box { fill: white; stroke: #c8d0dd; stroke-width: 2; rx: 18; }
  .box-esp { fill: #eef8f2; stroke: #3a9b5f; }
  .box-ha { fill: #eef4ff; stroke: #316bd6; }
  .box-ext { fill: #fff6e8; stroke: #d78b1f; }
  .box-soft { fill: #f6efff; stroke: #8157d9; }
  .box-warn { fill: #fff0f0; stroke: #d94f4f; }
  .label { font: 700 20px sans-serif; fill: #172033; }
  .small { font: 400 14px sans-serif; fill: #415064; }
  .tiny { font: 400 12px sans-serif; fill: #526173; }
  .pill { fill: #172033; opacity: .08; rx: 10; }
  .line { stroke: #536173; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .line2 { stroke: #316bd6; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
  .line-green { stroke: #3a9b5f; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
  .line-orange { stroke: #d78b1f; stroke-width: 4; fill: none; marker-end: url(#arrow-orange); }
  .dash { stroke-dasharray: 10 8; }
  .legend { font: 600 13px sans-serif; fill: #172033; }
</style>
</defs>
<rect class="bg" x="0" y="0" width="1400" height="760"/>
<text class="title" x="54" y="62">SIP transport choice</text>
<text class="subtitle" x="56" y="92">TCP and UDP are signaling choices; RTP media is always UDP</text>
<rect class="box box-ha" x="80" y="155" width="350" height="210"/>
<text class="label" x="102" y="191">SIP/TCP signaling</text>
<text class="small" x="102" y="219">recommended default</text>
<text class="small" x="102" y="241">stable through containers/VLANs</text>
<text class="small" x="102" y="263">connection state is visible</text>
<text class="small" x="102" y="285">good for routed networks</text>
<rect class="box box-ext" x="80" y="465" width="350" height="145"/>
<text class="label" x="102" y="501">RTP media</text>
<text class="small" x="102" y="529">always UDP</text>
<text class="small" x="102" y="551">one PCM frame per packet</text>
<text class="small" x="102" y="573">ptime/payload limit matters</text>
<rect class="box box" x="525" y="270" width="350" height="210"/>
<text class="label" x="547" y="306">Same phone semantics</text>
<text class="small" x="547" y="334">INVITE, ACK, CANCEL, BYE</text>
<text class="small" x="547" y="356">SDP offer/answer</text>
<text class="small" x="547" y="378">same SipPhoneState</text>
<text class="small" x="547" y="400">same call reasons</text>
<rect class="box box-esp" x="970" y="155" width="350" height="210"/>
<text class="label" x="992" y="191">SIP/UDP signaling</text>
<text class="small" x="992" y="219">simple LANs</text>
<text class="small" x="992" y="241">lower overhead</text>
<text class="small" x="992" y="263">requires clean routing/firewall</text>
<text class="small" x="992" y="285">retransmits are SIP-level</text>
<rect class="box box-ha" x="970" y="465" width="350" height="145"/>
<text class="label" x="992" y="501">HA can bridge</text>
<text class="small" x="992" y="529">SIP/TCP ↔ SIP/UDP</text>
<text class="small" x="992" y="551">format conversion</text>
<text class="small" x="992" y="573">RTP relay/resampler</text>
<path class="line2" d="M430 260 C480 280 495 330 525 350"/>
<path class="line-green" d="M970 260 C920 280 900 330 875 350"/>
<path class="line-orange" d="M430 532 C560 585 850 585 970 532"/>
<path class="line2 dash" d="M875 430 C930 470 940 500 970 520"/>
<rect class="pill" x="575" y="525" width="130" height="24"/><text class="tiny" x="587" y="542">protocol: tcp</text>
<rect class="pill" x="725" y="525" width="130" height="24"/><text class="tiny" x="737" y="542">protocol: udp</text>
<rect class="pill" x="630" y="563" width="140" height="24"/><text class="tiny" x="642" y="580">RTP stays UDP</text>
</svg>
