<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760"><defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#536173"/></marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#316bd6"/></marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#3a9b5f"/></marker>
  <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#d78b1f"/></marker>
  <style>
  .bg { fill: #f7f8fb; }
  .title { font: 700 34px sans-serif; fill: #172033; }
  .subtitle { font: 400 17px sans-serif; fill: #516070; }
  .box { fill: white; stroke: #c8d0dd; stroke-width: 2; rx: 18; }
  .box-esp { fill: #eef8f2; stroke: #3a9b5f; }
  .box-ha { fill: #eef4ff; stroke: #316bd6; }
  .box-ext { fill: #fff6e8; stroke: #d78b1f; }
  .box-soft { fill: #f6efff; stroke: #8157d9; }
  .box-warn { fill: #fff0f0; stroke: #d94f4f; }
  .label { font: 700 20px sans-serif; fill: #172033; }
  .small { font: 400 14px sans-serif; fill: #415064; }
  .tiny { font: 400 12px sans-serif; fill: #526173; }
  .pill { fill: #172033; opacity: .08; rx: 10; }
  .line { stroke: #536173; stroke-width: 3; fill: none; marker-end: url(#arrow); }
  .line2 { stroke: #316bd6; stroke-width: 4; fill: none; marker-end: url(#arrow-blue); }
  .line-green { stroke: #3a9b5f; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
  .line-orange { stroke: #d78b1f; stroke-width: 4; fill: none; marker-end: url(#arrow-orange); }
  .dash { stroke-dasharray: 10 8; }
  .legend { font: 600 13px sans-serif; fill: #172033; }
</style></defs><rect class="bg" x="0" y="0" width="1400" height="760"/>
<text class="title" x="54" y="62">SIP/VoIP topology</text><text class="subtitle" x="56" y="92">ESP phones, Home Assistant softphone/router, local SIP endpoints and optional trunk</text>
<rect class="box box-esp" x="70" y="145" width="260" height="150"/>
<text class="label" x="92" y="181">ESP phone A</text>
<text class="small" x="92" y="209">SIP UA, no REGISTER</text>
<text class="small" x="92" y="231">L16/L24 PCM RTP</text>
<text class="small" x="92" y="253">phonebook dial</text>
<rect class="box box-esp" x="70" y="455" width="260" height="150"/>
<text class="label" x="92" y="491">ESP phone B</text>
<text class="small" x="92" y="519">direct SIP when complete</text>
<text class="small" x="92" y="541">or route via HA</text>
<text class="small" x="92" y="563">same SipPhoneState</text>
<rect class="box box-ha" x="500" y="220" width="400" height="285"/>
<text class="label" x="522" y="256">Home Assistant / VoIP Stack</text>
<text class="small" x="522" y="284">HA softphone endpoint</text>
<text class="small" x="522" y="306">SIP router/B2BUA</text>
<text class="small" x="522" y="328">RTP relay/resampler</text>
<text class="small" x="522" y="350">central phonebook / dial plan</text>
<text class="small" x="522" y="372">local SIP account registrar</text>
<text class="small" x="522" y="394">optional provider trunk client</text>
<rect class="box box-soft" x="1050" y="140" width="280" height="150"/>
<text class="label" x="1072" y="176">Registered softphone</text>
<text class="small" x="1072" y="204">Zoiper / Linphone / baresip</text>
<text class="small" x="1072" y="226">REGISTER to HA only</text>
<text class="small" x="1072" y="248">appears in phonebook</text>
<rect class="box box-ext" x="1050" y="470" width="280" height="150"/>
<text class="label" x="1072" y="506">Provider / PBX trunk</text>
<text class="small" x="1072" y="534">optional REGISTER from HA</text>
<text class="small" x="1072" y="556">external inbound/outbound</text>
<text class="small" x="1072" y="578">DTMF route hints</text>
<path class="line-green dash" d="M330 220 C390 185 435 185 500 270"/>
<path class="line-green dash" d="M330 530 C390 565 435 565 500 455"/>
<path class="line2" d="M330 285 C415 315 445 345 500 360"/>
<path class="line2" d="M330 495 C420 465 445 425 500 405"/>
<path class="line" d="M900 315 C965 250 995 215 1050 215"/>
<path class="line-orange" d="M900 425 C965 500 995 535 1050 545"/>
<rect class="pill" x="510" y="610" width="130" height="24"/><text class="tiny" x="522" y="627">direct SIP/RTP</text>
<rect class="pill" x="660" y="610" width="150" height="24"/><text class="tiny" x="672" y="627">HA bridge/B2BUA</text>
<rect class="pill" x="835" y="610" width="150" height="24"/><text class="tiny" x="847" y="627">trunk / softphone</text>
<rect class="pill" x="575" y="548" width="150" height="24"/><text class="tiny" x="587" y="565">INVITE / ACK / BYE</text>
<rect class="pill" x="742" y="548" width="150" height="24"/><text class="tiny" x="754" y="565">SDP offer/answer</text>
<rect class="pill" x="638" y="585" width="170" height="24"/><text class="tiny" x="650" y="602">RTP relay/resampler</text>
</svg>
