# Optional FreeRTOS priority boost for Micro Wake Word.
#
# Include this only when the device runs a busy full runtime graph and MWW must
# keep scheduling precedence over low-priority UI/media work.

substitutions:
  mww_task_priority: "8"

script:
  - id: !extend boost_mww_priority
    then:
      - wait_until:
          condition:
            lambda: 'return xTaskGetHandle("mww") != nullptr;'
          timeout: 2s
      - lambda: |-
          TaskHandle_t mww_task = xTaskGetHandle("mww");
          if (mww_task) {
            vTaskPrioritySet(mww_task, ${mww_task_priority});
          }
