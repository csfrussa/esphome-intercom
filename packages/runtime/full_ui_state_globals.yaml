# Runtime UI state ids and shared globals for full voice + VoIP devices.
#
# Include this when a device uses runtime_controller to arbitrate Voice Assistant,
# media, mute state, OTA state and VoIP UI/status rendering.

substitutions:
  ui_state_idle: "0"
  ui_state_init: "1"
  ui_state_no_wifi: "2"
  ui_state_no_ha: "3"
  ui_state_both_muted: "4"
  ui_state_mic_muted: "5"
  ui_state_spk_muted: "6"
  ui_state_mww_recent: "7"
  ui_state_va_listening: "8"
  ui_state_va_thinking: "9"
  ui_state_va_replying: "10"
  ui_state_call_ringing: "11"
  ui_state_ic_calling: "12"
  ui_state_call_in_call: "13"
  ui_state_va_error: "14"
  ui_state_media: "15"
  ui_state_no_va: "16"

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: g_wake_word_enabled
    type: bool
    restore_value: true
    initial_value: "true"
  - id: g_va_state
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_va_epoch
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_tts_owner_epoch
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_ducking_active
    type: int
    restore_value: false
    initial_value: "0"
  - id: runtime_activity_mask
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: runtime_sequence
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: runtime_rendered_page
    type: std::string
    restore_value: false
    initial_value: '"unrendered"'
  # Display adapter telemetry: 0=none/idle, 1=neutral, 2=happy,
  # 3=angry, 4=Sendspin artwork. Non-display devices remain at 0.
  - id: runtime_visual_source
    type: int
    restore_value: false
    initial_value: "0"
  - id: runtime_response_text_ready
    type: bool
    restore_value: false
    initial_value: "false"
  - id: g_applied_led
    type: int
    restore_value: false
    initial_value: "-1"
  - id: ui_state
    type: int
    restore_value: false
    initial_value: "-1"
  - id: g_ota_in_progress
    type: bool
    restore_value: false
    initial_value: "false"
  - id: g_ha_api_clients
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_last_wake_word
    type: std::string
    restore_value: false
    initial_value: "\"\""
  - id: g_voip_ringtone_media_suppressed
    type: bool
    restore_value: false
    initial_value: "false"
  - id: g_voip_ringtone_active
    type: bool
    restore_value: false
    initial_value: "false"
  - id: g_voip_ringtone_restore_media
    type: bool
    restore_value: false
    initial_value: "false"
