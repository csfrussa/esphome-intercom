# =============================================================================
# Intercom SIP/RTP transport over TCP signaling
# =============================================================================
#
# Configures intercom_api for SIP/2.0 over TCP signaling. Media remains RTP/UDP.
# =============================================================================

substitutions:
  intercom_sip_port: "5060"
  intercom_rtp_port: "40000"

intercom_api:
  id: intercom
  protocol: tcp
  sip_port: ${intercom_sip_port}
  rtp_port: ${intercom_rtp_port}
