# =============================================================================
# Intercom SIP/RTP transport over UDP signaling
# =============================================================================
#
# Configures intercom_api for standards-compatible SIP/SDP/RTP. Signaling uses
# SIP/2.0 over UDP and media uses RTP v2 with PCM-only SDP negotiation.
# =============================================================================

substitutions:
  intercom_sip_port: "5060"
  intercom_rtp_port: "40000"

intercom_api:
  id: intercom
  protocol: udp
  sip_port: ${intercom_sip_port}
  rtp_port: ${intercom_rtp_port}
