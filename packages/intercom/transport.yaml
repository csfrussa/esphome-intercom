# =============================================================================
# Intercom phone SIP/RTP transport
# =============================================================================
#
# Configures intercom_api as a standard SIP phone. `protocol` selects only the
# SIP signaling transport: UDP is the default LAN mode; TCP is useful when the
# network/proxy handles stream signaling better. RTP media remains UDP in both
# modes and negotiates PCM through SDP.
# =============================================================================

substitutions:
  intercom_sip_protocol: udp
  intercom_sip_port: "5060"
  intercom_rtp_port: "40000"

intercom_api:
  id: intercom
  # SIP signaling transport: `udp` by default; set `intercom_sip_protocol: tcp`
  # in the device YAML when this phone must use SIP over TCP.
  protocol: ${intercom_sip_protocol}
  sip_port: ${intercom_sip_port}
  rtp_port: ${intercom_rtp_port}
