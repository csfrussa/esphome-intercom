# =============================================================================
# Intercom HA-callable actions.
# Drop-in for devices that integrate with the Home Assistant `intercom_native`
# integration. Exposes only the call-control actions.
#
# Phonebook sync is no longer pushed via API actions: the ESP subscribes to the
# protocol-aware `sensor.intercom_phonebook` and runs its own update cycles on
# `intercom_api.update_contacts`. add_contact / remove_contact / set_contacts /
# flush_contacts remain available as direct C++ actions for YAML scripting but
# are no longer wrapped as HA-callable ESPHome services.
#
# Prerequisites in the device YAML:
#   - id `intercom` : intercom_api component (intercom/callbacks.yaml provides this)
# =============================================================================

wifi:
  on_connect:
    - runtime_fsm.set_activity:
        id: runtime_controller
        activity: no_wifi
        active: false
    - delay: 1s
    - intercom_api.publish_entity_states: intercom
  on_disconnect:
    - runtime_fsm.set_activity:
        id: runtime_controller
        activity: no_wifi
        active: true

api:
  on_client_connected:
    - if:
        condition:
          lambda: |-
            return !client_info.empty() &&
                   client_info.rfind("ESPHome Logs", 0) != 0 &&
                   client_info.rfind("ESPHome Dashboard", 0) != 0 &&
                   client_info.rfind("ESPHome Web", 0) != 0;
        then:
          - lambda: |-
              id(g_ha_api_clients)++;
          - runtime_fsm.set_activity:
              id: runtime_controller
              activity: no_ha
              active: false
    - delay: 1s
    - intercom_api.publish_entity_states: intercom
  on_client_disconnected:
    - if:
        condition:
          lambda: |-
            return !client_info.empty() &&
                   client_info.rfind("ESPHome Logs", 0) != 0 &&
                   client_info.rfind("ESPHome Dashboard", 0) != 0 &&
                   client_info.rfind("ESPHome Web", 0) != 0;
        then:
          - lambda: |-
              if (id(g_ha_api_clients) > 0) id(g_ha_api_clients)--;
          - if:
              condition:
                lambda: 'return id(g_ha_api_clients) <= 0;'
              then:
                - runtime_fsm.set_activity:
                    id: runtime_controller
                    activity: no_ha
                    active: true
  actions:
    # Diagnostic/runtime reducer helpers. These are profile-level API actions,
    # not runtime_fsm component semantics: any event name is defined by YAML.
    - action: runtime_event
      variables:
        event: string
      then:
        - runtime_fsm.event:
            id: runtime_controller
            event: !lambda 'return event;'
    - action: runtime_dump
      variables:
        reason: string
      then:
        - runtime_fsm.dump:
            id: runtime_controller
            reason: !lambda 'return reason;'
    # Card -> intercom_native.call(source=this) ends up here. Sets the
    # current phonebook entry to `dest` and enters OUTGOING locally.
    - action: start_call
      variables:
        dest: string
      then:
        - intercom_api.call_contact:
            contact: !lambda 'return dest;'
    # Direct ESP-side decline with an optional free-form reason. This keeps
    # HA automations useful even for ESP<->ESP calls where HA is only
    # mirroring state and is not the signaling bridge.
    - action: decline_call
      variables:
        reason: string
      then:
        - intercom_api.decline_call:
            reason: !lambda 'return reason;'
    # Set by intercom_native at config-entry setup so ha_pbx routing finds
    # the live HA name (hass.config.location_name) in the phonebook instead
    # of a hardcoded "Home Assistant".
    - action: set_ha_peer_name
      variables:
        name: string
      then:
        - intercom_api.set_ha_peer_name:
            name: !lambda 'return name;'
