# =============================================================================
# Runtime FSM bridge for full-experience VA + Intercom devices.
#
# State ownership lives in esphome/components/runtime_fsm. This package keeps
# only renderer-compatible globals and UI hook placeholders.
# =============================================================================

substitutions:
  ui_state_idle: "0"
  ui_state_init: "1"
  ui_state_no_wifi: "2"
  ui_state_no_ha: "3"
  ui_state_both_muted: "4"
  ui_state_mic_muted: "5"
  ui_state_spk_muted: "6"
  ui_state_mww_recent: "7"
  ui_state_va_listening: "8"
  ui_state_va_thinking: "9"
  ui_state_va_replying: "10"
  ui_state_ic_ringing: "11"
  ui_state_ic_calling: "12"
  ui_state_ic_in_call: "13"
  ui_state_va_error: "14"
  ui_state_media: "15"
  ui_state_no_va: "16"

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: g_wake_word_enabled
    type: bool
    restore_value: true
    initial_value: "true"
  - id: g_va_state
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_activity_mask
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_fsm_seq
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_va_epoch
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_tts_owner_epoch
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_ducking_active
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_applied_led
    type: int
    restore_value: false
    initial_value: "-1"
  - id: ui_state
    type: int
    restore_value: false
    initial_value: "-1"
  - id: g_ota_in_progress
    type: bool
    restore_value: false
    initial_value: "false"
  - id: g_ha_api_clients
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_last_wake_word
    type: std::string
    restore_value: false
    initial_value: "\"\""
  - id: g_intercom_ringtone_media_suppressed
    type: bool
    restore_value: false
    initial_value: "false"

esphome:
  on_boot:
    priority: 700
    then:
      - runtime_fsm.event:
          id: runtime_controller
          event: boot_start
      - delay: 1s
      - runtime_fsm.event:
          id: runtime_controller
          event: boot_ready

script:
  - id: update_led
    mode: restart
    then: []
  - id: render_ui_state
    mode: restart
    then: []
  - id: ui_tts_started
    parameters:
      text: string
    then: []
  - id: ui_stt_ended
    parameters:
      text: string
    then: []
  - id: ui_va_end
    then: []
  - id: ui_va_barge_start
    then: []
  - id: ui_ic_call
    parameters:
      peer: string
    then: []
  - id: ui_ic_dest_ringing
    parameters:
      peer: string
    then: []
  - id: ui_ic_ended
    parameters:
      peer: string
      reason: string
    then: []
  - id: start_mww_when_ready
    mode: restart
    then:
      - wait_until:
          condition:
            lambda: 'return millis() >= 10000;'
          timeout: 10s
      - delay: 2s
      - if:
          condition:
            and:
              - lambda: 'return !id(init_in_progress);'
              - lambda: 'return !id(g_ota_in_progress);'
              - lambda: 'return id(g_wake_word_enabled);'
              - switch.is_off: mute
              - not:
                  micro_wake_word.is_running:
          then:
            - logger.log:
                tag: mww
                format: "MWW: safe start"
            - micro_wake_word.start:
            - lambda: |-
                TaskHandle_t mww_task = xTaskGetHandle("mww");
                if (mww_task) {
                  vTaskPrioritySet(mww_task, 8);
                }

  - id: intercom_ringing_loop
    mode: restart
    then:
      - globals.set:
          id: g_intercom_ringtone_media_suppressed
          value: "true"
      - while:
          condition:
            intercom_api.is_ringing: intercom
          then:
            - media_player.play_media:
                id: speaker_media_player
                media_url: "audio-file://intercom_ringing_sound"
                announcement: true
            - wait_until:
                condition:
                  media_player.is_announcing:
                    id: speaker_media_player
                timeout: 2s
            - wait_until:
                condition:
                  not:
                    media_player.is_announcing:
                      id: speaker_media_player
                timeout: 5s
  - id: intercom_stop_ringtone
    mode: restart
    then:
      - script.stop: intercom_ringing_loop
      - globals.set:
          id: g_intercom_ringtone_media_suppressed
          value: "true"
      - media_player.stop:
          id: speaker_media_player
          announcement: true
      - wait_until:
          condition:
            not:
              media_player.is_announcing:
                id: speaker_media_player
          timeout: 1500ms
      - globals.set:
          id: g_intercom_ringtone_media_suppressed
          value: "false"
      - runtime_fsm.event:
          id: runtime_controller
          event: media_idle
