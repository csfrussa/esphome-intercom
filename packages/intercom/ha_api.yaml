# =============================================================================
# Intercom HA-callable actions.
# Drop-in for devices that integrate with the Home Assistant `intercom_native`
# integration. Exposes only the call-control actions.
#
# Phonebook sync is pushed as the canonical JSON roster through the native API.
# The ESP consumes that JSON directly; it is not projected through CSV/text
# sensors.
#
# Prerequisites in the device YAML:
#   - id `intercom` : intercom_api component (intercom/callbacks.yaml provides this)
# =============================================================================

wifi:
  on_connect:
    - delay: 1s
    - intercom_api.publish_entity_states: intercom

api:
  on_client_connected:
    - delay: 1s
    - intercom_api.publish_entity_states: intercom
  actions:
    # Card/HA -> intercom_native.sip_call(source=this) ends up here. Sets the
    # current phonebook entry to `dest` and sends a SIP INVITE locally.
    - action: start_call
      variables:
        dest: string
      then:
        - intercom_api.call_contact:
            contact: !lambda 'return dest;'
    # Direct ESP-side decline with an optional free-form reason. This keeps
    # HA automations useful even for ESP<->ESP calls where HA is only
    # mirroring state and is not the signaling bridge.
    - action: decline_call
      variables:
        reason: string
      then:
        - intercom_api.decline_call:
            reason: !lambda 'return reason;'
    # Set by intercom_native at config-entry setup so logical SIP targets can
    # route through the live HA bridge name from hass.config.location_name.
    - action: set_ha_peer_name
      variables:
        name: string
      then:
        - intercom_api.set_ha_peer_name:
            name: !lambda 'return name;'
    # Canonical central roster management. HA publishes the same JSON document
    # that cards/services read from sensor.intercom_phonebook.
    - action: set_roster_json
      variables:
        roster_json: string
      then:
        - intercom_api.set_roster_json:
            roster_json: !lambda 'return roster_json;'
    # Local/manual SIP phonebook actions for YAML scripts and test tools.
    - action: set_contacts
      variables:
        contacts_csv: string
      then:
        - intercom_api.set_contacts:
            contacts_csv: !lambda 'return contacts_csv;'
    - action: add_contact
      variables:
        entry: string
      then:
        - intercom_api.add_contact:
            entry: !lambda 'return entry;'
    - action: remove_contact
      variables:
        entry: string
      then:
        - intercom_api.remove_contact:
            entry: !lambda 'return entry;'
    - action: flush_contacts
      then:
        - intercom_api.flush_contacts: intercom
    - action: update_contacts
      then:
        - intercom_api.update_contacts: intercom
