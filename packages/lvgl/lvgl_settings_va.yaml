# =============================================================================
# Settings page (full-experience): Voice Assistant controls.
# =============================================================================
id: settings_va_page
bg_color: 0x202020
on_swipe_left:
  - script.execute:
      id: settings_navigate
      delta: 1
on_swipe_right:
  - script.execute:
      id: settings_navigate
      delta: -1
on_swipe_down:
  - script.execute: settings_close
widgets:
  - label:
      align: TOP_MID
      y: 88
      width: ${settings_wide_width}
      text: "Wake word"
      text_color: 0xFFFFFF
      text_font: ${settings_label_font}
      text_align: CENTER
  - switch:
      id: ui_wake_word_sw
      align: TOP_MID
      y: 116
      width: ${settings_switch_width}
      height: ${settings_switch_height}
      state:
        checked: !lambda 'return id(wake_word_switch).state;'
      on_value:
        - lambda: |-
            if (x) id(wake_word_switch).turn_on();
            else id(wake_word_switch).turn_off();
