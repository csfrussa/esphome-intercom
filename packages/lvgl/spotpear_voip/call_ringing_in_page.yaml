id: call_ringing_in_page
bg_color: 0xFF0000
widgets:
  - label:
      align: TOP_MID
      y: 8%
      text: "${friendly_name}"
      text_color: 0xFFFFFF
      text_font: font_title
      text_align: CENTER
      width: ${call_title_width}
      long_mode: SCROLL
  - label:
      align: TOP_MID
      y: 17%
      text: "RINGING"
      text_color: 0xFFFF00
      text_font: font_state
      text_align: CENTER
  - label:
      id: call_ringing_in_peer_label
      align: CENTER
      text: ""
      text_color: 0xFFFFFF
      text_font: font_title
      text_align: CENTER
      long_mode: SCROLL
      width: ${call_ringing_in_peer_width}
  # Answer (green left) / Decline (red right)
  - button:
      floating: true
      align: LEFT_MID
      x: ${call_btn_offset}
      width: ${call_btn_size}
      height: ${call_btn_size}
      bg_opa: TRANSP
      shadow_opa: TRANSP
      widgets:
        - label:
            text: "\U000F03F2"
            align: CENTER
            text_color: 0x00FF00
            text_font: call_icons
      on_short_click:
        - voip_stack.call_toggle:
  - button:
      floating: true
      align: RIGHT_MID
      x: -5
      width: ${call_btn_size}
      height: ${call_btn_size}
      bg_opa: TRANSP
      shadow_opa: TRANSP
      widgets:
        - label:
            text: "\U000F03F5"
            align: CENTER
            text_color: 0xFFFFFF
            text_font: call_icons
      on_short_click:
        - voip_stack.decline_call:

