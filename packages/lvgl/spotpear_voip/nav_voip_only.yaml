# Spotpear voip-only navigation.
#
# There is no VA layer in these firmware variants. Both vertical gestures from
# the VoIP idle page keep settings reachable while preserving the shared
# VoIP page package.

script:
  - id: call_to_settings
    then:
      - script.execute: settings_open

  - id: call_to_va
    then:
      - script.execute: settings_open
