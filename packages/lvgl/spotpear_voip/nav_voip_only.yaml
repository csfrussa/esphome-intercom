# Spotpear voip-only navigation.
#
# There is no VA layer in these firmware variants. Both vertical gestures from
# the intercom idle page keep settings reachable while preserving the shared
# intercom page package.

script:
  - id: ic_voip_to_settings
    then:
      - script.execute: ic_settings_open

  - id: ic_voip_to_va
    then:
      - script.execute: ic_settings_open
