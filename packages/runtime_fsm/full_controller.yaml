# =============================================================================
# Runtime reducer for full-experience devices.
#
# Generic state reducer:
#   - inputs are runtime_fsm.event calls from VA/media/intercom/connectivity YAML;
#   - activities are composable state bits;
#   - policies derive outputs such as LED, display, ducking and ringtone/timer
#     actions from a single reducer snapshot.
# =============================================================================

runtime_fsm:
  id: runtime_controller
  debug: true
  state_outputs:
    activity_mask: g_activity_mask
    sequence: g_fsm_seq
  intercom:
    id: intercom
    states:
      ringing:
        priority: 700
        policies:
          led_status: intercom_ringing
          display_status: intercom_ringing
          audio_policy: duck
          ringtone: play
          va_state: idle
      outgoing:
        priority: 690
        policies:
          led_status: intercom_outgoing
          display_status: intercom_outgoing
          audio_policy: duck
          va_state: idle
      streaming:
        priority: 650
        policies:
          led_status: intercom_streaming
          display_status: intercom_streaming
          audio_policy: duck
          va_state: idle
  groups:
    va: [va_start_requested, va_starting, va_listening, va_thinking, va_responding, va_barging, va_stopping]
  actions:
    voice_start:
      - voice_assistant.start:
          wake_word: !lambda 'return id(g_last_wake_word);'
    voice_cancel_response:
      - script.execute: ui_va_barge_start
      - media_player.stop:
          id: speaker_media_player
          announcement: true
      - voice_assistant.stop:
      - wait_until:
          condition:
            not:
              voice_assistant.is_running:
      - voice_assistant.start:
          wake_word: !lambda 'return id(g_last_wake_word);'
    voice_cancel_pipeline:
      - script.execute: ui_va_barge_start
      - voice_assistant.stop:
      - wait_until:
          condition:
            not:
              voice_assistant.is_running:
      - voice_assistant.start:
          wake_word: !lambda 'return id(g_last_wake_word);'
    voice_stop_all:
      - media_player.stop:
          id: speaker_media_player
          announcement: true
      - voice_assistant.stop:
    voice_stop_pipeline:
      - voice_assistant.stop:
    cancel_response_cleanup: []
    stop_announcement:
      - media_player.stop:
          id: speaker_media_player
          announcement: true
  events:
    boot_start:
      activate: [boot, no_wifi, no_ha]
    boot_ready:
      deactivate: boot
    wifi_connected:
      deactivate: no_wifi
    wifi_disconnected:
      activate: no_wifi
    ha_connected:
      deactivate: no_ha
    ha_disconnected:
      activate: no_ha
    va_client_connected:
      deactivate: no_va
    va_client_disconnected:
      activate: no_va
    media_paused:
      deactivate: [media, announcement, announcement_play_seen]
    mic_muted:
      activate: mic_muted
    mic_unmuted:
      deactivate: mic_muted
    speaker_muted:
      activate: speaker_muted
    speaker_unmuted:
      deactivate: speaker_muted
    timer_started:
      activate: timer
    timer_stopped:
      deactivate: [timer, timer_ringing]
    timer_finished:
      activate: timer_ringing
    media_idle:
      deactivate: media
      cases:
        - all: [va_stopping]
          deactivate: [announcement, announcement_play_seen, va_stopping]
        - all: [va_barging]
          deactivate: [announcement, announcement_play_seen]
        - all: [va_responding, announcement, va_run_ended]
          deactivate: [va_responding, announcement, announcement_play_seen, va_run_ended, va_response_drained]
        - all: [va_responding, announcement]
          activate: va_response_drained
          deactivate: [announcement, announcement_play_seen]
        - all: [announcement]
          deactivate: [announcement, announcement_play_seen]
    media_playing:
      activate: media
      cases:
        - all: [va_stopping]
          activate: media
          deactivate: [announcement, announcement_play_seen, va_stopping]
        - all: [va_barging]
          activate: media
          deactivate: [announcement, announcement_play_seen]
        - all: [va_responding, announcement, va_run_ended]
          activate: media
          deactivate: [va_responding, announcement, announcement_play_seen, va_run_ended, va_response_drained]
        - all: [va_responding, announcement]
          activate: [media, va_response_drained]
          deactivate: [announcement, announcement_play_seen]
        - all: [announcement]
          activate: media
          deactivate: [announcement, announcement_play_seen]
    announcement_started:
      activate: announcement
      deactivate: announcement_play_seen
      cases:
        - any: [va_start_requested, va_starting, va_barging, va_listening, va_thinking, va_stopping]
          deactivate: [announcement, announcement_play_seen, va_stopping]
          action: stop_announcement
    wake_word:
      activate: va_start_requested
      cases:
        - any: va_start_requested
        - all: [va_responding, announcement]
          activate: [va_start_requested, va_barging]
          deactivate: [announcement, announcement_play_seen, va_responding]
          action: voice_cancel_response
        - all: [va_responding, va_run_ended]
          activate: va_start_requested
          deactivate: [va_responding, va_run_ended, va_response_drained]
          action: voice_cancel_pipeline
        - any: [va_starting, va_listening, va_thinking, va_responding]
          activate: [va_start_requested, va_barging]
          deactivate: [va_starting, va_listening, va_thinking, va_responding]
          action: voice_cancel_pipeline
        - any: [va_barging, va_stopping]
      action: voice_start
    manual_voice_toggle:
      activate: va_start_requested
      cases:
        - all: [va_responding, announcement]
          activate: va_stopping
          deactivate: [va_start_requested, va_starting, va_barging, va_listening, va_thinking, va_responding, announcement, announcement_play_seen]
          action: voice_stop_all
        - any: va_responding
          activate: va_stopping
          deactivate: [va_start_requested, va_starting, va_barging, va_listening, va_thinking, va_responding]
          action: voice_stop_pipeline
        - any: [va_start_requested, va_starting, va_barging, va_listening, va_thinking]
          deactivate: [va_start_requested, va_starting, va_barging, va_listening, va_thinking, va_responding, announcement, announcement_play_seen]
          action: voice_stop_pipeline
      action: voice_start
    va_start:
      activate: va_starting
      action: cancel_response_cleanup
      cases:
        - any: va_barging
          activate: va_listening
          deactivate: va_barging
          action: cancel_response_cleanup
    va_responding:
      activate: va_responding
      cases:
        - any: [va_barging, va_stopping]
    va_end:
      deactivate: [va_start_requested, va_starting, va_listening, va_thinking]
      cases:
        - any: va_barging
          activate: va_start_requested
          deactivate: [va_barging, va_responding, announcement, announcement_play_seen, va_run_ended, va_response_drained]
        - all: [va_responding, va_response_drained]
          deactivate: [va_responding, va_run_ended, va_response_drained, announcement, announcement_play_seen]
        - any: va_responding
          activate: [va_responding, va_run_ended]
    va_idle:
      deactivate: [va_start_requested, va_starting, va_listening, va_thinking, va_responding, announcement, announcement_play_seen, va_stopping, va_run_ended, va_response_drained]
      cases:
        - any: va_barging
          activate: va_start_requested
          deactivate: va_barging
    va_response_done:
      deactivate: [va_responding, announcement, announcement_play_seen, va_run_ended, va_response_drained]
    va_error:
      deactivate: [va_start_requested, va_starting, va_listening, va_thinking, va_responding, va_barging, va_stopping, va_run_ended, va_response_drained]
  activities:
    idle:
      priority: 0
      initial: true
      policies:
        led_status: idle
        display_status: idle
        va_state: idle
        va_response: inactive
        audio_policy: normal
        ringtone: stop
        timer_alarm: stop
    boot:
      priority: 1000
      policies:
        led_status: boot
        display_status: boot
        va_state: idle
    no_wifi:
      priority: 990
      policies:
        led_status: no_wifi
        display_status: no_wifi
        va_state: idle
    no_ha:
      priority: 980
      policies:
        led_status: no_ha
        display_status: no_ha
        va_state: idle
    no_va:
      priority: 970
      policies:
        led_status: no_va
        display_status: no_va
        va_state: idle
    both_muted:
      priority: 960
      policies:
        led_status: muted
        display_status: muted
        va_state: idle
    mic_muted:
      priority: 950
      policies:
        led_status: mic_muted
        display_status: muted
        va_state: idle
    speaker_muted:
      priority: 940
      policies:
        led_status: speaker_muted
        display_status: muted
        va_state: idle
    media:
      priority: 100
      policies:
        led_status: media
        display_status: media
        audio_policy: normal
        va_state: idle
    announcement:
      priority: 200
      policies:
        led_status: media
        display_status: media
        audio_policy: duck
        va_state: idle
    announcement_play_seen:
      priority: 0
      policies: {}
    timer:
      priority: 300
      policies:
        led_status: media
        display_status: media
        audio_policy: duck
        va_state: idle
    timer_ringing:
      priority: 500
      policies:
        led_status: media
        display_status: media
        audio_policy: duck
        timer_alarm: play
        va_state: idle
    va_start_requested:
      priority: 810
      policies:
        led_status: wake
        display_status: wake
        audio_policy: duck
        va_state: idle
        va_response: inactive
    va_starting:
      priority: 810
      policies:
        led_status: wake
        display_status: wake
        audio_policy: duck
        va_state: idle
        va_response: inactive
    va_barging:
      priority: 825
      policies:
        led_status: listening
        display_status: listening
        audio_policy: duck
        va_state: listening
        va_response: inactive
    va_stopping:
      priority: 0
      policies: {}
    va_run_ended:
      priority: 0
      policies: {}
    va_response_drained:
      priority: 0
      policies: {}
    va_listening:
      priority: 820
      policies:
        led_status: listening
        display_status: listening
        audio_policy: duck
        va_state: listening
        va_response: inactive
    va_thinking:
      priority: 830
      policies:
        led_status: thinking
        display_status: thinking
        audio_policy: duck
        va_state: thinking
        va_response: inactive
    va_responding:
      priority: 840
      policies:
        led_status: responding
        display_status: responding
        audio_policy: duck
        va_state: responding
        va_response: active
  derived_activities:
    - name: both_muted
      when:
        all_active: [mic_muted, speaker_muted]
  policies:
    led_status:
      output: g_applied_led
      on_change:
        - script.execute: update_led
      values:
        idle: 0
        muted: 1
        mic_muted: 2
        speaker_muted: 3
        wake: 4
        listening: 5
        thinking: 6
        responding: 7
        intercom_ringing: 8
        intercom_outgoing: 9
        intercom_streaming: 10
        error: 11
        media: 12
        boot: 13
        no_wifi: 14
        no_ha: 15
        no_va: 16
    display_status:
      output: ui_state
      on_change:
        - script.execute: render_ui_state
      values:
        idle: ${ui_state_idle}
        boot: ${ui_state_init}
        no_wifi: ${ui_state_no_wifi}
        no_ha: ${ui_state_no_ha}
        muted: ${ui_state_mic_muted}
        wake: ${ui_state_mww_recent}
        listening: ${ui_state_va_listening}
        thinking: ${ui_state_va_thinking}
        responding: ${ui_state_va_replying}
        intercom_ringing: ${ui_state_ic_ringing}
        intercom_outgoing: ${ui_state_ic_outgoing}
        intercom_streaming: ${ui_state_ic_streaming}
        error: ${ui_state_va_error}
        media: ${ui_state_media}
        no_va: ${ui_state_no_va}
    va_state:
      output: g_va_state
      values:
        idle: 0
        listening: 1
        thinking: 2
        responding: 3
    va_response:
      values:
        inactive:
          value: 0
          then:
            - script.execute: ui_va_end
        active: 1
    audio_policy:
      output: g_ducking_active
      values:
        normal:
          value: 0
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 0
                duration: 500ms
        duck:
          value: 1
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 20
                duration: 200ms
    ringtone:
      values:
        play:
          then:
            - script.execute: intercom_ringing_loop
        stop:
          then:
            - script.stop: intercom_ringing_loop
    timer_alarm:
      values:
        play:
          then:
            - media_player.stop:
                id: speaker_media_player
                announcement: true
            - script.execute: timer_alarm_loop
            - script.execute: timer_alarm_auto_stop
        stop:
          then:
            - script.stop: timer_alarm_auto_stop
            - script.stop: timer_alarm_loop
            - media_player.stop:
                id: speaker_media_player
                announcement: true
