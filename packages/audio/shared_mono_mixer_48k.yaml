# =============================================================================
# Shared full-experience mono 48 kHz speaker mixer.
#
# Include this when media, TTS/announcements and VoIP must share one physical
# speaker. The package creates three logical source speakers and resamples each
# source to a common 48 kHz mono stream before the final hardware speaker.
#
# Provides:
#   - speaker id `audio_mixer`
#   - source speakers: `media_mixer_input`, `tts_mixer_input`, `voip_mixer_input`
#   - public speaker inputs: `media_speaker_input`, `tts_speaker_input`,
#     `voip_speaker_input`
#
# Prerequisites:
#   - speaker id `hw_speaker` from the board/audio-backend YAML
#
# This package does not know about runtime_controller, Voice Assistant or media
# policy. State ownership belongs in the media_player and runtime packages.
# =============================================================================

speaker:
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    bits_per_sample: 16
    task_stack_in_psram: true
    source_speakers:
      - id: media_mixer_input
        timeout: 10s
        buffer_duration: 100ms
        sample_rate: 48000
        bits_per_sample: 16
        num_channels: 1
      - id: tts_mixer_input
        timeout: 10s
        buffer_duration: 100ms
        sample_rate: 48000
        bits_per_sample: 16
        num_channels: 1
      - id: voip_mixer_input
        timeout: 10s
        # Local mixer staging only. SIP/SDP packet time is owned by voip_stack.
        buffer_duration: 128ms
        sample_rate: 48000
        bits_per_sample: 16
        num_channels: 1

  - platform: resampler
    id: media_speaker_input
    output_speaker: media_mixer_input
    task_stack_in_psram: true
    sample_rate: 48000
    bits_per_sample: 16
    num_channels: 1

  - platform: resampler
    id: tts_speaker_input
    output_speaker: tts_mixer_input
    task_stack_in_psram: true
    sample_rate: 48000
    bits_per_sample: 16
    num_channels: 1

  - platform: resampler
    id: voip_speaker_input
    output_speaker: voip_mixer_input
    task_stack_in_psram: true
    sample_rate: 48000
    bits_per_sample: 16
    num_channels: 1
    # Keep the VoIP playout staging close to the mixer source buffer. This is
    # not the RTP packet time and should not be tuned as a SIP workaround.
    buffer_duration: 128ms
