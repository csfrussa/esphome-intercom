# =============================================================================
# Full-experience mono 48 kHz speaker mixer.
#
# Device YAML must provide:
#   - speaker id `hw_speaker`
#
# Provides:
#   - `audio_mixer`
#   - `media_mixer_input`, `tts_mixer_input`, `voip_mixer_input`
#   - `media_speaker_input`, `tts_speaker_input`, `voip_speaker_input`
#
# The hardware speaker stays device-local because codec/no-codec and power
# handling differ by board.
# =============================================================================

speaker:
  - platform: mixer
    id: audio_mixer
    output_speaker: hw_speaker
    num_channels: 1
    bits_per_sample: 16
    task_stack_in_psram: true
    source_speakers:
      - id: media_mixer_input
        timeout: 10s
        buffer_duration: 100ms
        sample_rate: 48000
        bits_per_sample: 16
        num_channels: 1
      - id: tts_mixer_input
        timeout: 10s
        buffer_duration: 100ms
        sample_rate: 48000
        bits_per_sample: 16
        num_channels: 1
      - id: voip_mixer_input
        timeout: 10s
        # Local mixer staging; RTP packet time is negotiated by SIP/SDP.
        buffer_duration: 128ms
        sample_rate: 48000
        bits_per_sample: 16
        num_channels: 1

  - platform: resampler
    id: media_speaker_input
    output_speaker: media_mixer_input
    task_stack_in_psram: true
    sample_rate: 48000
    bits_per_sample: 16
    num_channels: 1

  - platform: resampler
    id: tts_speaker_input
    output_speaker: tts_mixer_input
    task_stack_in_psram: true
    sample_rate: 48000
    bits_per_sample: 16
    num_channels: 1

  - platform: resampler
    id: voip_speaker_input
    output_speaker: voip_mixer_input
    task_stack_in_psram: true
    sample_rate: 48000
    bits_per_sample: 16
    num_channels: 1
    # Keep the VoIP RX resampler buffer frame-aligned with the wire chunk.
    buffer_duration: 128ms
