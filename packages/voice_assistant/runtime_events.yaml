# Voice Assistant + Micro Wake Word runtime_controller event forwarding.
#
# Include this when VA/MWW state is rendered by runtime_controller. This package
# defines the VA and MWW components and forwards their lifecycle events; it does
# not create user-facing switches or buttons.

voice_assistant:
  id: va
  media_player: speaker_media_player
  tts_playback_start_timeout: 10s
  on_start:
    - runtime_controller.event:
        id: runtime
        event: va_start
  on_listening:
    - runtime_controller.event:
        id: runtime
        event: va_listening
  on_stt_vad_end:
    - runtime_controller.event:
        id: runtime
        event: va_thinking
  on_stt_end:
    - script.execute:
        id: ui_stt_ended
        text: !lambda 'return x;'
  on_intent_progress:
    # ESPHome exposes the streaming TTS media URL here. It is transport state,
    # not assistant response text, so it must never reach display adapters.
    - logger.log:
        level: DEBUG
        tag: va
        format: "VA: intent_progress"
  on_tts_start:
    - logger.log:
        level: INFO
        tag: va
        format: "VA: tts_start"
    # ESPHome's on_tts_start payload is the assistant response text. Populate
    # text/mood before committing the responding state so renderers never see
    # an empty or transport-URL response frame.
    - script.execute:
        id: ui_tts_started
        text: !lambda 'return x;'
    - runtime_controller.event:
        id: runtime
        event: va_responding
  on_tts_end:
    - logger.log:
        level: INFO
        tag: va
        format: "VA: tts_end"
  on_end:
    - logger.log:
        level: INFO
        tag: va
        format: "VA: end"
    - runtime_controller.event:
        id: runtime
        event: va_end
  on_idle:
    - logger.log:
        level: INFO
        tag: va
        format: "VA: idle"
    - runtime_controller.event:
        id: runtime
        event: va_idle
  on_error:
    - logger.log:
        level: INFO
        tag: va
        format: "VA: error"
    - runtime_controller.event:
        id: runtime
        event: va_error
  on_client_connected:
    - logger.log:
        tag: va
        format: "VA: client connected"
    - globals.set:
        id: init_in_progress
        value: "false"
    - runtime_controller.event:
        id: runtime
        event: va_client_connected
    - script.execute: start_mww_when_ready
  on_client_disconnected:
    - logger.log:
        tag: va
        format: "VA: client disconnected"
    - runtime_controller.event:
        id: runtime
        event: va_client_disconnected

micro_wake_word:
  id: mww
  stop_after_detection: false
  on_wake_word_detected:
    - globals.set:
        id: g_last_wake_word
        value: !lambda 'return wake_word;'
    - runtime_controller.event:
        id: runtime
        event: wake_word
