# User-facing Voice Assistant/Micro Wake Word controls for full runtime devices.
#
# Provides:
#   switches: mute, wake_word_switch
#
# Also includes the base VoIP buttons because maintained full devices expose
# call controls next to the VA/MWW switches.

packages:
  voip_call_buttons: !include ../voip/call_buttons.yaml

switch:
  - platform: template
    name: Mic Mute
    id: mute
    icon: mdi:microphone-off
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute ON"
      - micro_wake_word.stop:
      - voice_assistant.stop:
      - microphone.mute: ${mic_id}
      - runtime_controller.event:
          id: runtime
          event: mic_muted
    on_turn_off:
      - logger.log:
          level: INFO
          tag: mute
          format: "Mic mute OFF"
      - microphone.unmute: ${mic_id}
      - runtime_controller.event:
          id: runtime
          event: mic_unmuted
      - script.execute: start_mww_when_ready

  - platform: template
    name: Wake Word
    id: wake_word_switch
    icon: mdi:account-voice
    entity_category: config
    restore_mode: DISABLED
    lambda: 'return id(g_wake_word_enabled);'
    turn_on_action:
      - globals.set:
          id: g_wake_word_enabled
          value: "true"
      - script.execute: start_mww_when_ready
    turn_off_action:
      - globals.set:
          id: g_wake_word_enabled
          value: "false"
      - micro_wake_word.stop:
