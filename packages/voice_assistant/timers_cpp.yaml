# =============================================================================
# Optional Voice Assistant timers package for runtime_fsm profiles.
# =============================================================================

audio_file:
  - id: timer_finished_sound
    file: ${assets_base}assets/sounds/timer_finished.flac

voice_assistant:
  id: va
  on_timer_started:
    - runtime_fsm.event:
        id: runtime_controller
        event: timer_started
  on_timer_cancelled:
    - runtime_fsm.event:
        id: runtime_controller
        event: timer_stopped
  on_timer_updated:
    - runtime_fsm.event:
        id: runtime_controller
        event: timer_updated
  on_timer_tick:
    - runtime_fsm.event:
        id: runtime_controller
        event: timer_tick
  on_timer_finished:
    - runtime_fsm.event:
        id: runtime_controller
        event: timer_finished

script:
  - id: timer_alarm_loop
    mode: single
    then:
      - while:
          condition:
            runtime_fsm.is_active:
              id: runtime_controller
              activity: timer_ringing
          then:
            - media_player.play_media:
                id: speaker_media_player
                media_url: "audio-file://timer_finished_sound"
                announcement: true
            - delay: 6s
  - id: timer_alarm_auto_stop
    mode: restart
    then:
      - delay: 15min
      - runtime_fsm.event:
          id: runtime_controller
          event: timer_stopped
