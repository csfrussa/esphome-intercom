# =============================================================================
# Optional Voice Assistant timers package for runtime_fsm profiles.
# =============================================================================

audio_file:
  - id: timer_finished_sound
    file: ${assets_base}assets/sounds/timer_finished.flac

voice_assistant:
  id: va
  on_timer_started:
    - lambda: 'id(runtime_controller).on_media_event();'
  on_timer_cancelled:
    - lambda: 'id(runtime_controller).on_media_event();'
  on_timer_updated:
    - lambda: 'id(runtime_controller).on_media_event();'
  on_timer_tick:
    - lambda: 'id(runtime_controller).on_media_event();'
  on_timer_finished:
    - switch.turn_on: timer_ringing

script:
  - id: timer_alarm_loop
    mode: single
    then:
      - while:
          condition:
            switch.is_on: timer_ringing
          then:
            - media_player.play_media:
                id: speaker_media_player
                media_url: "audio-file://timer_finished_sound"
                announcement: true
            - delay: 6s

switch:
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - script.stop: timer_alarm_loop
      - media_player.stop:
          id: speaker_media_player
          announcement: true
      - lambda: 'id(runtime_controller).on_media_event();'
    on_turn_on:
      - media_player.stop:
          id: speaker_media_player
          announcement: true
      - script.execute: timer_alarm_loop
      - lambda: 'id(runtime_controller).on_media_event();'
      - delay: 15min
      - switch.turn_off: timer_ringing

