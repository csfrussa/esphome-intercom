# =============================================================================
# Voice Assistant + Micro Wake Word forwarding-only core for runtime_fsm.
# =============================================================================

voice_assistant:
  id: va
  media_player: speaker_media_player
  tts_playback_start_timeout: 10s
  on_start:
    - runtime_fsm.event:
        id: runtime_controller
        event: va_start
  on_listening:
    - runtime_fsm.event:
        id: runtime_controller
        event: va_listening
        dump: true
        reason: va:on_listening
  on_stt_vad_end:
    - runtime_fsm.event:
        id: runtime_controller
        event: va_thinking
        dump: true
        reason: va:on_stt_vad_end
  on_stt_end:
    - script.execute:
        id: ui_stt_ended
        text: !lambda 'return x;'
  on_intent_progress:
    - if:
        condition:
          lambda: 'return !x.empty();'
        then:
          - runtime_fsm.event:
              id: runtime_controller
              event: va_responding
              dump: true
              reason: va:on_intent_progress
  on_tts_start:
    - runtime_fsm.event:
        id: runtime_controller
        event: va_responding
        dump: true
        reason: va:on_tts_start
    - script.execute:
        id: ui_tts_started
        text: !lambda 'return x;'
  on_end:
    - runtime_fsm.event:
        id: runtime_controller
        event: va_end
        dump: true
        reason: va:on_end
  on_error:
    - runtime_fsm.event:
        id: runtime_controller
        event: va_error
  on_client_connected:
    - logger.log:
        tag: va
        format: "VA: client connected"
    - globals.set:
        id: init_in_progress
        value: "false"
    - runtime_fsm.set_activity:
        id: runtime_controller
        activity: no_va
        active: false
    - script.execute: start_mww_when_ready
  on_client_disconnected:
    - logger.log:
        tag: va
        format: "VA: client disconnected"
    - runtime_fsm.set_activities:
        id: runtime_controller
        set:
          no_va: true

micro_wake_word:
  id: mww
  stop_after_detection: false
  on_wake_word_detected:
    - globals.set:
        id: g_last_wake_word
        value: !lambda 'return wake_word;'
    - runtime_fsm.event:
        id: runtime_controller
        event: wake_word
