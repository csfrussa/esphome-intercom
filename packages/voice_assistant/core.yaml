# =============================================================================
# Voice Assistant + Micro Wake Word (core configuration + handlers).
# Drop-in for full-experience devices that run VA on top of the shared
# voip/state_machine_full.yaml.
#
# Prerequisites in the device YAML:
#   - VA hardware config (microphone, speaker, media_player, ringtone, ...)
#     declared via the standard ESPHome blocks; this package only adds
#     `voice_assistant: id: va` + `micro_wake_word: id: mww` config sections
#     and their on_* handlers, not the hardware bindings.
#   - script id `update_status` (provided by voip/state_machine_full.yaml)
#   - script id `va_end_handler` (provided by voip/state_machine_full.yaml)
#   - script id `mww_failsafe`   (provided by voip/state_machine_full.yaml)
#   - script id `barge_failsafe` (provided by voip/state_machine_full.yaml)
#   - script id `va_error_flash` (provided by voip/state_machine_full.yaml)
#   - script id `ui_tts_started`, `ui_stt_ended` (placeholders or device override)
#   - id `phone`              : voip_stack component (for publish_entity_states)
#   - id `mute`                  : mic mute switch
# =============================================================================

globals:
  - id: g_ota_in_progress
    type: bool
    restore_value: false
    initial_value: "false"

voice_assistant:
  id: va
  on_listening:
    - if:
        condition:
          lambda: 'return id(g_va_phase) == 3 || id(g_va_phase) == 4;'
        then:
          - logger.log:
              level: ERROR
              tag: va
              format: "VA: unexpected on_listening while TTS is queued/playing (phase=%d epoch=%u tts_epoch=%u)"
              args:
                - id(g_va_phase)
                - id(g_va_epoch)
                - id(g_tts_owner_epoch)
          - script.execute: update_status
        else:
          - logger.log:
              tag: va
              format: "VA: on_listening"
          - globals.set:
              id: g_va_state
              value: "1"
          - globals.set:
              id: g_va_phase
              value: "1"
          - globals.set:
              id: g_mww_recent
              value: "0"
          - globals.set:
              id: g_barge_in_pending
              value: "0"
          - script.stop: mww_failsafe
          - script.stop: barge_failsafe
          - script.execute: update_status
  on_stt_vad_end:
    - if:
        condition:
          lambda: 'return id(g_va_phase) == 3 || id(g_va_phase) == 4 || id(g_va_phase) == 5;'
        then:
          - logger.log:
              level: ERROR
              tag: va
              format: "VA: unexpected on_stt_vad_end while response/cancel is active (phase=%d)"
              args:
                - id(g_va_phase)
          - script.execute: update_status
        else:
          - logger.log:
              tag: va
              format: "VA: on_stt_vad_end (thinking)"
          - globals.set:
              id: g_va_state
              value: "2"
          - globals.set:
              id: g_va_phase
              value: "2"
          - script.execute: update_status
  on_stt_end:
    - script.execute:
        id: ui_stt_ended
        text: !lambda 'return x;'
  on_intent_progress:
    - if:
        condition:
          # Non-empty x means ESPHome has handed a streaming TTS URL to the
          # media player as an announcement.
          lambda: 'return !x.empty();'
        then:
          - logger.log:
              level: INFO
              tag: va
              format: "VA: on_intent_progress TTS url queued"
          - if:
              condition:
                lambda: 'return id(g_va_phase) != 4 && id(g_va_phase) != 5;'
              then:
                - lambda: |-
                    id(g_tts_owner_epoch) = id(g_va_epoch);
                - globals.set:
                    id: g_va_state
                    value: "3"
                - globals.set:
                    id: g_va_phase
                    value: "3"
                - script.execute: update_status
          - script.execute: va_hold_response_until_announcement
  on_tts_start:
    - if:
        condition:
          lambda: 'return id(g_va_phase) == 3 || id(g_va_phase) == 4 || id(g_va_phase) == 5;'
        then:
          - logger.log:
              level: INFO
              tag: va
              format: "VA: on_tts_start while TTS already queued/playing (phase=%d epoch=%u tts_epoch=%u)"
              args:
                - id(g_va_phase)
                - id(g_va_epoch)
                - id(g_tts_owner_epoch)
          - script.execute: update_status
        else:
          - logger.log:
              tag: va
              format: "VA: on_tts_start (speaking)"
          - lambda: |-
              id(g_tts_owner_epoch) = id(g_va_epoch);
          - globals.set:
              id: g_va_state
              value: "3"
          - globals.set:
              id: g_va_phase
              value: "3"
          - script.execute: update_status
          - script.execute:
              id: ui_tts_started
              text: !lambda 'return x;'
  on_tts_end:
    - logger.log:
        level: INFO
        tag: va
        format: "VA: on_tts_end TTS url queued"
    - if:
        condition:
          lambda: 'return id(g_va_phase) != 4 && id(g_va_phase) != 5;'
        then:
          - lambda: |-
              id(g_tts_owner_epoch) = id(g_va_epoch);
          - globals.set:
              id: g_va_state
              value: "3"
          - globals.set:
              id: g_va_phase
              value: "3"
          - script.execute: update_status
    - script.execute: va_hold_response_until_announcement
  on_end:
    - logger.log:
        tag: va
        format: "VA: on_end"
    - script.execute: va_end_handler
  on_error:
    - logger.log:
        tag: va
        format: "VA: on_error (code=%s, msg=%s)"
        args: ['code.c_str()', 'message.c_str()']
    - if:
        condition:
          lambda: 'return id(g_barge_in_pending) != 0;'
        then:
          - logger.log:
              tag: va
              format: "VA: error during barge-in, keeping barge flag"
        else:
          - globals.set:
              id: g_mww_recent
              value: "0"
          - if:
              condition:
                lambda: 'return !id(init_in_progress);'
              then:
                - globals.set:
                    id: g_va_state
                    value: "4"
                - globals.set:
                    id: g_va_phase
                    value: "6"
                - script.execute: update_status
                - script.execute: va_error_flash
              else:
                - globals.set:
                    id: g_va_state
                    value: "0"
                - globals.set:
                    id: g_va_phase
                    value: "0"
                - script.execute: update_status
  on_client_connected:
    - logger.log:
        tag: va
        format: "VA: client connected"
    - globals.set:
        id: init_in_progress
        value: "false"
    - script.execute: update_status
    - script.execute: start_mww_when_ready
micro_wake_word:
  id: mww
  stop_after_detection: false
  on_wake_word_detected:
    - logger.log:
        tag: mww
        format: "MWW: wake word detected"
    - globals.set:
        id: g_mww_recent
        value: "1"
    - script.execute: update_status
    - script.execute: mww_failsafe
    - if:
        condition:
          or:
            - voice_assistant.is_running:
            - lambda: 'return id(g_va_phase) != 0 || id(g_va_state) != 0;'
            - lambda: 'return id(g_barge_in_pending) != 0;'
        then:
          - logger.log:
              tag: mww
              format: "MWW: reset active VA and restart listening"
          - globals.set:
              id: g_barge_in_pending
              value: "1"
          - globals.set:
              id: g_va_phase
              value: "5"
          - script.execute: barge_failsafe
          - voice_assistant.stop:
          - media_player.stop:
              id: speaker_media_player
              announcement: true
          - script.execute: va_barge_start_when_ready
        else:
          - logger.log:
              tag: mww
              format: "MWW: fresh VA start"
          - lambda: |-
              id(g_va_epoch)++;
              id(g_tts_owner_epoch) = 0;
          - globals.set:
              id: g_va_phase
              value: "0"
          - voice_assistant.start:
              wake_word: !lambda return wake_word;
