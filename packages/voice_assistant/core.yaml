# =============================================================================
# Voice Assistant + Micro Wake Word (core configuration + handlers).
# Drop-in for full-experience devices that run VA on top of the shared
# intercom/state_machine_full.yaml.
#
# Prerequisites in the device YAML:
#   - VA hardware config (microphone, speaker, media_player, ringtone, ...)
#     declared via the standard ESPHome blocks; this package only adds
#     `voice_assistant: id: va` + `micro_wake_word: id: mww` config sections
#     and their on_* handlers, not the hardware bindings.
#   - script id `update_status` (provided by intercom/state_machine_full.yaml)
#   - script id `va_end_handler` (provided by intercom/state_machine_full.yaml)
#   - script id `mww_failsafe`   (provided by intercom/state_machine_full.yaml)
#   - script id `barge_failsafe` (provided by intercom/state_machine_full.yaml)
#   - script id `va_error_flash` (provided by intercom/state_machine_full.yaml)
#   - script id `ui_tts_started`, `ui_stt_ended` (placeholders or device override)
#   - id `intercom`              : intercom_api component (for publish_entity_states)
#   - id `mute`                  : mic mute switch
# =============================================================================

globals:
  - id: g_ota_in_progress
    type: bool
    restore_value: false
    initial_value: "false"

voice_assistant:
  id: va
  on_listening:
    - script.execute:
        id: va_debug_dump
        event: "va:on_listening:enter"
    - if:
        condition:
          lambda: 'return id(g_va_tts_pending) != 0 || id(g_va_tts_active) != 0;'
        then:
          - logger.log:
              level: WARN
              tag: va
              format: "VA: on_listening while TTS pending/active, preserving response state"
          - globals.set:
              id: g_mww_recent
              value: "0"
          - script.stop: mww_failsafe
          - script.execute: update_status
        else:
          - logger.log:
              level: INFO
              tag: va
              format: "VA: on_listening"
          - globals.set:
              id: g_va_state
              value: "1"
          - globals.set:
              id: g_mww_recent
              value: "0"
          - globals.set:
              id: g_barge_in_pending
              value: "0"
          - globals.set:
              id: g_va_tts_pending
              value: "0"
          - globals.set:
              id: g_va_tts_active
              value: "0"
          - script.stop: mww_failsafe
          - script.stop: barge_failsafe
          - script.execute: update_status
    - script.execute:
        id: va_debug_dump
        event: "va:on_listening:exit"
  on_stt_vad_end:
    - script.execute:
        id: va_debug_dump
        event: "va:on_stt_vad_end:enter"
    - logger.log:
        level: INFO
        tag: va
        format: "VA: on_stt_vad_end (thinking)"
    - globals.set:
        id: g_va_state
        value: "2"
    - script.execute: update_status
    - script.execute:
        id: va_debug_dump
        event: "va:on_stt_vad_end:exit"
  on_stt_end:
    - script.execute:
        id: va_debug_dump
        event: "va:on_stt_end"
    - script.execute:
        id: ui_stt_ended
        text: !lambda 'return x;'
  on_tts_start:
    - script.execute:
        id: va_debug_dump
        event: "va:on_tts_start:enter"
    - logger.log:
        level: INFO
        tag: va
        format: "VA: on_tts_start (speaking) state=%d running=%d mp=%d"
        args:
          - id(g_va_state)
          - id(va).is_running()
          - id(speaker_media_player).state
    - globals.set:
        id: g_va_state
        value: "3"
    - globals.set:
        id: g_va_tts_pending
        value: "1"
    - globals.set:
        id: g_va_tts_active
        value: "0"
    - script.execute: update_status
    - script.execute:
        id: ui_tts_started
        text: !lambda 'return x;'
    - script.execute:
        id: va_debug_dump
        event: "va:on_tts_start:exit"
  on_end:
    - script.execute:
        id: va_debug_dump
        event: "va:on_end:enter"
    - logger.log:
        level: INFO
        tag: va
        format: "VA: on_end state=%d running=%d mp=%d announcing=%d"
        args:
          - id(g_va_state)
          - id(va).is_running()
          - id(speaker_media_player).state
          - id(speaker_media_player).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING
    - script.execute: va_end_handler
    - script.execute:
        id: va_debug_dump
        event: "va:on_end:exit"
  on_error:
    - script.execute:
        id: va_debug_dump
        event: "va:on_error:enter"
    - logger.log:
        level: WARN
        tag: va
        format: "VA: on_error (code=%s, msg=%s)"
        args: ['code.c_str()', 'message.c_str()']
    - if:
        condition:
          lambda: 'return id(g_barge_in_pending) != 0;'
        then:
          - logger.log:
              tag: va
              format: "VA: error during barge-in, keeping barge flag"
        else:
          - globals.set:
              id: g_mww_recent
              value: "0"
          - globals.set:
              id: g_va_tts_pending
              value: "0"
          - globals.set:
              id: g_va_tts_active
              value: "0"
          - if:
              condition:
                lambda: 'return !id(init_in_progress);'
              then:
                - globals.set:
                    id: g_va_state
                    value: "4"
                - script.execute: update_status
                - script.execute: va_error_flash
              else:
                - globals.set:
                    id: g_va_state
                    value: "0"
                - script.execute: update_status
    - script.execute:
        id: va_debug_dump
        event: "va:on_error:exit"
  on_client_connected:
    - script.execute:
        id: va_debug_dump
        event: "va:on_client_connected:enter"
    - logger.log:
        level: INFO
        tag: va
        format: "VA: client connected"
    - globals.set:
        id: init_in_progress
        value: "false"
    - script.execute: update_status
    - script.execute: start_mww_when_ready
    - script.execute:
        id: va_debug_dump
        event: "va:on_client_connected:exit"
micro_wake_word:
  id: mww
  stop_after_detection: false
  on_wake_word_detected:
    - script.execute:
        id: va_debug_dump
        event: "mww:on_wake_word_detected:enter"
    - logger.log:
        level: INFO
        tag: mww
        format: "MWW: wake word detected state=%d pending=%d active=%d barge=%d running=%d mp=%d"
        args:
          - id(g_va_state)
          - id(g_va_tts_pending)
          - id(g_va_tts_active)
          - id(g_barge_in_pending)
          - id(va).is_running()
          - id(speaker_media_player).state
    - globals.set:
        id: g_mww_recent
        value: "1"
    - script.execute: update_status
    - script.execute: mww_failsafe
    - if:
        condition:
          or:
            - lambda: 'return id(g_va_state) == 3 || id(g_va_tts_pending) != 0 || id(g_va_tts_active) != 0;'
            - lambda: 'return id(g_barge_in_pending) != 0;'
        then:
          - logger.log:
              level: INFO
              tag: mww
              format: "MWW: VA response barge-in state=%d pending=%d active=%d running=%d"
              args:
                - id(g_va_state)
                - id(g_va_tts_pending)
                - id(g_va_tts_active)
                - id(va).is_running()
          - globals.set:
              id: g_barge_in_pending
              value: "1"
          - script.execute: barge_failsafe
          - voice_assistant.stop:
          - media_player.stop:
              id: speaker_media_player
              announcement: true
          - script.execute: va_barge_maybe_restart
          - script.execute:
              id: va_debug_dump
              event: "mww:on_wake_word_detected:barge_exit"
        else:
          - if:
              condition:
                lambda: 'return id(va).is_running() || id(g_va_state) != 0;'
              then:
                - logger.log:
                    level: WARN
                    tag: mww
                    format: "MWW: duplicate wake ignored state=%d running=%d pending=%d active=%d"
                    args:
                      - id(g_va_state)
                      - id(va).is_running()
                      - id(g_va_tts_pending)
                      - id(g_va_tts_active)
                - script.execute:
                    id: va_debug_dump
                    event: "mww:on_wake_word_detected:duplicate_exit"
              else:
                - logger.log:
                    level: INFO
                    tag: mww
                    format: "MWW: fresh VA start"
                - voice_assistant.start:
                    wake_word: !lambda return wake_word;
                - script.execute:
                    id: va_debug_dump
                    event: "mww:on_wake_word_detected:fresh_exit"
