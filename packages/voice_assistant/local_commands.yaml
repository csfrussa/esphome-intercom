# =============================================================================
# Local VA control commands exposed to Home Assistant as ESPHome API actions.
#
# Prerequisites:
#   - id `va`                   : voice_assistant
#   - id `speaker_media_player` : speaker_source media_player
#   - script `ui_va_barge_start`: device-specific response-text cleanup hook
# =============================================================================

api:
  actions:
    # Silence the current VA session without starting a new one.
    #
    # This is intentionally narrower than a media stop: only the announcement
    # pipeline is stopped, so Sendspin/background media can continue underneath.
    - action: voice_quiet
      then:
        - logger.log:
            level: INFO
            tag: va
            format: "VA: quiet requested"
        - script.execute: ui_va_barge_start
        - media_player.stop:
            id: speaker_media_player
            announcement: true
        - voice_assistant.stop:
