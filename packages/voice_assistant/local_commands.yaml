# =============================================================================
# Local VA control commands exposed to Home Assistant as ESPHome API actions.
#
# Prerequisites:
#   - id `va`                   : voice_assistant
#   - id `speaker_media_player` : speaker_source media_player
#   - script `ui_va_barge_start`: device-specific response-text cleanup hook
# =============================================================================

script:
  # One implementation serves both locally recognized speech and the HA API.
  # Only announcement audio is stopped, leaving Sendspin/background media intact.
  - id: voice_quiet_internal
    mode: restart
    then:
      - script.execute: ui_va_barge_start
      - media_player.stop:
          id: speaker_media_player
          announcement: true
      - voice_assistant.stop:

api:
  actions:
    - action: voice_quiet
      then:
        - script.execute: voice_quiet_internal
