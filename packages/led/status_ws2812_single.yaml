# =============================================================================
# Single WS2812/SK6812 status LED.
#
# Hardware/effects package for generic devices with one addressable status LED.
# State mapping stays in the VoIP callback reducer or runtime_controller.
# =============================================================================

substitutions:
  status_led_name: Status LED
  status_led_pin: GPIO33
  status_led_chipset: SK6812
  status_led_rgb_order: GRB

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: ${status_led_name}
    icon: mdi:led-on
    pin: ${status_led_pin}
    chipset: ${status_led_chipset}
    num_leds: 1
    rgb_order: ${status_led_rgb_order}
    effects:
      - pulse:
          name: "Slow Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 1s
          update_interval: 1s
      - pulse:
          name: "Fast Pulse"
          min_brightness: 20%
          max_brightness: 100%
          transition_length: 300ms
          update_interval: 300ms
      - addressable_lambda:
          name: "Ringing"
          update_interval: 120ms
          lambda: |-
            static bool on = true;
            static uint32_t last = 0;
            if (initial_run) {
              on = true;
              last = millis();
            }
            if (millis() - last >= 250) {
              last = millis();
              on = !on;
            }
            it.all() = on ? current_color : Color(0, 0, 0);
      - addressable_lambda:
          name: "Calling"
          update_interval: 120ms
          lambda: |-
            static bool on = true;
            static uint32_t last = 0;
            if (initial_run) {
              on = true;
              last = millis();
            }
            if (millis() - last >= 500) {
              last = millis();
              on = !on;
            }
            it.all() = on ? current_color : Color(0, 0, 0);
      - addressable_lambda:
          name: "Blink"
          update_interval: 120ms
          lambda: |-
            static bool on = true;
            static uint32_t last = 0;
            if (initial_run) {
              on = true;
              last = millis();
            }
            if (millis() - last >= 420) {
              last = millis();
              on = !on;
            }
            it.all() = on ? current_color : Color(0, 0, 0);
