# =============================================================================
# Spotpear Ball v2 status LED.
#
# Hardware/effects package for the single WS2812 status LED on GPIO48. Display
# backlight stays in the device YAML because it is part of the LVGL/display
# subsystem, not the status LED capability.
# =============================================================================

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: none
    disabled_by_default: false
    entity_category: config
    pin: GPIO48
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 1
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 0%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%
      - addressable_lambda:
          name: "Ringing"
          update_interval: 120ms
          lambda: |-
            static bool on = true;
            static uint32_t last = 0;
            if (initial_run) {
              on = true;
              last = millis();
            }
            if (millis() - last >= 300) {
              last = millis();
              on = !on;
            }
            it.all() = on ? current_color : Color(0, 0, 0);
      - addressable_lambda:
          name: "Calling"
          update_interval: 120ms
          lambda: |-
            static bool on = true;
            static uint32_t last = 0;
            if (initial_run) {
              on = true;
              last = millis();
            }
            if (millis() - last >= 500) {
              last = millis();
              on = !on;
            }
            it.all() = on ? current_color : Color(0, 0, 0);
      - addressable_lambda:
          name: "Blink"
          update_interval: 120ms
          lambda: |-
            static bool on = true;
            static uint32_t last = 0;
            if (initial_run) {
              on = true;
              last = millis();
            }
            if (millis() - last >= 420) {
              last = millis();
              on = !on;
            }
            it.all() = on ? current_color : Color(0, 0, 0);
