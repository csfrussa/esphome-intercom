# Sendspin artwork support for display devices.
#
# Source and status:
#   - Added for https://github.com/n-IA-hane/esphome-intercom/issues/58.
#   - Uses ESPHome development PR https://github.com/esphome/esphome/pull/16057
#     for the generic_image/sendspin image platform until that support lands in
#     the ESPHome release used by this project.
#
# Include this package on display builds that already define:
#   - sendspin_hub
#   - speaker_media_player
#   - runtime_controller
#   - apply_media_artwork
#   - mood_bg and mood_neutral LVGL image objects

substitutions:
  sendspin_artwork_resize: 240x240

external_components:
  - source: github://pr#16057
    components: [generic_image, sendspin]
    refresh: 1h

esp32:
  framework:
    components:
      - espressif/esp-dsp^1.8.0

generic_image:
  - platform: sendspin
    id: sendspin_cover_art
    sendspin_id: sendspin_hub
    format: JPEG
    type: RGB565
    resize: ${sendspin_artwork_resize}
    source: ALBUM
    on_image_display:
      # The guard mixes LVGL mode, VA state, media_player state and
      # runtime_controller activity. There is no single native ESPHome condition
      # for this combined UI predicate.
      - if:
          condition:
            lambda: |-
              return id(current_mode) == 0 &&
                     id(voice_assistant_phase) == ${voice_assist_replying_phase_id} &&
                     id(speaker_media_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING &&
                     !id(runtime).is_activity_active("announcement");
          then:
            - script.execute: apply_media_artwork
    on_image_error:
      # Same guard as successful image display: repaint only when the media page
      # is allowed to own the artwork.
      - if:
          condition:
            lambda: |-
              return id(current_mode) == 0 &&
                     id(voice_assistant_phase) == ${voice_assist_replying_phase_id} &&
                     id(speaker_media_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING &&
                     !id(runtime).is_activity_active("announcement");
          then:
            - script.execute: apply_media_artwork

script:
  - id: !extend apply_media_artwork
    then:
      # generic_image exposes the loaded LVGL image source through C++.
      - lambda: |-
          if (id(sendspin_cover_art).is_loaded()) {
            lv_img_set_src(id(mood_bg), id(sendspin_cover_art));
          } else {
            lv_img_set_src(id(mood_bg), id(mood_neutral));
          }
          lv_obj_invalidate(id(mood_bg));
