# =============================================================================
# Full-experience mono 48 kHz source media player.
#
# Requires speaker ids from packages/audio/full_mono_mixer_48k.yaml:
#   - media_speaker_input
#   - tts_speaker_input
#
# One media player owns normal HA media, announcements, local audio files and
# Sendspin. The mixer remains responsible for arbitration with intercom.
# =============================================================================

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

audio_file:
  - id: intercom_ringing_sound
    file: ${assets_base}assets/sounds/ringtone.flac

media_source:
  - platform: audio_http
    id: media_http_source
    buffer_size: 131072
    task_stack_in_psram: true
  - platform: audio_http
    id: announcement_http_source
    buffer_size: 65536
    task_stack_in_psram: true
  - platform: audio_file
    id: announcement_file_source
    task_stack_in_psram: true
  - platform: sendspin
    id: sendspin_media_source
    sample_rate: 48000
    buffer_size: 524288
    task_stack_in_psram: true
    decode_memory: psram

media_player:
  - platform: speaker_source
    id: speaker_media_player
    name: None
    internal: false
    volume_initial: 100%
    volume_min: 0%
    volume_max: 100%
    volume_increment: 5%
    media_pipeline:
      speaker: media_speaker_input
      sample_rate: 48000
      format: FLAC
      sources:
        - media_http_source
        - sendspin_media_source
    announcement_pipeline:
      speaker: tts_speaker_input
      sample_rate: 48000
      format: FLAC
      sources:
        - announcement_http_source
        - announcement_file_source
    on_announcement:
      - if:
          condition:
            lambda: 'return id(g_va_state) == 3 || id(g_va_tts_pending) != 0;'
          then:
            - logger.log:
                tag: va
                format: "VA: TTS announcement started"
            - globals.set:
                id: g_va_tts_pending
                value: "0"
            - globals.set:
                id: g_va_tts_active
                value: "1"
      - script.execute: update_status
      - script.execute: va_barge_maybe_restart
    on_play:
      - if:
          condition:
            lambda: 'return id(g_va_tts_active) != 0 && !id(va).is_running();'
          then:
            - script.execute: va_tts_maybe_done
      - script.execute: va_barge_maybe_restart
      - script.execute: update_status
    on_pause:
      - script.execute: update_status
    on_idle:
      - script.execute: va_tts_maybe_done
      - script.execute: va_barge_maybe_restart
      - script.execute: update_status
