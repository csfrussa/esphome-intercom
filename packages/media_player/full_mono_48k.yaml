# =============================================================================
# Full-experience mono 48 kHz source media player.
#
# Requires speaker ids from packages/audio/full_mono_mixer_48k.yaml:
#   - media_speaker_input
#   - tts_speaker_input
#
# One media player owns normal HA media, announcements, local audio files and
# Sendspin. The mixer remains responsible for arbitration with intercom.
# =============================================================================

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

audio_file:
  - id: intercom_ringing_sound
    file: ${assets_base}assets/sounds/ringtone.flac

media_source:
  - platform: audio_http
    id: media_http_source
    buffer_size: 131072
    task_stack_in_psram: true
  - platform: audio_http
    id: announcement_http_source
    buffer_size: 65536
    task_stack_in_psram: true
  - platform: audio_file
    id: announcement_file_source
    task_stack_in_psram: true
  - platform: sendspin
    id: sendspin_media_source
    sample_rate: 48000
    buffer_size: 524288
    task_stack_in_psram: true
    decode_memory: psram

media_player:
  - platform: speaker_source
    id: speaker_media_player
    name: None
    internal: false
    volume_initial: 100%
    volume_min: 0%
    volume_max: 100%
    volume_increment: 5%
    media_pipeline:
      speaker: media_speaker_input
      sample_rate: 48000
      format: FLAC
      sources:
        - media_http_source
        - sendspin_media_source
    announcement_pipeline:
      speaker: tts_speaker_input
      sample_rate: 48000
      format: FLAC
      sources:
        - announcement_http_source
        - announcement_file_source
    on_announcement:
      - script.execute:
          id: va_debug_dump
          event: "media:on_announcement:enter"
      - logger.log:
          level: INFO
          tag: media
          format: "media_player: on_announcement state=%d va_state=%d va_running=%d pending=%d active=%d cancel=%d"
          args:
            - id(speaker_media_player).state
            - id(g_va_state)
            - id(va).is_running()
            - id(g_va_tts_pending)
            - id(g_va_tts_active)
            - id(g_va_tts_cancel_next)
      - if:
          condition:
            lambda: |-
              return id(g_va_tts_cancel_next) != 0 ||
                     (id(va).is_running() &&
                      id(g_va_tts_pending) == 0 &&
                      id(g_va_tts_active) == 0);
          then:
            - logger.log:
                level: WARN
                tag: va
                format: "VA: cancelling stale TTS announcement state=%d running=%d pending=%d active=%d cancel=%d"
                args:
                  - id(g_va_state)
                  - id(va).is_running()
                  - id(g_va_tts_pending)
                  - id(g_va_tts_active)
                  - id(g_va_tts_cancel_next)
            - globals.set:
                id: g_va_tts_cancel_next
                value: "0"
            - globals.set:
                id: g_va_tts_pending
                value: "0"
            - globals.set:
                id: g_va_tts_active
                value: "0"
            - media_player.stop:
                id: speaker_media_player
                announcement: true
            - script.execute: va_barge_maybe_restart
            - script.execute:
                id: va_debug_dump
                event: "media:on_announcement:stale_stopped"
          else:
            - if:
                condition:
                  lambda: 'return id(g_va_state) == 3 || id(g_va_tts_pending) != 0;'
                then:
                  - logger.log:
                      level: INFO
                      tag: va
                      format: "VA: TTS announcement started"
                  - globals.set:
                      id: g_va_tts_pending
                      value: "0"
                  - globals.set:
                      id: g_va_tts_active
                      value: "1"
                  - script.execute:
                      id: va_debug_dump
                      event: "media:on_announcement:tts_active"
                  - voice_assistant.stop:
                  - script.execute:
                      id: va_debug_dump
                      event: "media:on_announcement:va_stopped_for_tts"
      - script.execute: update_status
      - script.execute:
          id: va_debug_dump
          event: "media:on_announcement:exit"
    on_play:
      - script.execute:
          id: va_debug_dump
          event: "media:on_play:enter"
      - logger.log:
          level: INFO
          tag: media
          format: "media_player: on_play state=%d va_state=%d va_running=%d"
          args:
            - id(speaker_media_player).state
            - id(g_va_state)
            - id(va).is_running()
      - if:
          condition:
            lambda: 'return id(g_va_tts_active) != 0 && !id(va).is_running();'
          then:
            - script.execute: va_tts_maybe_done
      - script.execute: va_barge_maybe_restart
      - script.execute: update_status
      - script.execute:
          id: va_debug_dump
          event: "media:on_play:exit"
    on_pause:
      - script.execute:
          id: va_debug_dump
          event: "media:on_pause:enter"
      - logger.log:
          level: INFO
          tag: media
          format: "media_player: on_pause state=%d va_state=%d va_running=%d"
          args:
            - id(speaker_media_player).state
            - id(g_va_state)
            - id(va).is_running()
      - script.execute: update_status
      - script.execute:
          id: va_debug_dump
          event: "media:on_pause:exit"
    on_idle:
      - script.execute:
          id: va_debug_dump
          event: "media:on_idle:enter"
      - logger.log:
          level: INFO
          tag: media
          format: "media_player: on_idle state=%d va_state=%d va_running=%d"
          args:
            - id(speaker_media_player).state
            - id(g_va_state)
            - id(va).is_running()
      - delay: 200ms
      - script.execute: va_tts_maybe_done
      - script.execute: va_barge_maybe_restart
      - script.execute: update_status
      - script.execute:
          id: va_debug_dump
          event: "media:on_idle:exit"
