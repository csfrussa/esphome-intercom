# =============================================================================
# Runtime-controller full-experience mono 48 kHz media player.
#
# Include this with audio/shared_mono_mixer_48k.yaml when a full device uses
# runtime_controller for media/announcement/VA/VoIP arbitration.
#
# Provides:
#   - sendspin hub and media source
#   - local ringtone audio_file `voip_ringing_sound`
#   - HTTP/file/sendspin media sources
#   - media_player id `speaker_media_player`
#
# Prerequisites:
#   - speaker ids `media_speaker_input` and `tts_speaker_input`
#   - runtime_controller id `runtime`
#
# Normal media, Sendspin, local announcements and VA TTS all go through the same
# speaker_source media player. The only state emitted here is factual media
# lifecycle events; rendering remains centralized in runtime_controller.
# =============================================================================

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

audio_file:
  - id: voip_ringing_sound
    file: ${assets_base}assets/sounds/ringtone.flac

media_source:
  - platform: audio_http
    id: media_http_source
    buffer_size: 65536
    task_stack_in_psram: true
  - platform: audio_http
    id: announcement_http_source
    buffer_size: 65536
    task_stack_in_psram: true
  - platform: audio_file
    id: announcement_file_source
    task_stack_in_psram: true
  - platform: sendspin
    id: sendspin_media_source
    sample_rate: 48000
    buffer_size: 262144
    task_stack_in_psram: true
    decode_memory: psram

media_player:
  - platform: speaker_source
    id: speaker_media_player
    name: None
    internal: false
    volume_initial: 100%
    volume_min: 0%
    volume_max: 100%
    volume_increment: 5%
    media_pipeline:
      speaker: media_speaker_input
      sample_rate: 48000
      format: FLAC
      sources:
        - media_http_source
        - sendspin_media_source
    announcement_pipeline:
      speaker: tts_speaker_input
      sample_rate: 48000
      format: FLAC
      sources:
        - announcement_http_source
        - announcement_file_source
    on_announcement:
      - runtime_controller.event:
          id: runtime
          event: announcement_started
    on_play:
      - runtime_controller.event:
          id: runtime
          event: media_playing
    on_pause:
      - runtime_controller.event:
          id: runtime
          event: media_paused
    on_idle:
      - runtime_controller.event:
          id: runtime
          event: media_idle
