# =============================================================================
# Full-experience media graph for runtime_fsm.
#
# HA/Sendspin media, generic announcements and VA TTS remain on the standard
# speaker_source media player. runtime_fsm is configured declaratively: media
# callbacks only toggle activities, and policies decide what other YAML actions
# should run.
# =============================================================================

sendspin:
  id: sendspin_hub
  task_stack_in_psram: true

audio_file:
  - id: intercom_ringing_sound
    file: ${assets_base}assets/sounds/ringtone.flac

media_source:
  - platform: audio_http
    id: media_http_source
    buffer_size: 131072
    task_stack_in_psram: true
  - platform: audio_http
    id: announcement_http_source
    buffer_size: 65536
    task_stack_in_psram: true
  - platform: audio_file
    id: announcement_file_source
    task_stack_in_psram: true
  - platform: sendspin
    id: sendspin_media_source
    sample_rate: 48000
    buffer_size: 524288
    task_stack_in_psram: true
    decode_memory: psram

media_player:
  - platform: speaker_source
    id: speaker_media_player
    name: None
    internal: false
    volume_initial: 100%
    volume_min: 0%
    volume_max: 100%
    volume_increment: 5%
    media_pipeline:
      speaker: media_speaker_input
      sample_rate: 48000
      format: FLAC
      sources:
        - media_http_source
        - sendspin_media_source
    announcement_pipeline:
      speaker: tts_speaker_input
      sample_rate: 48000
      format: FLAC
      sources:
        - announcement_http_source
        - announcement_file_source
    on_announcement:
      - runtime_fsm.event:
          id: runtime_controller
          event: announcement_started
          dump: true
          reason: media:on_announcement
    on_play:
      - runtime_fsm.event:
          id: runtime_controller
          event: media_playing
          dump: true
          reason: media:on_play
    on_pause:
      - runtime_fsm.set_activity:
          id: runtime_controller
          activity: media
          active: false
    on_idle:
      - runtime_fsm.event:
          id: runtime_controller
          event: media_idle
          dump: true
          reason: media:on_idle

runtime_fsm:
  id: runtime_controller
  debug: true
  state_outputs:
    activity_mask: g_activity_mask
    sequence: g_fsm_seq
  intercom:
    id: intercom
    activity_prefix: "intercom:"
  actions:
    voice_start:
      - logger.log:
          level: INFO
          tag: runtime_fsm
          format: "voice_start requested: va_running=%d media_state=%d mask=0x%08x seq=%u wake='%s'"
          args:
            - id(va).is_running()
            - id(speaker_media_player).state
            - id(runtime_controller).get_activity_mask()
            - id(runtime_controller).get_sequence()
            - id(g_last_wake_word).c_str()
      - wait_until:
          condition:
            not:
              voice_assistant.is_running:
      - logger.log:
          level: INFO
          tag: runtime_fsm
          format: "voice_start firing: va_running=%d media_state=%d mask=0x%08x seq=%u wake='%s'"
          args:
            - id(va).is_running()
            - id(speaker_media_player).state
            - id(runtime_controller).get_activity_mask()
            - id(runtime_controller).get_sequence()
            - id(g_last_wake_word).c_str()
      - voice_assistant.start:
          wake_word: !lambda 'return id(g_last_wake_word);'
      - logger.log:
          level: INFO
          tag: runtime_fsm
          format: "voice_start submitted: va_running=%d media_state=%d mask=0x%08x seq=%u"
          args:
            - id(va).is_running()
            - id(speaker_media_player).state
            - id(runtime_controller).get_activity_mask()
            - id(runtime_controller).get_sequence()
    voice_restart_live:
      - logger.log:
          level: INFO
          tag: runtime_fsm
          format: "Wake word resets active VA pipeline"
      - voice_assistant.stop:
    voice_restart_response:
      - logger.log:
          level: INFO
          tag: runtime_fsm
          format: "Wake word resets active VA response"
      - media_player.stop:
          id: speaker_media_player
          announcement: true
      - voice_assistant.stop:
    stop_announcement:
      - logger.log:
          level: WARN
          tag: runtime_fsm
          format: "Cancelling stale announcement while VA is already active"
      - media_player.stop:
          id: speaker_media_player
          announcement: true
  events:
    boot_start:
      set:
        boot: true
        no_wifi: true
        no_ha: true
    media_idle:
      rules:
        - when:
            any_active:
              - va_starting
          set:
            media: false
            announcement: false
            va_responding: false
          action: voice_start
        - set:
            media: false
            announcement: false
            va_responding: false
    media_playing:
      rules:
        - when:
            any_active:
              - va_starting
          set:
            media: true
            announcement: false
          action: voice_start
        - when:
            all_active:
              - va_responding
              - announcement
          set:
            media: true
            announcement: false
            va_responding: false
        - set:
            media: true
            announcement: false
    announcement_started:
      rules:
        - when:
            any_active:
              - va_starting
              - va_listening
              - va_thinking
          set:
            announcement: false
          action: stop_announcement
        - set:
            announcement: true
    wake_word:
      rules:
        - when:
            any_active:
              - va_starting
              - va_listening
              - va_thinking
          set:
            va_starting: true
          action: voice_restart_live
        - when:
            any_active:
              - va_responding
              - announcement
          set:
            announcement: false
            va_starting: true
          action: voice_restart_response
        - set:
            va_starting: true
          action: voice_start
    va_start:
      set:
        va_starting: true
    va_listening:
      set:
        va_listening: true
    va_thinking:
      set:
        va_thinking: true
    va_responding:
      set:
        va_responding: true
    va_end:
      rules:
        - when:
            any_active:
              - va_starting
          set:
            va_listening: false
            va_thinking: false
            va_responding: false
            announcement: false
          action: voice_start
        - set:
            va_starting: false
            va_listening: false
            va_thinking: false
    va_error:
      set:
        va_starting: false
        va_listening: false
        va_thinking: false
        va_responding: false
  activities:
    - name: idle
      priority: 0
      initial: true
      set:
        led_status: idle
        display_status: idle
        va_state: idle
        audio_policy: normal
    - name: boot
      priority: 1000
      set:
        led_status: boot
        display_status: boot
        va_state: idle
    - name: no_wifi
      priority: 990
      set:
        led_status: no_wifi
        display_status: no_wifi
        va_state: idle
    - name: no_ha
      priority: 980
      set:
        led_status: no_ha
        display_status: no_ha
        va_state: idle
    - name: no_va
      priority: 970
      set:
        led_status: no_va
        display_status: no_va
        va_state: idle
    - name: both_muted
      priority: 960
      set:
        led_status: muted
        display_status: muted
        va_state: idle
    - name: mic_muted
      priority: 950
      set:
        led_status: mic_muted
        display_status: muted
        va_state: idle
    - name: speaker_muted
      priority: 940
      set:
        led_status: speaker_muted
        display_status: muted
        va_state: idle
    - name: media
      priority: 100
      set:
        led_status: media
        display_status: media
        audio_policy: normal
        va_state: idle
    - name: announcement
      priority: 200
      set:
        led_status: media
        display_status: media
        audio_policy: duck
        va_state: idle
    - name: timer
      priority: 300
      set:
        led_status: media
        display_status: media
        audio_policy: duck
        va_state: idle
    - name: va_starting
      group: va
      priority: 610
      set:
        led_status: wake
        display_status: wake
        audio_policy: duck
        va_state: idle
    - name: va_listening
      group: va
      priority: 620
      set:
        led_status: listening
        display_status: listening
        audio_policy: duck
        va_state: listening
    - name: va_thinking
      group: va
      priority: 630
      set:
        led_status: thinking
        display_status: thinking
        audio_policy: duck
        va_state: thinking
    - name: va_responding
      group: va
      priority: 800
      set:
        led_status: responding
        display_status: responding
        audio_policy: duck
        va_state: responding
    - name: intercom:ringing
      priority: 700
      set:
        led_status: intercom_ringing
        display_status: intercom_ringing
        audio_policy: duck
        va_state: idle
    - name: intercom:outgoing
      priority: 690
      set:
        led_status: intercom_outgoing
        display_status: intercom_outgoing
        audio_policy: duck
        va_state: idle
    - name: intercom:streaming
      priority: 650
      set:
        led_status: intercom_streaming
        display_status: intercom_streaming
        audio_policy: duck
        va_state: idle
  derived_activities:
    - name: both_muted
      when:
        all_active:
          - mic_muted
          - speaker_muted
  policies:
    - name: led_status
      output: g_applied_led
      on_change:
        - script.execute: update_led
      values:
        idle: 0
        muted: 1
        mic_muted: 2
        speaker_muted: 3
        wake: 4
        listening: 5
        thinking: 6
        responding: 7
        intercom_ringing: 8
        intercom_outgoing: 9
        intercom_streaming: 10
        error: 11
        media: 12
        boot: 13
        no_wifi: 14
        no_ha: 15
        no_va: 16
    - name: display_status
      output: ui_state
      on_change:
        - script.execute: render_ui_state
      values:
        idle: ${ui_state_idle}
        boot: ${ui_state_init}
        no_wifi: ${ui_state_no_wifi}
        no_ha: ${ui_state_no_ha}
        muted: ${ui_state_mic_muted}
        wake: ${ui_state_mww_recent}
        listening: ${ui_state_va_listening}
        thinking: ${ui_state_va_thinking}
        responding: ${ui_state_va_replying}
        intercom_ringing: ${ui_state_ic_ringing}
        intercom_outgoing: ${ui_state_ic_outgoing}
        intercom_streaming: ${ui_state_ic_streaming}
        error: ${ui_state_va_error}
        media: ${ui_state_media}
        no_va: ${ui_state_no_va}
    - name: va_state
      output: g_va_state
      values:
        idle: 0
        listening: 1
        thinking: 2
        responding: 3
    - name: audio_policy
      output: g_ducking_active
      values:
        normal:
          value: 0
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 0
                duration: 500ms
        duck:
          value: 1
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixer_input
                decibel_reduction: 20
                duration: 200ms
