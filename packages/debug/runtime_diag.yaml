# =============================================================================
# Runtime diagnostics flight recorder.
#
# Include only while investigating device starvation or watchdog-like behavior.
# It exposes an on-demand API action/button that prints heap, main-loop gap,
# API timestamps and FreeRTOS task stack/runtime data to the ESP logger only.
# Do not publish the full snapshot as HA state: on a starving ESP that extra
# API payload can distort the failure we are trying to measure.
# =============================================================================

runtime_diag:
  id: runtime_diag_component

api:
  on_client_connected:
    - lambda: 'id(runtime_diag_component).mark_api_connected();'
  on_client_disconnected:
    - lambda: 'id(runtime_diag_component).mark_api_disconnected();'
  actions:
    - action: capture_runtime_snapshot
      variables:
        reason: string
      then:
        - lambda: 'id(runtime_diag_component).capture(reason.c_str());'
    - action: start_runtime_burst
      variables:
        reason: string
        samples: int
        interval_ms: int
      then:
        - lambda: |-
            id(runtime_diag_component).start_burst(
              reason.c_str(),
              static_cast<uint32_t>(std::max<int32_t>(1, samples)),
              static_cast<uint32_t>(std::max<int32_t>(250, interval_ms))
            );

button:
  - platform: template
    name: Capture Runtime Snapshot
    icon: mdi:camera-metering-center
    entity_category: diagnostic
    on_press:
      - lambda: 'id(runtime_diag_component).capture("button");'

esp32:
  framework:
    sdkconfig_options:
      CONFIG_FREERTOS_USE_TRACE_FACILITY: "y"
      CONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS: "y"
      CONFIG_FREERTOS_GENERATE_RUN_TIME_STATS: "y"
      CONFIG_FREERTOS_VTASKLIST_INCLUDE_COREID: "y"
