# =============================================================================
# I2S Audio Duplex user controls
# =============================================================================
# Drop-in for devices using:
#   i2s_audio_duplex id: i2s_duplex
#   speaker id: hw_speaker
#
# Exposes the stable user-facing controls:
#   - Master Volume: speaker-backed software volume for non-codec boards
#   - Mic Gain: post-processor gain for level trim after AEC/AFE
# =============================================================================

substitutions:
  mic_gain_min: "-20"
  mic_gain_max: "30"

number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    speaker_volume:
      id: master_volume
      name: Master Volume
      speaker_id: hw_speaker
    mic_gain:
      id: mic_gain
      name: Mic Gain
      min_value: ${mic_gain_min}
      max_value: ${mic_gain_max}
