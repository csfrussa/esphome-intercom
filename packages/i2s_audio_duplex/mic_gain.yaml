# =============================================================================
# I2S Audio Duplex microphone gain control
# =============================================================================

substitutions:
  mic_gain_min: "-20"
  mic_gain_max: "30"

number:
  - platform: i2s_audio_duplex
    i2s_audio_duplex_id: i2s_duplex
    mic_gain:
      id: mic_gain
      name: Mic Gain
      min_value: ${mic_gain_min}
      max_value: ${mic_gain_max}
