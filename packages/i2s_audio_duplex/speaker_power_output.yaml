# =============================================================================
# I2S Audio Duplex speaker power gating (GPIO output enable)
# =============================================================================
# Expects:
#   - i2s_audio_duplex id: i2s_duplex
#   - output id: speaker_enable
#   - switch id: speaker_mute
#
# Playback start enables the amp immediately. Playback idle starts a restartable
# countdown; repeated idle events reset the countdown and only the last one can
# power the amp down.
# =============================================================================

substitutions:
  duplex_speaker_idle_delay: 30s

i2s_audio_duplex:
  id: !extend i2s_duplex
  on_speaker_start:
    - script.stop: duplex_speaker_idle_powerdown
    - if:
        condition:
          switch.is_off: speaker_mute
        then:
          - output.turn_on: speaker_enable
  on_speaker_idle:
    - script.execute: duplex_speaker_idle_powerdown

script:
  - id: duplex_speaker_idle_powerdown
    mode: restart
    then:
      - delay: ${duplex_speaker_idle_delay}
      - if:
          condition:
            switch.is_off: speaker_mute
          then:
            - output.turn_off: speaker_enable

