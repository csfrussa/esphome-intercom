# =============================================================================
# ESP AFE dual-mic entities
# =============================================================================
# Shared runtime controls for dual-microphone esp_afe pipelines.
#
# `Voice Detected` is a binary sensor emitted by AFE voice-activity analysis.
# `Voice Activity Detector` is the runtime switch that enables/disables
# that analysis. `Speech Enhancement` controls the AFE SE/BSS path.
# =============================================================================

substitutions:
  afe_aec_restore_mode: RESTORE_DEFAULT_ON
  afe_se_restore_mode: RESTORE_DEFAULT_ON
  afe_vad_restore_mode: ALWAYS_OFF

binary_sensor:
  - platform: esp_afe
    esp_afe_id: afe_processor
    vad:
      name: Voice Detected
      id: voice_presence

switch:
  - platform: esp_afe
    esp_afe_id: afe_processor
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: ${afe_aec_restore_mode}
    se:
      id: se_switch
      name: Speech Enhancement
      icon: mdi:microphone-variant
      restore_mode: ${afe_se_restore_mode}
    vad:
      id: vad_switch
      name: Voice Activity Detector
      icon: mdi:account-voice
      restore_mode: ${afe_vad_restore_mode}
