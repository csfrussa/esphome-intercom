# =============================================================================
# ESP AFE dual-mic entities
# =============================================================================
# Shared runtime controls for dual-microphone esp_afe pipelines.
#
# `Voice Detected` is a binary sensor emitted by AFE voice-activity analysis.
# `Voice Activity Detector` is the runtime switch that enables/disables
# that analysis. Speech Enhancement / BSS is structural on dual-mic AFE
# builds: disabling it makes esp-sr fall back to first-mic-only, so it is not
# exposed as a runtime switch here. NS is also not exposed on dual-mic builds:
# Espressif's afe_config_check() prioritizes SE/BSS over NS for two-channel
# microphone input. AGC remains an AFE config switch and is applied through
# reinit because the stock GMF manager does not expose a live AGC feature.
# =============================================================================

substitutions:
  afe_aec_restore_mode: RESTORE_DEFAULT_OFF
  afe_agc_restore_mode: RESTORE_DEFAULT_ON
  afe_vad_restore_mode: ALWAYS_OFF

binary_sensor:
  - platform: esp_afe
    esp_afe_id: afe_processor
    vad:
      name: Voice Detected
      id: voice_presence

switch:
  - platform: esp_afe
    esp_afe_id: afe_processor
    aec:
      id: aec_switch
      name: Echo Cancellation
      icon: mdi:ear-hearing
      restore_mode: ${afe_aec_restore_mode}
    agc:
      id: agc_switch
      name: Auto Gain Control
      icon: mdi:tune-vertical
      restore_mode: ${afe_agc_restore_mode}
    vad:
      id: vad_switch
      name: Voice Activity Detector
      icon: mdi:account-voice
      restore_mode: ${afe_vad_restore_mode}

select:
  - platform: template
    name: AFE Output Source (AEC Off)
    id: afe_output_source_select
    icon: mdi:source-branch
    entity_category: diagnostic
    options:
      - "Auto (speaker leak check)"
      - "AFE multi-output 1"
      - "AFE multi-output 2"
    initial_option: "Auto (speaker leak check)"
    optimistic: false
    restore_value: true
    set_action:
      - lambda: |-
          id(afe_processor).set_bss_output_source_name(x.c_str());
          id(afe_output_source_select).publish_state(id(afe_processor).get_bss_output_source_name());
