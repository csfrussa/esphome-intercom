# =============================================================================
# Common intercom call-control buttons.
#
# Provides:
#   buttons: call_button, next_contact_button, prev_contact_button,
#            decline_button, restart
#
# Prerequisites:
#   - id `intercom` : esphome_voip_stack component
# =============================================================================

button:
  - platform: template
    name: Call
    id: call_button
    icon: mdi:phone
    on_press:
      - esphome_voip_stack.call_toggle: voip_phone

  - platform: template
    name: Next Contact
    id: next_contact_button
    icon: mdi:skip-next
    on_press:
      - esphome_voip_stack.next_contact: voip_phone

  - platform: template
    name: Previous Contact
    id: prev_contact_button
    icon: mdi:skip-previous
    on_press:
      - esphome_voip_stack.prev_contact: voip_phone

  - platform: template
    name: Decline
    id: decline_button
    icon: mdi:phone-hangup
    on_press:
      - esphome_voip_stack.decline_call: voip_phone

  - platform: restart
    name: Restart
    entity_category: config
