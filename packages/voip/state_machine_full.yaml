# =============================================================================
# Shared state machine for VA + Intercom devices.
# Drop-in for any device that combines voice_assistant, micro_wake_word, and
# esphome_voip_stack. Provides the central reducer (update_status), failsafes, and
# all the cross-cutting hook placeholders that device YAMLs !extend.
#
# ui_state values:
#   0=idle, 1=init, 2=no_wifi, 3=no_ha,
#   4=both_muted, 5=mic_muted, 6=spk_muted,
#   7=mww_recent_or_barge, 8=va_listening, 9=va_thinking,
#   10=va_responding, 11=ic_ringing, 12=ic_calling,
#   13=ic_in_call, 14=va_error, 15=media
#
# g_applied_led values, derived from ui_state for LED rendering:
#   0=off, 1=both_muted, 2=mic_muted, 3=spk_muted, 4=mww_recent_or_barge,
#   5=va_listening, 6=va_thinking, 7=va_responding,
#   8=ic_ringing, 9=ic_calling, 10=ic_in_call, 11=va_error, 12=media
#
# Prerequisites in the device YAML:
#   - id `intercom`              : esphome_voip_stack component
#   - id `va`                    : voice_assistant component (voice_assistant/core.yaml)
#   - id `mww`                   : micro_wake_word component (voice_assistant/core.yaml)
#   - id `mute`, `speaker_mute`  : mute switches (intercom/va_buttons_switches.yaml)
#   - id `tts_speaker_input`     : TTS speaker source for TTS audio
#   - id `speaker_media_player`  : media_player component
#   - id `media_mixer_input`     : mixer source for ducking
#   - id `voip_ringing_sound`: media_file for ringtone loop
# =============================================================================

substitutions:
  ui_state_idle: "0"
  ui_state_init: "1"
  ui_state_no_wifi: "2"
  ui_state_no_ha: "3"
  ui_state_both_muted: "4"
  ui_state_mic_muted: "5"
  ui_state_spk_muted: "6"
  ui_state_mww_recent: "7"
  ui_state_va_listening: "8"
  ui_state_va_thinking: "9"
  ui_state_va_replying: "10"
  ui_state_ic_ringing: "11"
  ui_state_ic_calling: "12"
  ui_state_ic_in_call: "13"
  ui_state_va_error: "14"
  ui_state_media: "15"

globals:
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: g_wake_word_enabled
    type: bool
    restore_value: true
    initial_value: "true"
  - id: g_va_state
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_va_phase
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_activity_mask
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_fsm_seq
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_va_epoch
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_tts_owner_epoch
    type: uint32_t
    restore_value: false
    initial_value: "0"
  - id: g_barge_in_pending
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_mww_recent
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_ducking_active
    type: int
    restore_value: false
    initial_value: "0"
  - id: g_applied_led
    type: int
    restore_value: false
    initial_value: "-1"
  - id: g_voip_ringtone_media_suppressed
    type: bool
    restore_value: false
    initial_value: "false"
  - id: ui_state
    type: int
    restore_value: false
    initial_value: "-1"

script:
  # CENTRAL REDUCER
  - id: update_status
    mode: queued
    max_runs: 4
    then:
      - lambda: |-
          id(g_fsm_seq)++;
          using S = media_player::MediaPlayerState;
          constexpr uint32_t ACT_MEDIA = 1u << 0;
          constexpr uint32_t ACT_INTERCOM = 1u << 1;
          constexpr uint32_t ACT_TTS_QUEUED = 1u << 2;
          constexpr uint32_t ACT_TTS_PLAYING = 1u << 3;
          constexpr uint32_t ACT_VA_LISTENING = 1u << 4;
          constexpr uint32_t ACT_VA_THINKING = 1u << 5;
          constexpr uint32_t ACT_BARGE_PENDING = 1u << 6;
          constexpr uint32_t ACT_VA_ERROR = 1u << 7;
          constexpr uint32_t ACT_MWW_RECENT = 1u << 8;
          auto mp_state = id(speaker_media_player).state;
          bool media_active = (mp_state == S::MEDIA_PLAYER_STATE_PLAYING ||
                               mp_state == S::MEDIA_PLAYER_STATE_ANNOUNCING);
          uint32_t mask = 0;
          if (media_active)
            mask |= ACT_MEDIA;
          if (!id(voip_phone).is_idle())
            mask |= ACT_INTERCOM;
          if (id(g_va_phase) == 1)
            mask |= ACT_VA_LISTENING;
          if (id(g_va_phase) == 2)
            mask |= ACT_VA_THINKING;
          if (id(g_va_phase) == 3)
            mask |= ACT_TTS_QUEUED;
          if (id(g_va_phase) == 4)
            mask |= ACT_TTS_PLAYING;
          if (id(g_va_phase) == 5 || id(g_barge_in_pending))
            mask |= ACT_BARGE_PENDING;
          if (id(g_va_phase) == 6)
            mask |= ACT_VA_ERROR;
          if (id(g_mww_recent))
            mask |= ACT_MWW_RECENT;

          int state = ${ui_state_idle};
          int led = 0;
          if (id(init_in_progress)) {
            state = ${ui_state_init};
          } else if (!wifi::global_wifi_component->is_connected()) {
            state = ${ui_state_no_wifi};
          } else if (!api::global_api_server->is_connected()) {
            state = ${ui_state_no_ha};
          } else if (id(mute).state && id(speaker_mute).state) {
            state = ${ui_state_both_muted};
            led = 1;
          } else if (id(mute).state) {
            state = ${ui_state_mic_muted};
            led = 2;
          } else if (id(speaker_mute).state) {
            state = ${ui_state_spk_muted};
            led = 3;
          } else if (id(g_mww_recent) || id(g_barge_in_pending)) {
            state = ${ui_state_mww_recent};
            led = 4;
          } else if (mask & (ACT_TTS_QUEUED | ACT_TTS_PLAYING)) {
            state = ${ui_state_va_replying};
            led = 7;
          } else if (id(g_va_phase) == 1) {
            state = ${ui_state_va_listening};
            led = 5;
          } else if (id(g_va_phase) == 2) {
            state = ${ui_state_va_thinking};
            led = 6;
          } else if (id(voip_phone).is_ringing()) {
            state = ${ui_state_ic_ringing};
            led = 8;
          } else if (id(voip_phone).is_calling()) {
            state = ${ui_state_ic_calling};
            led = 9;
          } else if (id(voip_phone).is_in_call()) {
            state = ${ui_state_ic_in_call};
            led = 10;
          } else if (id(g_va_phase) == 6) {
            state = ${ui_state_va_error};
            led = 11;
          } else if (media_active) {
            state = ${ui_state_media};
            led = 12;
          }
          id(g_activity_mask) = mask;
          id(ui_state) = state;
          id(g_applied_led) = led;
      - script.execute: update_led
      - script.execute: render_ui_state
      # Ducking
      - if:
          condition:
            lambda: |-
              constexpr uint32_t ACT_INTERCOM = 1u << 1;
              constexpr uint32_t ACT_TTS_QUEUED = 1u << 2;
              constexpr uint32_t ACT_TTS_PLAYING = 1u << 3;
              constexpr uint32_t ACT_VA_LISTENING = 1u << 4;
              constexpr uint32_t ACT_VA_THINKING = 1u << 5;
              constexpr uint32_t ACT_BARGE_PENDING = 1u << 6;
              constexpr uint32_t ACT_MWW_RECENT = 1u << 8;
              uint32_t duck_mask = ACT_INTERCOM | ACT_TTS_QUEUED | ACT_TTS_PLAYING |
                                   ACT_VA_LISTENING | ACT_VA_THINKING |
                                   ACT_BARGE_PENDING | ACT_MWW_RECENT;
              return (id(g_activity_mask) & duck_mask) != 0 ||
                     id(speaker_media_player).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING ||
                     id(va).is_running();
          then:
            - if:
                condition:
                  lambda: 'return id(g_ducking_active) == 0;'
                then:
                  - mixer_speaker.apply_ducking:
                      id: media_mixer_input
                      decibel_reduction: 20
                      duration: 200ms
                  - globals.set:
                      id: g_ducking_active
                      value: "1"
          else:
            - if:
                condition:
                  lambda: 'return id(g_ducking_active) != 0;'
                then:
                  - mixer_speaker.apply_ducking:
                      id: media_mixer_input
                      decibel_reduction: 0
                      duration: 500ms
                  - globals.set:
                      id: g_ducking_active
                      value: "0"
  # Hook placeholders (devices !extend)
  - id: update_led
    mode: restart
    then: []
  - id: render_ui_state
    mode: restart
    then: []
  - id: ui_tts_started
    parameters:
      text: string
    then: []
  - id: ui_stt_ended
    parameters:
      text: string
    then: []
  - id: ui_ic_call
    parameters:
      peer: string
    then: []
  # Caller path: dest acked with RING. Same calling screen, label
  # flips. Devices with display !extend this to update LVGL widgets.
  - id: ui_ic_dest_ringing
    parameters:
      peer: string
    then: []
  # Call terminated screen (hangup, decline, error, timeout, busy).
  # `reason` is whatever end_call_(...) emitted: a canonical token
  # (`local_hangup` / `remote_hangup` / `declined` / `timeout` /
  # `busy` / `unreachable` / `protocol_error` / `bridge_error`) or
  # a free-form SIP terminal reason.
  - id: ui_ic_ended
    parameters:
      peer: string
      reason: string
    then: []
  - id: va_end_cleanup
    then: []

  - id: start_mww_when_ready
    mode: restart
    then:
      # MWW owns the microphone consumer and starts the AFE/I2S path. Do not
      # start it from early boot or generic API callbacks; wait for init to
      # clear and make every caller pass through this single gate.
      - wait_until:
          condition:
            lambda: 'return millis() >= 10000;'
          timeout: 10s
      - delay: 2s
      - if:
          condition:
            and:
              - lambda: 'return !id(init_in_progress);'
              - lambda: 'return !id(g_ota_in_progress);'
              - lambda: 'return id(g_wake_word_enabled);'
              - switch.is_off: mute
              - not:
                  voice_assistant.is_running:
              - not:
                  micro_wake_word.is_running:
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player
              - esphome_voip_stack.is_idle: voip_phone
          then:
            - logger.log:
                tag: mww
                format: "MWW: safe start"
            - micro_wake_word.start:
            - delay: 1s
            - lambda: |-
                TaskHandle_t mww_task = xTaskGetHandle("mww");
                if (mww_task) {
                  vTaskPrioritySet(mww_task, 8);
                }
          else:
            - logger.log:
                level: INFO
                tag: mww
                format: "MWW: safe start skipped init=%d ota=%d enabled=%d mute=%d va=%d mww=%d announcing=%d intercom_idle=%d"
                args:
                  - id(init_in_progress)
                  - id(g_ota_in_progress)
                  - id(g_wake_word_enabled)
                  - id(mute).state
                  - id(va).is_running()
                  - id(mww).is_running()
                  - id(speaker_media_player).state == media_player::MEDIA_PLAYER_STATE_ANNOUNCING
                  - id(voip_phone).is_idle()

  # Core scripts
  - id: va_hold_response_until_announcement
    mode: restart
    then:
      # ESPHome voice_assistant starts an internal "playing" timeout as soon as
      # the TTS URL is handed to the media player. With speaker_source and slow
      # local TTS the announcement can still be opening its HTTP stream when
      # that timeout fires, which makes ESPHome enter RESPONSE_FINISHED early
      # and can start continue_conversation while the old TTS is still queued.
      #
      # Keep that upstream timeout cancelled only while our causal state says
      # the VA response is queued but the announcement pipeline has not yet
      # reached ANNOUNCING. Once ANNOUNCING appears, ESPHome's normal media
      # player state tracking owns the response lifecycle again.
      - repeat:
          count: 80
          then:
            - lambda: |-
                if (id(g_va_phase) == 3 &&
                    id(speaker_media_player).state != media_player::MEDIA_PLAYER_STATE_ANNOUNCING) {
                  App.scheduler.cancel_timeout(id(va), "playing");
                }
            - delay: 250ms

  - id: va_end_handler
    mode: queued
    max_runs: 2
    then:
      - if:
          condition:
            lambda: 'return id(g_barge_in_pending) != 0;'
          then:
            - logger.log:
                tag: va
                format: "VA: barge cancel requested"
            - globals.set:
                id: g_va_phase
                value: "5"
            - globals.set:
                id: g_va_state
                value: "0"
            - media_player.stop:
                id: speaker_media_player
                announcement: true
            - voice_assistant.stop:
            - script.execute: update_status
            - script.execute: va_barge_start_when_ready
          else:
            - if:
                condition:
                  lambda: 'return id(g_va_phase) == 3 || id(g_va_phase) == 4;'
                then:
                  - logger.log:
                      tag: va
                      format: "VA: on_end while TTS is queued/playing; keeping response state"
                  - script.execute: update_status
                else:
                  - logger.log:
                      tag: va
                      format: "VA: end, clearing state"
                  - globals.set:
                      id: g_va_phase
                      value: "0"
                  - globals.set:
                      id: g_va_state
                      value: "0"
                  - script.execute: update_status
                  - script.execute: va_end_cleanup

  - id: va_barge_start_when_ready
    mode: restart
    then:
      - wait_until:
          condition:
            and:
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player
      - if:
          condition:
            and:
              - lambda: 'return id(g_barge_in_pending) != 0;'
              - lambda: 'return id(g_va_phase) == 5;'
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_announcing:
                    id: speaker_media_player
          then:
            - logger.log:
                tag: va
                format: "VA: barge start accepted"
            - lambda: |-
                id(g_va_epoch)++;
                id(g_tts_owner_epoch) = 0;
            - voice_assistant.start:

  - id: va_error_flash
    mode: restart
    then:
      - delay: 2s
      - if:
          condition:
            lambda: 'return id(g_va_phase) == 6;'
          then:
            - globals.set:
                id: g_va_state
                value: "0"
            - globals.set:
                id: g_va_phase
                value: "0"
      - script.execute: update_status

  - id: mww_failsafe
    mode: restart
    then:
      - delay: 3s
      - logger.log:
          level: WARN
          format: "MWW failsafe: clearing stuck g_mww_recent"
      - globals.set:
          id: g_mww_recent
          value: "0"
      - script.execute: update_status

  - id: barge_failsafe
    mode: restart
    then:
      - delay: 15s
      - if:
          condition:
            lambda: 'return id(g_barge_in_pending) != 0;'
          then:
            - logger.log:
                level: WARN
                format: "Barge failsafe: clearing stuck g_barge_in_pending"
            - globals.set:
                id: g_barge_in_pending
                value: "0"
            - if:
                condition:
                  lambda: 'return id(g_va_phase) == 5;'
                then:
                  - globals.set:
                      id: g_va_phase
                      value: "0"
            - script.execute: update_status

  - id: voip_ringing_loop
    mode: restart
    then:
      - while:
          condition:
            esphome_voip_stack.is_ringing: voip_phone
          then:
            - media_player.play_media:
                id: speaker_media_player
                media_url: "audio-file://voip_ringing_sound"
                announcement: true
            - wait_until:
                condition:
                  media_player.is_announcing:
                    id: speaker_media_player
                timeout: 2s
            - wait_until:
                condition:
                  not:
                    media_player.is_announcing:
                      id: speaker_media_player
                timeout: 5s
            - delay: 1s
