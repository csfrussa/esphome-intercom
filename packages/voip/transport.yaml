# =============================================================================
# VoIP phone SIP/RTP transport
# =============================================================================
#
# Configures voip_stack as a standard SIP phone. `transport` selects only the
# SIP signaling transport: UDP is the default LAN mode; TCP is useful when the
# network/proxy handles stream signaling better. Audio remains RTP/UDP in the
# current profile and negotiates PCM through SDP.
# =============================================================================

substitutions:
  voip_transport: udp
  voip_sip_port: "5060"
  voip_rtp_port: "40000"

voip_stack:
  id: phone
  # SIP signaling transport: `udp` by default; set `voip_transport: tcp`
  # in the device YAML when this phone must use SIP over TCP.
  transport: ${voip_transport}
  sip_port: ${voip_sip_port}
  rtp_port: ${voip_rtp_port}
