# =============================================================================
# VoIP phone SIP/RTP transport
# =============================================================================
#
# `transport` is SIP signaling only; audio remains RTP/UDP.
# Direct ESP-to-ESP calls need matching SIP transport. Mixed TCP/UDP phones can
# still call by name when HA is present because HA bridges the SIP legs.
# =============================================================================

substitutions:
  voip_transport: udp
  voip_sip_port: "5060"
  voip_rtp_port: "40000"

voip_stack:
  id: phone
  # SIP signaling: udp by default; set voip_transport: tcp for SIP/TCP.
  transport: ${voip_transport}
  sip_port: ${voip_sip_port}
  rtp_port: ${voip_rtp_port}
