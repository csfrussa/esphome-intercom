# =============================================================================
# VoIP-only YAML LED status automation for speaker-only devices.
#
# Include this in paging/ringer devices that can play received audio but cannot
# send microphone audio. It maps direct voip_stack callbacks and speaker mute to
# a single status light:
#   speaker muted -> orange
#   incoming call -> red ringing effect
#   outgoing call -> orange calling effect
#   in call -> green
#   idle -> off
#
# Prerequisites:
#   - id `phone`        : voip_stack component
#   - id `speaker_mute` : speaker mute switch
#   - id `status_led`   : light entity for state feedback
#
# This package deliberately does not require mute or a microphone component.
# =============================================================================
script:
  - id: update_status
    mode: restart
    then:
      - if:
          condition:
            switch.is_on: speaker_mute
          then:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 50%
                blue: 0%
                brightness: 30%
                effect: None
          else:
            - if:
                condition:
                  voip_stack.is_ringing:
                then:
                  - light.turn_on:
                      id: status_led
                      red: 100%
                      green: 0%
                      blue: 0%
                      brightness: 100%
                      effect: Ringing
                else:
                  - if:
                      condition:
                        voip_stack.is_calling:
                      then:
                        - light.turn_on:
                            id: status_led
                            red: 100%
                            green: 50%
                            blue: 0%
                            brightness: 100%
                            effect: Calling
                      else:
                        - if:
                            condition:
                              voip_stack.is_in_call:
                            then:
                              - light.turn_on:
                                  id: status_led
                                  red: 30%
                                  green: 69%
                                  blue: 31%
                                  brightness: 100%
                                  effect: None
                            else:
                              - light.turn_off:
                                  id: status_led
