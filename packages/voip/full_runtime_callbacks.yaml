# VoIP callbacks for full runtime_controller devices.
#
# This package only connects voip_stack lifecycle callbacks to full-runtime UI
# hook scripts and ringtone stop logic. It does not define VA/MWW controls.

voip_stack:
  id: phone
  on_calling:
    - script.execute:
        id: ui_call_started
        peer: !lambda 'return peer;'
  on_ringing:
    - script.execute:
        id: ui_call_started
        peer: !lambda 'return peer;'
  on_dest_ringing:
    - script.execute:
        id: ui_call_dest_ringing
        peer: !lambda 'return peer;'
  on_in_call:
    - script.execute: voip_stop_ringtone
    - script.execute:
        id: ui_call_started
        peer: !lambda 'return peer;'
  on_hangup:
    - script.execute: voip_stop_ringtone
    - script.execute:
        id: ui_call_ended
        peer: !lambda 'return peer;'
        reason: !lambda 'return reason;'
  on_call_failed:
    - script.execute: voip_stop_ringtone
    - script.execute:
        id: ui_call_ended
        peer: !lambda 'return peer;'
        reason: !lambda 'return reason;'
