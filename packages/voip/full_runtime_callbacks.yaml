# VoIP callbacks for full runtime_controller devices.
#
# This package only connects voip_stack lifecycle callbacks to full-runtime UI
# hook scripts and ringtone stop logic. It does not define VA/MWW controls.

voip_stack:
  id: phone
  on_calling:
    - script.execute:
        id: ui_call_started
        peer: !lambda 'return id(phone).get_current_destination();'
  on_ringing:
    - script.execute:
        id: ui_call_started
        peer: !lambda 'return id(phone).get_caller();'
  on_dest_ringing:
    - script.execute:
        id: ui_call_dest_ringing
        peer: !lambda 'return id(phone).get_current_destination();'
  on_in_call:
    - script.execute: voip_stop_ringtone
    - script.execute:
        id: ui_call_started
        peer: !lambda |-
          auto c = id(phone).get_caller();
          return c.empty() ? id(phone).get_current_destination() : c;
  on_hangup:
    - script.execute: voip_stop_ringtone
    - script.execute:
        id: ui_call_ended
        peer: !lambda |-
          auto c = id(phone).get_caller();
          return c.empty() ? id(phone).get_current_destination() : c;
        reason: !lambda 'return reason;'
  on_call_failed:
    - script.execute: voip_stop_ringtone
    - script.execute:
        id: ui_call_ended
        peer: !lambda 'return id(phone).get_current_destination();'
        reason: !lambda 'return reason;'
