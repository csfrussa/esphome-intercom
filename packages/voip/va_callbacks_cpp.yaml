# =============================================================================
# VoIP Stack callbacks for VA-enabled devices.
# Like voip/callbacks.yaml but UI-only for full-experience devices.
# Runtime state, LEDs, ducking and ringtone playback are owned by runtime_controller.
#
# Prerequisites in the device YAML:
#   - voip_stack hardware config (microphone, speaker, ringing_timeout, ...)
#   - script ids `ui_call_started`, `ui_call_dest_ringing`, `ui_call_ended`
#     (provided as placeholders by runtime_controller bridge package; device
#      !extends them to drive LVGL)
#
# Required substitutions:
#   ${friendly_name} - used in the homeassistant.event payload on calling call
# =============================================================================

voip_stack:
  id: phone
  on_calling:
    - script.execute:
        id: ui_call_started
        peer: !lambda 'return id(phone).get_current_destination();'
    - if:
        condition:
          voip_stack.is_ha_destination:
        then:
          - homeassistant.event:
              event: esphome.voip_call
              data:
                caller: "${friendly_name}"
                destination: !lambda 'return id(phone).get_current_destination();'
                type: "doorbell"
  on_ringing:
    - script.execute:
        id: ui_call_started
        peer: !lambda 'return id(phone).get_caller();'
  on_dest_ringing:
    # Caller path: dest acked with RING. Same calling screen, the
    # device YAML flips its label inside ui_call_dest_ringing.
    - script.execute:
        id: ui_call_dest_ringing
        peer: !lambda 'return id(phone).get_current_destination();'
  on_in_call:
    - script.execute: voip_stop_ringtone
    - script.execute:
        id: ui_call_started
        peer: !lambda |-
          auto c = id(phone).get_caller();
          return c.empty() ? id(phone).get_current_destination() : c;
  on_hangup:
    - script.execute: voip_stop_ringtone
    - script.execute:
        id: ui_call_ended
        peer: !lambda |-
          auto c = id(phone).get_caller();
          return c.empty() ? id(phone).get_current_destination() : c;
        reason: !lambda 'return reason;'
  on_call_failed:
    - script.execute: voip_stop_ringtone
    - script.execute:
        id: ui_call_ended
        peer: !lambda 'return id(phone).get_current_destination();'
        reason: !lambda 'return reason;'
