# =============================================================================
# VoIP HA-callable actions.
# Drop-in for devices that integrate with the Home Assistant `voip_stack`
# integration. Exposes only the call-control actions.
#
# Phonebook sync uses native API JSON (`set_roster_json`), not text_sensor CSV.
#
# Prerequisites in the device YAML:
#   - id `phone` : voip_stack component (voip/callbacks.yaml provides this)
# =============================================================================

wifi:
  on_connect:
    - runtime_controller.event:
        id: runtime
        event: wifi_connected
    - delay: 1s
    - voip_stack.publish_entity_states:
  on_disconnect:
    - runtime_controller.event:
        id: runtime
        event: wifi_disconnected

api:
  on_client_connected:
    # ESPHome exposes client_info only to automations as a string. Keep this as a
    # lambda so log/dashboard/web clients do not incorrectly mark HA as present.
    - if:
        condition:
          lambda: |-
            return !client_info.empty() &&
                   client_info.rfind("ESPHome Logs", 0) != 0 &&
                   client_info.rfind("ESPHome Dashboard", 0) != 0 &&
                   client_info.rfind("ESPHome Web", 0) != 0;
        then:
          - lambda: |-
              id(g_ha_api_clients)++;
          - runtime_controller.event:
              id: runtime
              event: ha_connected
    - delay: 1s
    - voip_stack.publish_entity_states:
  on_client_disconnected:
    # Mirror the same client_info filter on disconnect and drop HA only when the
    # last real API client is gone.
    - if:
        condition:
          lambda: |-
            return !client_info.empty() &&
                   client_info.rfind("ESPHome Logs", 0) != 0 &&
                   client_info.rfind("ESPHome Dashboard", 0) != 0 &&
                   client_info.rfind("ESPHome Web", 0) != 0;
        then:
          - lambda: |-
              if (id(g_ha_api_clients) > 0) id(g_ha_api_clients)--;
    # Client counters identify HA-like peers, but can be stale across reconnect
    # races. Reconcile against the API server itself after callbacks settle so
    # closing `esphome logs` can never masquerade as an HA disconnect.
    - delay: 250ms
    - if:
        condition:
          not:
            api.connected:
        then:
          - lambda: 'id(g_ha_api_clients) = 0;'
          - runtime_controller.event:
              id: runtime
              event: ha_disconnected
  actions:
    # Diagnostic/runtime reducer helpers. These are profile-level API actions,
    # not runtime_controller component semantics: any event name is defined by YAML.
    - action: runtime_event
      variables:
        event: string
      then:
        - runtime_controller.event:
            id: runtime
            event: !lambda 'return event;'
    - action: runtime_set_activity
      variables:
        activity: string
        active: bool
      then:
        - runtime_controller.set_activity:
            id: runtime
            activity: !lambda 'return activity;'
            active: !lambda 'return active;'
    - action: runtime_dump
      variables:
        reason: string
      then:
        - runtime_controller.dump:
            id: runtime
            reason: !lambda 'return reason;'
    # Card/HA -> voip_stack.call(source=this) ends up here. The ESP first
    # tries its local phonebook cache; unresolved targets route through HA.
    - action: start_call
      variables:
        dest: string
      then:
        - voip_stack.call:
            target: !lambda 'return dest;'
    # Direct ESP-side decline with an optional free-form reason. This keeps
    # HA automations useful even for ESP<->ESP calls where HA is only
    # mirroring state and is not the signaling bridge.
    - action: decline_call
      variables:
        reason: string
      then:
        - voip_stack.decline_call:
            reason: !lambda 'return reason;'
    # Set by voip_stack at config-entry setup so logical SIP targets can
    # route through the live HA bridge name from hass.config.location_name.
    - action: set_ha_peer_name
      variables:
        name: string
      then:
        - voip_stack.set_ha_peer_name:
            name: !lambda 'return name;'
    # Canonical central roster management. HA publishes the same JSON document
    # that cards/services read from sensor.voip_phonebook.
    - action: set_roster_json
      variables:
        roster_json: string
      then:
        - voip_stack.set_roster_json:
            roster_json: !lambda 'return roster_json;'
    # Local/manual SIP phonebook actions for YAML scripts and test tools.
    - action: set_contacts
      variables:
        contacts_csv: string
      then:
        - voip_stack.set_contacts:
            contacts_csv: !lambda 'return contacts_csv;'
    - action: add_contact
      variables:
        entry: string
      then:
        - voip_stack.add_contact:
            entry: !lambda 'return entry;'
    - action: remove_contact
      variables:
        entry: string
      then:
        - voip_stack.remove_contact:
            entry: !lambda 'return entry;'
    - action: flush_contacts
      then:
        - voip_stack.flush_contacts:
    - action: update_contacts
      then:
        - voip_stack.update_contacts:
