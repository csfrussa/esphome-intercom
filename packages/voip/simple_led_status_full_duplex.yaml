# =============================================================================
# VoIP-only YAML LED status automation.
#
# Include this in simple full-duplex VoIP-only devices that do not use
# runtime_controller. It maps direct voip_stack callbacks and mute switches to a
# single status light:
#   both muted -> slow red pulse
#   mic muted -> red
#   speaker muted -> orange
#   incoming call -> red ringing effect
#   outgoing call -> orange calling effect
#   in call -> green
#   idle -> off
#
# Prerequisites in the device YAML:
#   - id `phone`        : voip_stack component
#   - id `mute`         : mic mute switch (provided by voip/entities_full_duplex.yaml)
#   - id `speaker_mute` : speaker mute switch (provided by voip/entities_full_duplex.yaml)
#   - id `status_led`   : light entity for state feedback
#
# Full Voice Assistant/media/LVGL devices should use runtime_controller instead
# of this callback-local LED mapping.
# =============================================================================

globals:
  - id: g_voip_ringtone_media_suppressed
    type: bool
    restore_value: false
    initial_value: "false"

# `update_status` only runs from voip_stack callbacks (on_calling/on_idle/...),
# so without this hook the LED never reflects real state at startup -- it just
# shows whatever the light restored from flash (see status_led's
# restore_mode: ALWAYS_OFF) until the first call event. This recomputes the
# correct color once mute switches have restored their own persisted state.
esphome:
  on_boot:
    then:
      - script.execute: update_status

script:
  - id: update_status
    mode: restart
    then:
      - if:
          condition:
            and:
              - switch.is_on: mute
              - switch.is_on: speaker_mute
          then:
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 40%
                effect: Slow Pulse
          else:
            - if:
                condition:
                  switch.is_on: mute
                then:
                  - light.turn_on:
                      id: status_led
                      red: 100%
                      green: 0%
                      blue: 0%
                      brightness: 30%
                      effect: None
                else:
                  - if:
                      condition:
                        switch.is_on: speaker_mute
                      then:
                        - light.turn_on:
                            id: status_led
                            red: 100%
                            green: 50%
                            blue: 0%
                            brightness: 30%
                            effect: None
                      else:
                        - if:
                            condition:
                              voip_stack.is_ringing:
                            then:
                              - light.turn_on:
                                  id: status_led
                                  red: 100%
                                  green: 0%
                                  blue: 0%
                                  brightness: 100%
                                  effect: Ringing
                            else:
                              - if:
                                  condition:
                                    voip_stack.is_calling:
                                  then:
                                    - if:
                                        condition:
                                          voip_stack.is_remote_ringing:
                                        then:
                                          - light.turn_on:
                                              id: status_led
                                              red: 100%
                                              green: 50%
                                              blue: 0%
                                              brightness: 100%
                                              effect: Ringing
                                        else:
                                          - light.turn_on:
                                              id: status_led
                                              red: 100%
                                              green: 50%
                                              blue: 0%
                                              brightness: 100%
                                              effect: Calling
                                  else:
                                    - if:
                                        condition:
                                          voip_stack.is_in_call:
                                        then:
                                          - light.turn_on:
                                              id: status_led
                                              red: 30%
                                              green: 69%
                                              blue: 31%
                                              brightness: 100%
                                              effect: None
                                        else:
                                          - light.turn_off:
                                              id: status_led
