# =============================================================================
# VoIP Stack callbacks for VA-enabled devices.
# Like voip/callbacks.yaml but also drives voip_ringing_loop (full
# ringtone playback on incoming call), since VA devices have a media player
# stack capable of running it. Use this on full-experience devices that
# include voice_assistant/core.yaml.
#
# Prerequisites in the device YAML:
#   - voip_stack hardware config (microphone, speaker, ringing_timeout, ...)
#   - script id `update_status` (provided by voip/state_machine_full.yaml)
#   - script id `voip_ringing_loop` (provided by voip/state_machine_full.yaml)
#   - script ids `ui_call_started`, `ui_call_dest_ringing`, `ui_call_ended`
#     (provided as placeholders by voip/state_machine_full.yaml; device
#      !extends them to drive LVGL)
#
voip_stack:
  id: phone
  on_calling:
    - script.execute: update_status
    - script.execute:
        id: ui_call_started
        peer: !lambda 'return id(phone).get_current_destination();'
  on_ringing:
    - script.execute: update_status
    - script.execute:
        id: ui_call_started
        peer: !lambda 'return id(phone).get_caller();'
    - script.execute: voip_ringing_loop
  on_dest_ringing:
    # Caller path: dest acked with RING. Same calling screen, the
    # device YAML flips its label inside ui_call_dest_ringing.
    - script.execute:
        id: ui_call_dest_ringing
        peer: !lambda 'return id(phone).get_current_destination();'
  on_in_call:
    - script.stop: voip_ringing_loop
    - script.execute: update_status
    - script.execute:
        id: ui_call_started
        peer: !lambda |-
          auto c = id(phone).get_caller();
          return c.empty() ? id(phone).get_current_destination() : c;
  on_idle:
    - script.stop: voip_ringing_loop
    - script.execute: update_status
  on_hangup:
    - script.stop: voip_ringing_loop
    - script.execute: update_status
    - script.execute:
        id: ui_call_ended
        peer: !lambda |-
          auto c = id(phone).get_caller();
          return c.empty() ? id(phone).get_current_destination() : c;
        reason: !lambda 'return reason;'
  on_call_failed:
    - script.stop: voip_ringing_loop
    - script.execute: update_status
    - script.execute:
        id: ui_call_ended
        peer: !lambda 'return id(phone).get_current_destination();'
        reason: !lambda 'return reason;'
