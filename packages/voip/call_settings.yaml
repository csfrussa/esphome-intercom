# =============================================================================
# VoIP call settings
# =============================================================================
# Shared voip_stack switches exposed by every VoIP device.
#
# `Auto Answer` controls whether incoming calls are answered immediately.
# `Do Not Disturb` rejects incoming SIP INVITE with 486 Busy Here, so the
# caller, HA bridge, and card can show the real terminal reason.
#
# Required IDs:
#   phone - voip_stack component
# =============================================================================

switch:
  - platform: voip_stack
    voip_stack_id: phone
    auto_answer:
      id: auto_answer_switch
      name: Auto Answer
      icon: mdi:phone-in-talk
      restore_mode: RESTORE_DEFAULT_OFF
    dnd:
      id: dnd_switch
      name: Do Not Disturb
      icon: mdi:minus-circle
      restore_mode: RESTORE_DEFAULT_OFF
