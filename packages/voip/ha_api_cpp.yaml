# =============================================================================
# Intercom HA-callable actions.
# Drop-in for devices that integrate with the Home Assistant `homeassistant_voip_stack`
# integration. Exposes only the call-control actions.
#
# Phonebook sync is pushed as the canonical JSON roster through the native API.
# The ESP consumes that JSON directly; it is not projected through CSV/text
# sensors.
#
# Prerequisites in the device YAML:
#   - id `intercom` : esphome_voip_stack component (intercom/callbacks.yaml provides this)
# =============================================================================

wifi:
  on_connect:
    - runtime_fsm.event:
        id: runtime_controller
        event: wifi_connected
    - delay: 1s
    - esphome_voip_stack.publish_entity_states: voip_phone
  on_disconnect:
    - runtime_fsm.event:
        id: runtime_controller
        event: wifi_disconnected

api:
  on_client_connected:
    - if:
        condition:
          lambda: |-
            return !client_info.empty() &&
                   client_info.rfind("ESPHome Logs", 0) != 0 &&
                   client_info.rfind("ESPHome Dashboard", 0) != 0 &&
                   client_info.rfind("ESPHome Web", 0) != 0;
        then:
          - lambda: |-
              id(g_ha_api_clients)++;
          - runtime_fsm.event:
              id: runtime_controller
              event: ha_connected
    - delay: 1s
    - esphome_voip_stack.publish_entity_states: voip_phone
  on_client_disconnected:
    - if:
        condition:
          lambda: |-
            return !client_info.empty() &&
                   client_info.rfind("ESPHome Logs", 0) != 0 &&
                   client_info.rfind("ESPHome Dashboard", 0) != 0 &&
                   client_info.rfind("ESPHome Web", 0) != 0;
        then:
          - lambda: |-
              if (id(g_ha_api_clients) > 0) id(g_ha_api_clients)--;
          - if:
              condition:
                lambda: 'return id(g_ha_api_clients) <= 0;'
              then:
                - runtime_fsm.event:
                    id: runtime_controller
                    event: ha_disconnected
  actions:
    # Diagnostic/runtime reducer helpers. These are profile-level API actions,
    # not runtime_fsm component semantics: any event name is defined by YAML.
    - action: runtime_event
      variables:
        event: string
      then:
        - runtime_fsm.event:
            id: runtime_controller
            event: !lambda 'return event;'
    - action: runtime_dump
      variables:
        reason: string
      then:
        - runtime_fsm.dump:
            id: runtime_controller
            reason: !lambda 'return reason;'
    # Card/HA -> homeassistant_voip_stack.sip_call(source=this) ends up here. Sets the
    # current phonebook entry to `dest` and sends a SIP INVITE locally.
    - action: start_call
      variables:
        dest: string
      then:
        - esphome_voip_stack.call_contact:
            contact: !lambda 'return dest;'
    # Direct ESP-side decline with an optional free-form reason. This keeps
    # HA automations useful even for ESP<->ESP calls where HA is only
    # mirroring state and is not the signaling bridge.
    - action: decline_call
      variables:
        reason: string
      then:
        - esphome_voip_stack.decline_call:
            reason: !lambda 'return reason;'
    # Set by homeassistant_voip_stack at config-entry setup so logical SIP targets can
    # route through the live HA bridge name from hass.config.location_name.
    - action: set_ha_peer_name
      variables:
        name: string
      then:
        - esphome_voip_stack.set_ha_peer_name:
            name: !lambda 'return name;'
    # Canonical central roster management. HA publishes the same JSON document
    # that cards/services read from sensor.voip_phonebook.
    - action: set_roster_json
      variables:
        roster_json: string
      then:
        - esphome_voip_stack.set_roster_json:
            roster_json: !lambda 'return roster_json;'
    # Local/manual SIP phonebook actions for YAML scripts and test tools.
    - action: set_contacts
      variables:
        contacts_csv: string
      then:
        - esphome_voip_stack.set_contacts:
            contacts_csv: !lambda 'return contacts_csv;'
    - action: add_contact
      variables:
        entry: string
      then:
        - esphome_voip_stack.add_contact:
            entry: !lambda 'return entry;'
    - action: remove_contact
      variables:
        entry: string
      then:
        - esphome_voip_stack.remove_contact:
            entry: !lambda 'return entry;'
    - action: flush_contacts
      then:
        - esphome_voip_stack.flush_contacts: voip_phone
    - action: update_contacts
      then:
        - esphome_voip_stack.update_contacts: voip_phone
