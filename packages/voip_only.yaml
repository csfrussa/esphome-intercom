# =============================================================================
# VoIP-only meta-package.
# Bundles the core sub-packages that make up a VoIP-only device:
#   - voip/state_machine.yaml      LED reducer + g_applied_led
#   - voip/callbacks.yaml          esphome_voip_stack on_* + ui_call_* hooks
#
# Maintained presets include optional feature packages explicitly next to this
# core package, so users can comment out one line to remove a feature:
#   - voip/buttons_switches.yaml   call/next/prev/decline buttons + mute
#   - voip/call_settings.yaml      auto-answer + DND switches
#   - voip/ha_api.yaml             HA-callable call-control services
#
# For LVGL devices that want a settings carousel, ALSO include:
#   `lvgl/settings_navigation.yaml`   carousel state + navigation scripts
#   `lvgl/lvgl_settings_*.yaml`       individual settings pages
#
# Required IDs (defined by device):
#   mic_main                - Microphone
#   hw_speaker              - Hardware speaker
#   speaker_mute            - Speaker mute switch supplied by the device YAML
#                             or packages/voip/speaker_mute.yaml
#   status_led              - LED/light entity
#   voip_ringing_sound  - Media file for ringtone (if device runs one)
#
# Required substitutions:
#   ${friendly_name}        - used in homeassistant.event payload
# =============================================================================

packages:
  state_machine: !include voip/state_machine.yaml
  callbacks: !include voip/callbacks.yaml

# No CONFIG_LWIP_MAX_SOCKETS override: esphome_voip_stack reserves its socket
# quota through socket.consume_sockets() in its Python validation path,
# so ESPHome sizes the setting automatically.
